variables:
    VERSION: $CI_COMMIT_TAG
    GIT_SUBMODULE_STRATEGY: recursive
    GIT_SUBMODULE_FORCE_HTTPS: "true"
    GIT_STRATEGY: clone
    DOTNET_SDK_VERSION: "8.0"
    DOTNET_RT_VERSION: "8.0.13"   
    PROJECT_NAME: "TN_Doc"  

stages:          
  - build
  - package 

build-job:
  stage: build
  image: mcr.microsoft.com/dotnet/sdk:${DOTNET_SDK_VERSION}
  rules:
    - if: $CI_COMMIT_TAG =~ /^\d+\.\d+(\.\d+)?$/
  tags:
    - orpovy
  before_script:
    # Создание директории для публикации
    - mkdir -p ./publish
    - mkdir -p $PROJECT_NAME/Dll
  script:
    - echo "Adding NuGet sources..."    
    - 'dotnet nuget add source "https://nuget.ortpr.ru/v3/index.json" --name ortpr'
    - 'dotnet nuget add source "https://nuget.xn--90aia9aifhdb2cxbdg.xn--p1ai/api/v3/index.json" --name fr_nuget --username "$FR_NUGET_USERNAME" --password "$FR_NUGET_PASSWORD" --store-password-in-clear-text'
    - echo "Rebuilding solution ..."
    - dotnet build
    - echo "Moving to $PROJECT_NAME..."
    - cd $PROJECT_NAME
    - echo "Current directory after cd:$(pwd)"
    - echo "Building the application..."
    - dotnet publish ${PROJECT_NAME}.csproj -c Release -r linux-x64 --self-contained false -o ../publish
  artifacts:
    name: "build-${PROJECT_NAME}-${CI_COMMIT_SHORT_SHA}"
    paths:
      - ./publish/

extract-version-job:       
  stage: build
  image: mcr.microsoft.com/dotnet/sdk:${DOTNET_SDK_VERSION}
  rules:
    - if: $CI_COMMIT_TAG =~ /^\d+\.\d+(\.\d+)?$/
  tags:
    - orpovy
  script:
    # Установка curl для работы с GitLab API
    - apt-get update && apt-get install -y curl
    # Определение пути к .csproj файлу
    - CSPROJ_FILE="$PROJECT_NAME/${PROJECT_NAME}.csproj"
    # Проверка существования файла
    - if [ ! -f "$CSPROJ_FILE" ]; then echo "Error:$CSPROJ_FILE not found"; exit 1; fi
    # Извлечение версии из .csproj
    - VERSION=$(xmllint --xpath "//Project/PropertyGroup/Version/text()" $CSPROJ_FILE 2>/dev/null || grep -oP '<Version>\K[^<]+' $CSPROJ_FILE)
    - echo "Extracted version:$VERSION"
    # Проверка версии
    - if [ -z "$VERSION" ]; then echo "Error:Version not found in $CSPROJ_FILE"; exit 1; fi
    # Формирование имени переменной для build number
    - BUILD_VAR_NAME="BUILD_NUMBER_$(echo $VERSION | tr '.' '_')"
    - echo "Build variable name:$BUILD_VAR_NAME"
    # Получение текущего build number из переменных проекта
    - |
      CURRENT_BUILD=$(curl -s --header "PRIVATE-TOKEN: $PROJECT_API_TOKEN" \
        "$CI_API_V4_URL/projects/$CI_PROJECT_ID/variables/$BUILD_VAR_NAME" | \
        grep -o '"value":"[^"]*"' | cut -d'"' -f4 || echo "0")
    - if [ -z "$CURRENT_BUILD" ] || [ "$CURRENT_BUILD" = "null" ]; then CURRENT_BUILD=0; fi
    - BUILD_NUMBER=$((CURRENT_BUILD + 1))
    - echo "Current build number:$CURRENT_BUILD, New build number:$BUILD_NUMBER"
    # Обновление build number в переменных проекта
    - |
      RESPONSE=$(curl -s --request PUT --header "PRIVATE-TOKEN: $PROJECT_API_TOKEN" \
        --header "Content-Type: application/json" \
        --data "{\"key\":\"$BUILD_VAR_NAME\",\"value\":\"$BUILD_NUMBER\"}" \
        "$CI_API_V4_URL/projects/$CI_PROJECT_ID/variables/$BUILD_VAR_NAME")
      if echo "$RESPONSE" | grep -q "404\|message"; then
        echo "Variable does not exist, creating new one..."
        curl -s --request POST --header "PRIVATE-TOKEN: $PROJECT_API_TOKEN" \
          --header "Content-Type: application/json" \
          --data "{\"key\":\"$BUILD_VAR_NAME\",\"value\":\"$BUILD_NUMBER\"}" \
          "$CI_API_V4_URL/projects/$CI_PROJECT_ID/variables"
      fi
      echo "Build number updated successfully"
    # Формирование ревизии из CI_COMMIT_SHORT_SHA
    - REVISION="b${BUILD_NUMBER}-${CI_COMMIT_SHORT_SHA}"
    # Формирование полной версии
    - FULL_VERSION="${VERSION}-${REVISION}"
    - echo "Full version:$FULL_VERSION"
    # Сохранение переменных для последующих этапов
    - echo "FULL_VERSION=$FULL_VERSION" > version.env
    - echo "VERSION=$VERSION" >> version.env
    - echo "REVISION=$REVISION" >> version.env
    - echo "BUILD_NUMBER=$BUILD_NUMBER" >> version.env
    - echo "PACKAGE_NAME=$PROJECT_NAME" >> version.env
  artifacts:
    reports:
      dotenv: version.env

package-job:      # This job runs in the deploy stage.
  stage: package
  image: ubuntu:latest
  rules:
    - if: $CI_COMMIT_TAG =~ /^\d+\.\d+(\.\d+)?$/
  needs:
    - build-job
    - extract-version-job
  tags:
    - orpovy
  before_script:
    - apt-get update && apt-get install -y dpkg-dev curl
  script:
    - echo "Packaging the application into a .deb file..."
    - DEB_NAME="$(echo "${PACKAGE_NAME}" | tr '[:upper:]' '[:lower:]' | tr '_' '.')-${FULL_VERSION}"
    - echo "DEB_NAME=$DEB_NAME"
    # Создание структуры пакета
    - mkdir -p deb/DEBIAN
    - mkdir -p deb/opt/$PROJECT_NAME
    - mkdir -p deb/var/log/$PROJECT_NAME
    - mkdir -p deb/etc/systemd/system
    - mkdir -p deb/usr/share/fonts
    # Создание временной директории для зависимостей
    - mkdir -p deb/tempdir
    # Копирование файлов приложения
    - cp -r ./publish/* deb/opt/$PROJECT_NAME/
    # Копирование .NET Runtime если есть в distrib
    - if [ -f "distrib/aspnetcore-runtime-8.0.13-linux-x64.tar.gz" ]; then cp distrib/aspnetcore-runtime-8.0.13-linux-x64.tar.gz deb/tempdir/; fi
    # Копирование libgdiplus если есть в distrib  
    - if [ -f "distrib/libgdiplus_4.2-1_amd64.deb" ]; then cp distrib/libgdiplus_4.2-1_amd64.deb deb/tempdir/; fi
    # Копирование шрифтов в пакет (если присутствуют в репозитории)
    - if [ -d "fonts" ]; then cp -r fonts/* deb/usr/share/fonts/; fi
    # Генерация control
    - |
      cat << EOF > deb/DEBIAN/control
      Package: $(echo "${PROJECT_NAME}" | tr '[:upper:]' '[:lower:]' | tr '_' '.')
      Version: ${VERSION}
      Section: utils
      Priority: optional
      Architecture: amd64
      Depends: systemd
      Maintainer: DadonovAD <dadonovad@transneft.ru>
      Description: ${PROJECT_NAME} это приложение для работы с документами СОИ СИКН/ОСИКН.
      Homepage:

      EOF
    # Генерация preinst
    - |
      cat << 'EOF' > deb/DEBIAN/preinst
      #!/bin/bash
      set -e

      # Проверка .NET Runtime перед установкой
      check_dotnet_runtime() {
          # Проверка наличия .NET Runtime
          if [ ! -d "/usr/bin/dotnet/shared/Microsoft.NETCore.App" ]; then
              echo "Warning: .NET Runtime 8 is not installed. Will install from local archive."
              return 1
          fi

          # Проверка версии .NET Runtime
          REQUIRED_VERSION="$DOTNET_RT_VERSION"
          INSTALLED_VERSION=$(ls /usr/bin/dotnet/shared/Microsoft.NETCore.App | grep -E '8\.0\.[0-9]+' | sort -V | tail -n 1)

          if [ -z "$INSTALLED_VERSION" ]; then
              echo "Warning: No compatible .NET Runtime 8 version found. Will install from local archive."
              return 1
          fi

          if [ "$(printf '%s\n' "$INSTALLED_VERSION" "$REQUIRED_VERSION" | sort -V | head -n1)" != "$REQUIRED_VERSION" ]; then
              echo "Warning: .NET Runtime version $INSTALLED_VERSION is installed, but version >= $REQUIRED_VERSION is required. Will install from local archive."
              return 1
          fi

          echo ".NET Runtime version $INSTALLED_VERSION is compatible (>= $REQUIRED_VERSION)"
          return 0
      }

      # Проверка .NET Runtime (установка будет в postinst если нужно)
      check_dotnet_runtime || echo "Will install .NET Runtime in postinst"

      # Остановка службы TN_Doc, если она запущена
      if systemctl is-active --quiet TN_Doc.service; then
          echo "Stopping TN_Doc.service..."
          systemctl stop TN_Doc.service
      fi

      # Удаление старых директорий
      echo "Removing old TN_Doc directories..."
      for dir in /opt/TN_Doc /var/log/TN_Doc; do
          if [ -d "$dir" ]; then
              rm -rf "$dir"
              echo "Removed $dir"
          fi
      done

      exit 0
      EOF
    - |
      cat << 'EOF' > deb/DEBIAN/prerm
      #!/bin/bash
      set -e

      # Остановка службы TN_Doc, если она запущена
      if systemctl is-active --quiet TN_Doc.service; then
          echo "Stopping TN_Doc.service..."
          systemctl stop TN_Doc.service
      fi

      exit 0
      EOF
    # Генерация postinst с автоустановкой зависимостей
    - |
      cat << 'EOF' > deb/DEBIAN/postinst
      #!/bin/bash
      set -e

      echo "Installing dependencies for $PROJECT_NAME..."

      # Функция установки libgdiplus
      install_libgdiplus() {
          REQUIRED_GDIPLUS_VERSION="4.2-1"
          CURRENT_GDIPLUS_VERSION=""
          if dpkg -s libgdiplus >/dev/null 2>&1; then
              CURRENT_GDIPLUS_VERSION=$(dpkg -s libgdiplus | awk -F": " '/^Version:/ {print $2}')
          fi

          if [ -z "$CURRENT_GDIPLUS_VERSION" ]; then
              echo "libgdiplus is not installed. Installing..."
          else
              if dpkg --compare-versions "$CURRENT_GDIPLUS_VERSION" ge "$REQUIRED_GDIPLUS_VERSION"; then
                  echo "libgdiplus version $CURRENT_GDIPLUS_VERSION is already installed and compatible (>= $REQUIRED_GDIPLUS_VERSION)"
                  return 0
              else
                  echo "libgdiplus version $CURRENT_GDIPLUS_VERSION is installed, but >= $REQUIRED_GDIPLUS_VERSION is required. Upgrading..."
              fi
          fi

          # Проверяем наличие локального .deb файла
          if [ -f "/tempdir/libgdiplus_4.2-1_amd64.deb" ]; then
              echo "Installing libgdiplus from local package..."
              dpkg -i /tempdir/libgdiplus_4.2-1_amd64.deb || apt-get install -f -y
              rm -f /tempdir/libgdiplus_4.2-1_amd64.deb
          else
              # Устанавливаем из репозитория
              apt-get update
              apt-get install -y libgdiplus
          fi
          echo "libgdiplus installed/updated successfully"
      }

      # Функция установки .NET Runtime
      install_dotnet_runtime() {
          # Проверяем, нужна ли установка
          if [ -d "/usr/bin/dotnet/shared/Microsoft.NETCore.App" ]; then
              REQUIRED_VERSION="$DOTNET_RT_VERSION"
              INSTALLED_VERSION=$(ls /usr/bin/dotnet/shared/Microsoft.NETCore.App | grep -E '8\.0\.[0-9]+' | sort -V | tail -n 1)
              
              if [ -n "$INSTALLED_VERSION" ] && [ "$(printf '%s\n' "$INSTALLED_VERSION" "$REQUIRED_VERSION" | sort -V | head -n1)" = "$REQUIRED_VERSION" ]; then
                  echo ".NET Runtime version $INSTALLED_VERSION is already installed and compatible (>= $REQUIRED_VERSION)"
                  return 0
              fi
          fi
          
          echo "Installing .NET Runtime..."
          
          # Проверяем наличие локального архива
          if [ -f "/tempdir/aspnetcore-runtime-8.0.13-linux-x64.tar.gz" ]; then
              echo "Installing .NET Runtime from local archive..."
              mkdir -p /usr/share/dotnet
              tar -xzf /tempdir/aspnetcore-runtime-8.0.13-linux-x64.tar.gz -C /usr/share/dotnet
              ln -sf /usr/share/dotnet/dotnet /usr/bin/dotnet
              rm -f /tempdir/aspnetcore-runtime-8.0.13-linux-x64.tar.gz
              echo ".NET Runtime installed successfully"
          else
              echo "Error: .NET Runtime not found and no local archive available."
              echo "Please install .NET Runtime 8.0.13+ manually before installing this package."
              exit 1
          fi
      }

      # Установка зависимостей
      install_libgdiplus
      install_dotnet_runtime

      # Обновление кэша шрифтов (при необходимости устанавливаем fontconfig)
      if ! command -v fc-cache >/dev/null 2>&1; then
          apt-get update
          apt-get install -y fontconfig
      fi
      if command -v fc-cache >/dev/null 2>&1; then
          fc-cache -fv || true
      fi

      # Установка прав и владельцев
      chmod 755 /opt/$PROJECT_NAME/$PROJECT_NAME
      chmod 644 /opt/$PROJECT_NAME/*.dll
      chown -R alphadaemon:alphadaemon /opt/$PROJECT_NAME
      chmod u=rwx,g=rx,o=rx /opt/$PROJECT_NAME
      chown alphadaemon:alphadaemon /var/log/$PROJECT_NAME
      chmod u=rwx,g=rx,o=rx /var/log/$PROJECT_NAME

      # Перезагрузка systemd
      systemctl daemon-reload

      # Включение и запуск сервиса
      systemctl enable $PROJECT_NAME.service
      systemctl start $PROJECT_NAME.service

      echo "$PROJECT_NAME installation completed successfully"
      exit 0
      EOF
    - |
      cat << 'EOF' > deb/DEBIAN/postrm
      #!/bin/bash
      set -e

      PROJECT_NAME="TN_Doc"

      # Удаление директорий при полной очистке (purge)
      if [ "$1" = "purge" ]; then
          echo "Purging $PROJECT_NAME directories..."
          for dir in /opt/$PROJECT_NAME /var/log/$PROJECT_NAME; do
              if [ -d "$dir" ]; then
                  rm -rf "$dir"
                  echo "Removed $dir"
              fi
          done
          
          # Удаление systemd service
          systemctl disable $PROJECT_NAME.service 2>/dev/null || true
          rm -f /etc/systemd/system/$PROJECT_NAME.service
          systemctl daemon-reload
      fi

      exit 0
      EOF
    # Генерация TN_Doc.service
    - |
      cat << 'EOF' > deb/etc/systemd/system/TN_Doc.service
      [Unit]
      Description=Service TN_Doc

      [Service]
      WorkingDirectory=/opt/TN_Doc/
      ExecStart=/usr/bin/dotnet /opt/TN_Doc/TN_Doc.dll
      Restart=always
      RestartSec=10
      SyslogIdentifier=dotnet-TN_Doc
      User=alphadaemon
      Environment=ASPNETCORE_ENVIRONMENT=Production

      [Install]
      WantedBy=multi-user.target
      EOF
    # Установка прав
    - chmod 755 deb/DEBIAN/preinst deb/DEBIAN/postinst deb/DEBIAN/prerm deb/DEBIAN/postrm
    - chmod 644 deb/DEBIAN/control
    - chmod 755 deb/opt/$PROJECT_NAME/$PROJECT_NAME
    - chmod 644 deb/opt/$PROJECT_NAME/*.dll 2>/dev/null || true
    - echo "Creating control.tar.xz..."
    - tar -cJf control.tar.xz -C deb/DEBIAN .
    - echo "Creating data.tar.xz..."
    - tar -cJf data.tar.xz -C deb --exclude=DEBIAN .
    - echo "Creating debian-binary..."
    - echo "2.0" > debian-binary
    - echo "Building .deb package..."
    - mkdir -p packages
    - ar r ./packages/${DEB_NAME}_amd64.deb debian-binary control.tar.xz data.tar.xz
    - rm -f debian-binary control.tar.xz data.tar.xz
    - ls -l ./packages/${DEB_NAME}_amd64.deb
    - echo "Current directory:$(pwd)"
  artifacts:
    name: "package-${PROJECT_NAME}-${CI_COMMIT_SHORT_SHA}"
    paths:
      - ./packages/