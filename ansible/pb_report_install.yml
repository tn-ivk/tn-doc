---
- name: 'REPORTS install'

  vars_files: 
    - ../inventories/settings.yml
    - ../inventories/global_vars.yml
  hosts: "{{play_host}}"
  #become: true
  tasks:

#### Подключение репозитория
    - import_tasks: ../tasks/t_repo_add.yml
    
##### Добавлление шрифтов
    - name: Copy fonts files
      become: true
      copy:
         src: '{{home_dir}}/distrib/fonts/'
         dest: /usr/share/fonts/
      notify: 
         - Update fonts cache
    
#### Стоп TN_xxx сервис если запущен     
    - name: Stop TN_xxx service (if started)
      become: true
      ignore_errors: true
      systemd:
         name: '{{ item }}'
         state: stopped 
      loop:
        - 'TN_Doc'
        - 'TN_KMH'
        - 'TN_MessagingService'

#### Установка DOTNET
    - import_tasks: ../tasks/t_install_dotnet.yml



