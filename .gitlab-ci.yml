variables:
    VERSION: $CI_COMMIT_TAG
    GIT_SUBMODULE_STRATEGY: recursive
    GIT_SUBMODULE_FORCE_HTTPS: "true"
    GIT_STRATEGY: clone
    DOTNET_SDK_VERSION: "8.0"
    DOTNET_RT_VERSION: "8.0.13"
    PROJECT_NAME: "TN_Doc"

workflow:
  rules:
    # Разрешаем запуск пайплайна по тегу в ЛЮБОЙ ветке
    - if: '$CI_COMMIT_TAG'
    # Оставляем существующие правила для master
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == "master"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "master"'
    - when: never

stages:
  - build
  - package
  - notify

build-job:
  stage: build
  image: mcr.microsoft.com/dotnet/sdk:${DOTNET_SDK_VERSION}
  tags:
    - orpovy
  rules:
    # Строить при теге в любой ветке и при обычных правилах workflow
    - if: '$CI_COMMIT_TAG'
    - when: on_success
  variables:
    NUGET_PACKAGES: ${CI_PROJECT_DIR}/.nuget/packages
    DOTNET_CLI_TELEMETRY_OPTOUT: "true"
    DOTNET_NOLOGO: "true"
  cache:
    key: nuget-${CI_COMMIT_REF_SLUG}
    paths:
      - .nuget/packages/
  before_script:
    - mkdir -p ./publish TN_Doc/Dll
  script:
    - 'dotnet nuget add source "https://nuget.ortpr.ru/v3/index.json" --name ortpr'
    - 'dotnet nuget add source "https://nuget.xn--90aia9aifhdb2cxbdg.xn--p1ai/api/v3/index.json" --name fr_nuget --username "$FR_NUGET_USERNAME" --password "$FR_NUGET_PASSWORD" --store-password-in-clear-text'
    - dotnet build -c Release
    - dotnet publish TN_Doc/TN_Doc.csproj -c Release -r linux-x64 --self-contained false -o ./publish
  artifacts:
    name: "build-TN_Doc-${CI_COMMIT_SHORT_SHA}"
    paths:
      - ./publish/

extract-version-job:
  stage: build
  image: mcr.microsoft.com/dotnet/sdk:${DOTNET_SDK_VERSION}
  tags:
    - orpovy
  rules:
    - if: '$CI_COMMIT_TAG'
    - when: on_success
  script:
    # Установка curl для работы с GitLab API
    - apt-get update && apt-get install -y curl
    # Определение пути к .csproj файлу
    - CSPROJ_FILE="TN_Doc/TN_Doc.csproj"
    # Проверка существования файла
    - if [ ! -f "$CSPROJ_FILE" ]; then echo "Error:$CSPROJ_FILE not found"; exit 1; fi
    # Извлечение версии из .csproj
    - VERSION=$(xmllint --xpath "//Project/PropertyGroup/Version/text()" $CSPROJ_FILE 2>/dev/null || grep -oP '<Version>\K[^<]+' $CSPROJ_FILE)
    # Если запущено по тегу вида v1.2.3 или 1.2.3, то переопределяем VERSION из тега
    - |
      if [ -n "$CI_COMMIT_TAG" ]; then
        TAG_CLEAN=$(echo "$CI_COMMIT_TAG" | sed 's/^v//')
        echo "Tag detected: $CI_COMMIT_TAG -> $TAG_CLEAN"
        VERSION=$TAG_CLEAN
      fi
    - echo "Extracted version:$VERSION"
    # Проверка версии
    - if [ -z "$VERSION" ]; then echo "Error:Version not found in $CSPROJ_FILE"; exit 1; fi
    # Формирование имени переменной для build number
    - BUILD_VAR_NAME="BUILD_NUMBER_$(echo $VERSION | tr '.' '_')"
    - echo "Build variable name:$BUILD_VAR_NAME"
    # Получение текущего build number из переменных проекта
    - |
      CURRENT_BUILD=$(curl -s --header "PRIVATE-TOKEN: $PROJECT_API_TOKEN" \
        "$CI_API_V4_URL/projects/$CI_PROJECT_ID/variables/$BUILD_VAR_NAME" | \
        grep -o '"value":"[^"]*"' | cut -d'"' -f4 || echo "0")
    - if [ -z "$CURRENT_BUILD" ] || [ "$CURRENT_BUILD" = "null" ]; then CURRENT_BUILD=0; fi
    - BUILD_NUMBER=$((CURRENT_BUILD + 1))
    - echo "Current build number:$CURRENT_BUILD, New build number:$BUILD_NUMBER"
    # Обновление build number в переменных проекта
    - |
      RESPONSE=$(curl -s --request PUT --header "PRIVATE-TOKEN: $PROJECT_API_TOKEN" \
        --header "Content-Type: application/json" \
        --data "{\"key\":\"$BUILD_VAR_NAME\",\"value\":\"$BUILD_NUMBER\"}" \
        "$CI_API_V4_URL/projects/$CI_PROJECT_ID/variables/$BUILD_VAR_NAME")
      if echo "$RESPONSE" | grep -q "404\|message"; then
        echo "Variable does not exist, creating new one..."
        curl -s --request POST --header "PRIVATE-TOKEN: $PROJECT_API_TOKEN" \
          --header "Content-Type: application/json" \
          --data "{\"key\":\"$BUILD_VAR_NAME\",\"value\":\"$BUILD_NUMBER\"}" \
          "$CI_API_V4_URL/projects/$CI_PROJECT_ID/variables"
      fi
      echo "Build number updated successfully"
    # Формирование ревизии из CI_COMMIT_SHORT_SHA
    - REVISION="b${BUILD_NUMBER}-${CI_COMMIT_SHORT_SHA}"
    # Формирование полной версии
    - FULL_VERSION="${VERSION}-${REVISION}"
    - echo "Full version:$FULL_VERSION"
    # Сохранение переменных для последующих этапов
    - echo "FULL_VERSION=$FULL_VERSION" > version.env
    - echo "VERSION=$VERSION" >> version.env
    - echo "REVISION=$REVISION" >> version.env
    - echo "BUILD_NUMBER=$BUILD_NUMBER" >> version.env
    - echo "PACKAGE_NAME=TN_Doc" >> version.env
  artifacts:
    reports:
      dotenv: version.env

build-windows-job:      # Cross-compile Windows binaries on Linux runner
  stage: build
  image: mcr.microsoft.com/dotnet/sdk:${DOTNET_SDK_VERSION}
  tags:
    - orpovy
  rules:
    - if: '$CI_COMMIT_TAG'
    - when: on_success
  variables:
    NUGET_PACKAGES: ${CI_PROJECT_DIR}/.nuget/packages
    DOTNET_CLI_TELEMETRY_OPTOUT: "true"
    DOTNET_NOLOGO: "true"
  cache:
    key: nuget-win-${CI_COMMIT_REF_SLUG}
    paths:
      - .nuget/packages/
  before_script:
    - mkdir -p ./publish/win-x64-full ./publish/win-x64-minimal TN_Doc/Dll
  script:
    - 'dotnet nuget add source "https://nuget.ortpr.ru/v3/index.json" --name ortpr'
    - 'dotnet nuget add source "https://nuget.xn--90aia9aifhdb2cxbdg.xn--p1ai/api/v3/index.json" --name fr_nuget --username "$FR_NUGET_USERNAME" --password "$FR_NUGET_PASSWORD" --store-password-in-clear-text'
    - dotnet build -c Release
    - dotnet publish TN_Doc/TN_Doc.csproj -c Release -r win-x64 --self-contained true -o ./publish/win-x64-full
    - dotnet publish TN_Doc/TN_Doc.csproj -c Release -r win-x64 --self-contained false -o ./publish/win-x64-minimal
  artifacts:
    name: "build-TN_Doc-win-${CI_COMMIT_SHORT_SHA}"
    paths:
      - ./publish/win-x64-full/
      - ./publish/win-x64-minimal/

package-job:      # This job runs in the deploy stage.
  stage: package
  image: debian:bookworm-slim
  needs:
    - build-job
    - extract-version-job
  tags:
    - orpovy
  rules:
    - if: '$CI_COMMIT_TAG'
    - when: on_success
  before_script:
    - apt-get update -qq && apt-get install -y --no-install-recommends dpkg-dev
  script:
    - echo "Packaging the application into a .deb file..."
    - DEB_NAME="$(echo "TN_Doc" | tr '[:upper:]' '[:lower:]' | tr '_' '.')-full-${FULL_VERSION}"
    - echo "DEB_NAME=$DEB_NAME"
    # Создание структуры пакета
    - mkdir -p deb/DEBIAN
    - mkdir -p deb/opt/TN_Doc
    - mkdir -p deb/var/log/TN_Doc
    - mkdir -p deb/etc/systemd/system
    - mkdir -p deb/usr/share/fonts
    - mkdir -p deb/usr/local/bin
    # Создание уникальной временной директории для зависимостей
    - mkdir -p deb/tmp/TN_Doc
    # Копирование файлов приложения
    - cp -r ./publish/* deb/opt/TN_Doc/
    # Копирование .NET Runtime если есть в distrib
    - if [ -f "distrib/aspnetcore-runtime-8.0.13-linux-x64.tar.gz" ]; then cp distrib/aspnetcore-runtime-8.0.13-linux-x64.tar.gz deb/tmp/TN_Doc/; fi
    # Копирование шрифтов в пакет (если присутствуют в репозитории)
    - if [ -d "fonts" ]; then cp -r fonts/* deb/usr/share/fonts/; fi
    # Генерация скрипта восстановления
    - |
      cat << 'RESTORE_EOF' > deb/usr/local/bin/tn-doc-restore.sh
      #!/bin/bash
      set -e

      BACKUP_DIR="/var/backups/TN_Doc"
      OPT_DIR="/opt/TN_Doc"
      SERVICE="TN_Doc.service"

      usage() {
          echo "Usage: sudo $0 [--list | --latest | <backup_file>]"
          echo "  --list    Show available backups"
          echo "  --latest  Restore latest backup"
      }

      list_backups() {
          echo "=== Available backups ==="
          ls -lh "$BACKUP_DIR"/*.tar.gz 2>/dev/null || echo "No backups found"
      }

      restore() {
          local FILE="$1"
          [ ! -f "$FILE" ] && echo "File not found: $FILE" && exit 1

          echo "=== Restoring from: $FILE ==="
          systemctl stop "$SERVICE" 2>/dev/null || true
          rm -rf "$OPT_DIR"
          tar -xzf "$FILE" -C /opt
          chown -R alphadaemon:alphadaemon "$OPT_DIR"
          chmod 755 "$OPT_DIR/TN_Doc" 2>/dev/null || true
          systemctl start "$SERVICE"

          sleep 2
          systemctl is-active --quiet "$SERVICE" && echo "✓ Restored successfully" || echo "! Service may have failed"
      }

      [ "$EUID" -ne 0 ] && echo "Run as root" && exit 1

      case "${1:-}" in
          --list) list_backups ;;
          --latest) restore "$(ls -t "$BACKUP_DIR"/*.tar.gz 2>/dev/null | head -1)" ;;
          "") usage ;;
          *) [[ "$1" != /* ]] && restore "$BACKUP_DIR/$1" || restore "$1" ;;
      esac
      RESTORE_EOF
    - chmod 755 deb/usr/local/bin/tn-doc-restore.sh
    # Генерация control
    - |
      cat << EOF > deb/DEBIAN/control
      Package: tn.doc-full
      Version: ${VERSION}
      Section: utils
      Priority: optional
      Architecture: amd64
      Depends: systemd
      Maintainer: DadonovAD <dadonovad@transneft.ru>
      Description: TN_Doc это приложение для работы с документами СОИ СИКН/ОСИКН (полная версия).
       Включает .NET Runtime 8.0.13 и системные шрифты для автономной работы.
      Homepage:

      EOF
    # Генерация preinst с хардкод значениями (оптимизированный вывод)
    - |
      cat << EOF > deb/DEBIAN/preinst
      #!/bin/bash
      set -e

      echo "============================================"
      echo "Starting pre-installation script for TN_Doc (full version)"
      echo "============================================"

      # Проверка .NET Runtime перед установкой
      check_dotnet_runtime() {
          # Проверка наличия .NET Runtime
          if [ ! -d "/usr/bin/dotnet/shared/Microsoft.NETCore.App" ]; then
              echo "Warning: .NET Runtime 8 is not installed. Will install from local archive."
              return 1
          fi

          # Проверка версии .NET Runtime
          REQUIRED_VERSION="8.0.13"
          INSTALLED_VERSION=\$(ls /usr/bin/dotnet/shared/Microsoft.NETCore.App 2>/dev/null | grep -E '^8\.0\.[0-9]+\$' | sort -V | tail -n 1)

          if [ -z "\$INSTALLED_VERSION" ]; then
              echo "Warning: No compatible .NET Runtime 8 version found. Will install from local archive."
              return 1
          fi

          if [ "\$(printf '%s\n' "\$INSTALLED_VERSION" "\$REQUIRED_VERSION" | sort -V | head -n1)" != "\$REQUIRED_VERSION" ]; then
              echo "Warning: .NET Runtime version \$INSTALLED_VERSION < \$REQUIRED_VERSION. Will install from local archive."
              return 1
          fi

          echo "✓ .NET Runtime version \$INSTALLED_VERSION is compatible (>= \$REQUIRED_VERSION)"
          return 0
      }

      # Проверка .NET Runtime (установка будет в postinst если нужно)
      check_dotnet_runtime || echo "Will install .NET Runtime in postinst"

      # Очистка временной директории TN_Doc
      echo "Cleaning /tmp/TN_Doc directory..."
      rm -rf /tmp/TN_Doc
      echo "✓ Temporary directory cleaned"

      # Остановка службы TN_Doc, если она запущена
      if systemctl is-active --quiet TN_Doc.service; then
          echo "Stopping TN_Doc.service..."
          systemctl stop TN_Doc.service
      fi

      # === Backup section ===
      create_backup() {
          local OPT_DIR="/opt/TN_Doc"
          local BACKUP_DIR="/var/backups/TN_Doc"
          local NEW_VERSION="${VERSION}"  # Подставляется при сборке пакета

          # Первая установка — бэкап не нужен
          if [ ! -d "\$OPT_DIR" ]; then
              echo "First installation detected, no backup needed"
              return 0
          fi

          # Создание директории для бэкапов
          echo "=== Creating backup before update to v\${NEW_VERSION} ==="
          mkdir -p "\$BACKUP_DIR"
          if [ \$? -ne 0 ]; then
              echo "✗ ERROR: Cannot create backup directory \$BACKUP_DIR"
              exit 1
          fi

          # Формирование имени файла
          local TIMESTAMP=\$(date +%Y-%m-%d_%H-%M-%S)
          local BACKUP_FILE="\${BACKUP_DIR}/\${TIMESTAMP}_TN_Doc_before-update-to_v\${NEW_VERSION}.tar.gz"

          echo "Source: \$OPT_DIR"
          echo "Destination: \$BACKUP_FILE"

          # Создание бэкапа (исключая логи)
          tar -czf "\$BACKUP_FILE" --exclude='logs' --exclude='*.log' -C /opt TN_Doc 2>&1
          if [ \$? -ne 0 ]; then
              echo "✗ ERROR: Failed to create backup"
              echo "Check available disk space and permissions"
              rm -f "\$BACKUP_FILE"
              exit 1
          fi

          # Проверка файла
          if [ ! -s "\$BACKUP_FILE" ]; then
              echo "✗ ERROR: Backup file is empty"
              exit 1
          fi

          local BACKUP_SIZE=\$(du -h "\$BACKUP_FILE" | cut -f1)
          echo "✓ Backup created: \$BACKUP_FILE (\$BACKUP_SIZE)"
      }

      create_backup
      # === End backup section ===

      # Удаление старых директорий
      echo "Removing old TN_Doc directories..."
      OPT_DIR="/opt/TN_Doc"
      LOG_DIR="/var/log/TN_Doc"
      for dir in "\$OPT_DIR" "\$LOG_DIR"; do
          if [ -d "\$dir" ]; then
              echo "Removing directory: \$dir"
              rm -rf "\$dir"
              if [ \$? -eq 0 ]; then
                  echo "✓ Successfully removed \$dir"
              else
                  echo "! WARNING: Failed to remove \$dir"
              fi
          fi
      done
      echo "=== Old directories cleanup completed ==="

      exit 0
      EOF
    - chmod +x deb/DEBIAN/preinst
    # Генерация prerm с хардкод значениями (убрана отладочная информация)
    - |
      cat << EOF > deb/DEBIAN/prerm
      #!/bin/bash
      set -e

      echo "============================================"
      echo "Starting pre-removal script for TN_Doc (full version)"
      echo "============================================"

      # Остановка службы TN_Doc, если она запущена
      if systemctl is-active --quiet TN_Doc.service; then
          echo "Stopping TN_Doc.service..."
          systemctl stop TN_Doc.service
          if [ \$? -eq 0 ]; then
              echo "✓ Service stopped successfully"
          else
              echo "! WARNING: Failed to stop service"
          fi
      fi

      exit 0
      EOF
    - chmod +x deb/DEBIAN/prerm
    # Генерация postinst с хардкод значениями (оптимизированный вывод)
    - |
      cat << EOF > deb/DEBIAN/postinst
      #!/bin/bash
      set -e

      echo "============================================"
      echo "Starting post-installation script for TN_Doc (full version)"
      echo "============================================"
      echo "Installing dependencies for TN_Doc..."

      # Установка .NET Runtime
      install_dotnet_runtime() {
          echo "=== Starting .NET Runtime installation check ==="

          # Проверяем, нужна ли установка
          REQUIRED_VERSION="8.0.13"

          if [ -d "/usr/bin/dotnet/shared/Microsoft.NETCore.App" ]; then
              INSTALLED_VERSION=\$(ls /usr/bin/dotnet/shared/Microsoft.NETCore.App 2>/dev/null | grep -E '^8\.0\.[0-9]+\$' | sort -V | tail -n 1)

              if [ -n "\$INSTALLED_VERSION" ] && [ "\$(printf '%s\n' "\$INSTALLED_VERSION" "\$REQUIRED_VERSION" | sort -V | head -n1)" = "\$REQUIRED_VERSION" ]; then
                  echo "✓ .NET Runtime version \$INSTALLED_VERSION is already installed and compatible"
                  echo "=== Skipping .NET Runtime installation ==="
                  return 0
              else
                  echo "! Installed version \$INSTALLED_VERSION is not compatible with required \$REQUIRED_VERSION"
              fi
          else
              echo "! .NET Runtime directory not found, installation required"
          fi

          echo "=== Starting .NET Runtime installation ==="

          # Проверяем наличие локального архива
          if [ -f "/tmp/TN_Doc/aspnetcore-runtime-8.0.13-linux-x64.tar.gz" ]; then
              echo "✓ Found .NET Runtime archive"

              # Создаем директорию для .NET
              echo "Creating .NET directory: /usr/bin/dotnet"
              mkdir -p /usr/bin/dotnet

              # Распаковываем архив напрямую в /usr/bin/dotnet
              echo "Extracting .NET Runtime archive..."
              tar -xzf /tmp/TN_Doc/aspnetcore-runtime-8.0.13-linux-x64.tar.gz -C /usr/bin/dotnet
              if [ \$? -eq 0 ]; then
                  echo "✓ Archive extracted successfully"
              else
                  echo "✗ ERROR: Failed to extract archive"
                  exit 1
              fi

              # Удаляем архив
              rm -f /tmp/TN_Doc/aspnetcore-runtime-8.0.13-linux-x64.tar.gz
              echo "✓ .NET Runtime 8.0.13 installed successfully"
          else
              echo "✗ ERROR: .NET Runtime archive not found at /tmp/TN_Doc/aspnetcore-runtime-8.0.13-linux-x64.tar.gz"
              echo "Please ensure the archive is available before installing this package."
              exit 1
          fi

          echo "=== .NET Runtime installation completed ==="
      }

      # Установка переменных окружения для пользователей
      setup_dotnet_environment() {
          echo "=== Setting up .NET environment variables ==="

          # Создание переменных окружения для пользователя administrator
          if [ -f "/home/administrator/.profile" ]; then
              if ! grep -q "DOTNET_ROOT=/usr/bin/dotnet" /home/administrator/.profile; then
                  echo 'DOTNET_ROOT=/usr/bin/dotnet' >> /home/administrator/.profile
                  echo "✓ Added DOTNET_ROOT to administrator's .profile"
              fi
              if ! grep -q "PATH.*:/usr/bin/dotnet" /home/administrator/.profile; then
                  echo 'PATH=\$PATH:/usr/bin/dotnet' >> /home/administrator/.profile
                  echo "✓ Added /usr/bin/dotnet to PATH in administrator's .profile"
              fi
          fi

          # Создание переменных окружения для пользователя operators
          if [ -f "/home/operators/.profile" ]; then
              if ! grep -q "DOTNET_ROOT=/usr/bin/dotnet" /home/operators/.profile; then
                  echo 'DOTNET_ROOT=/usr/bin/dotnet' >> /home/operators/.profile
                  echo "✓ Added DOTNET_ROOT to operators's .profile"
              fi
              if ! grep -q "PATH.*:/usr/bin/dotnet" /home/operators/.profile; then
                  echo 'PATH=\$PATH:/usr/bin/dotnet' >> /home/operators/.profile
                  echo "✓ Added /usr/bin/dotnet to PATH in operators's .profile"
              fi
          fi

          # Создание переменных окружения для пользователя engineer
          if [ -f "/home/engineer/.profile" ]; then
              if ! grep -q "DOTNET_ROOT=/usr/bin/dotnet" /home/engineer/.profile; then
                  echo 'DOTNET_ROOT=/usr/bin/dotnet' >> /home/engineer/.profile
                  echo "✓ Added DOTNET_ROOT to engineer's .profile"
              fi
              if ! grep -q "PATH.*:/usr/bin/dotnet" /home/engineer/.profile; then
                  echo 'PATH=\$PATH:/usr/bin/dotnet' >> /home/engineer/.profile
                  echo "✓ Added /usr/bin/dotnet to PATH in engineer's .profile"
              fi
          fi

          echo "=== Environment setup completed ==="
      }

      echo "=== Starting application dependencies installation ==="

      # Установка .NET Runtime
      echo "Step 1: Installing .NET Runtime..."
      install_dotnet_runtime
      echo "✓ .NET Runtime setup completed"

      # Установка переменных окружения для пользователей
      echo "Step 2: Setting up environment variables..."
      setup_dotnet_environment
      echo "✓ Environment variables setup completed"

      # Обновление кэша шрифтов (без verbose вывода)
      echo "Step 3: Updating font cache..."
      fc-cache -f || true
      echo "✓ Font cache updated"

      # Установка прав и владельцев
      echo "Step 4: Setting up application permissions..."
      chmod 755 /opt/TN_Doc/TN_Doc
      if [ \$? -eq 0 ]; then
          echo "✓ Executable permissions set"
      else
          echo "! WARNING: Failed to set executable permissions"
      fi

      chmod 644 /opt/TN_Doc/*.dll
      chown -R alphadaemon:alphadaemon /opt/TN_Doc
      if [ \$? -eq 0 ]; then
          echo "✓ Ownership set successfully"
      else
          echo "! WARNING: Failed to set ownership"
      fi

      chmod u=rwx,g=rx,o=rx /opt/TN_Doc
      chown alphadaemon:alphadaemon /var/log/TN_Doc
      chmod u=rwx,g=rx,o=rx /var/log/TN_Doc
      echo "✓ Application permissions setup completed"

      # Перезагрузка systemd
      echo "Step 5: Reloading systemd daemon..."
      systemctl daemon-reload
      echo "✓ Systemd daemon reloaded"

      # Включение и запуск сервиса
      echo "Step 6: Enabling and starting application service..."

      # Проверка наличия необходимых файлов
      if [ -f "/usr/bin/dotnet/dotnet" ] && [ -f "/opt/TN_Doc/TN_Doc" ]; then
          echo "✓ All required binaries found"
      else
          echo "! WARNING: Some binaries missing"
          [ ! -f "/usr/bin/dotnet/dotnet" ] && echo "  - dotnet binary not found"
          [ ! -f "/opt/TN_Doc/TN_Doc" ] && echo "  - application binary not found"
      fi

      systemctl enable TN_Doc.service
      systemctl start TN_Doc.service

      # Проверка статуса сервиса
      sleep 2
      if systemctl is-active --quiet TN_Doc.service; then
          echo "✓ Application service started successfully"
      else
          echo "! WARNING: Service failed to start. Checking logs..."
          journalctl -u TN_Doc.service -n 10 --no-pager || echo "Cannot read journal logs"
      fi

      # Финальная очистка временной директории
      echo "Final cleanup: Removing /tmp/TN_Doc directory..."
      rm -rf /tmp/TN_Doc
      echo "✓ Temporary directory cleaned"

      echo "=== TN_Doc installation completed successfully ==="
      echo "============================================"
      exit 0
      EOF
    - chmod +x deb/DEBIAN/postinst
    # Генерация postrm с хардкод значениями
    - |
      cat << EOF > deb/DEBIAN/postrm
      #!/bin/bash
      set -e

      echo "============================================"
      echo "Starting post-removal script for TN_Doc (full version)"
      echo "============================================"

      # Удаление директорий при полной очистке (purge)
      if [ "\$1" = "purge" ]; then
          echo "Purging TN_Doc directories..."
          OPT_DIR="/opt/TN_Doc"
          LOG_DIR="/var/log/TN_Doc"
          for dir in "\$OPT_DIR" "\$LOG_DIR"; do
              if [ -d "\$dir" ]; then
                  echo "Removing directory: \$dir"
                  rm -rf "\$dir"
                  if [ \$? -eq 0 ]; then
                      echo "✓ Successfully removed \$dir"
                  else
                      echo "! WARNING: Failed to remove \$dir"
                  fi
              fi
          done

          # Удаление systemd service
          echo "Removing systemd service..."
          systemctl disable TN_Doc.service 2>/dev/null || true
          rm -f /etc/systemd/system/TN_Doc.service
          systemctl daemon-reload
          echo "✓ Systemd service removed"
      fi

      exit 0
      EOF
    - chmod +x deb/DEBIAN/postrm
    # Генерация systemd unit с хардкод значениями
    - |
      cat << EOF > deb/etc/systemd/system/TN_Doc.service
      [Unit]
      Description=Service TN_Doc (full version)

      [Service]
      WorkingDirectory=/opt/TN_Doc/
      ExecStart=/usr/bin/dotnet/dotnet /opt/TN_Doc/TN_Doc.dll
      Restart=always
      RestartSec=10
      SyslogIdentifier=dotnet-TN_Doc
      User=alphadaemon
      Environment=ASPNETCORE_ENVIRONMENT=Production

      [Install]
      WantedBy=multi-user.target
      EOF
    # Установка прав
    - chmod 755 deb/DEBIAN/preinst deb/DEBIAN/postinst deb/DEBIAN/prerm deb/DEBIAN/postrm
    - chmod 644 deb/DEBIAN/control
    - chmod 755 deb/opt/TN_Doc/TN_Doc
    - chmod 644 deb/opt/TN_Doc/*.dll 2>/dev/null || true
    - echo "Creating control.tar.xz..."
    - tar -cJf control.tar.xz -C deb/DEBIAN .
    - echo "Creating data.tar.xz..."
    - tar -cJf data.tar.xz -C deb --exclude=DEBIAN .
    - echo "Creating debian-binary..."
    - echo "2.0" > debian-binary
    - echo "Building .deb package..."
    - mkdir -p packages
    - ar r ./packages/${DEB_NAME}_amd64.deb debian-binary control.tar.xz data.tar.xz
    - rm -f debian-binary control.tar.xz data.tar.xz
    - ls -l ./packages/${DEB_NAME}_amd64.deb
    - echo "Current directory:$(pwd)"
  artifacts:
