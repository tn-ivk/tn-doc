variables:
    VERSION: $CI_COMMIT_TAG
    GIT_SUBMODULE_STRATEGY: recursive
    GIT_SUBMODULE_FORCE_HTTPS: "true"
    GIT_STRATEGY: clone
    DOTNET_SDK_VERSION: "8.0"
    DOTNET_RT_VERSION: "8.0.13"   
    PROJECT_NAME: "TN_Doc"  

stages:          
  - build
  - package 

build-job:
  stage: build
  image: mcr.microsoft.com/dotnet/sdk:${DOTNET_SDK_VERSION}
  rules:
    - if: $CI_COMMIT_TAG =~ /^\d+\.\d+(\.\d+)?$/
  tags:
    - orpovy
  before_script:
    # Создание директории для публикации
    - mkdir -p ./publish
    - mkdir -p TN_Doc/Dll
  script:
    - echo "Adding NuGet sources..."    
    - 'dotnet nuget add source "https://nuget.ortpr.ru/v3/index.json" --name ortpr'
    - 'dotnet nuget add source "https://nuget.xn--90aia9aifhdb2cxbdg.xn--p1ai/api/v3/index.json" --name fr_nuget --username "$FR_NUGET_USERNAME" --password "$FR_NUGET_PASSWORD" --store-password-in-clear-text'
    - echo "Rebuilding solution ..."
    - dotnet build
    - echo "Moving to TN_Doc..."
    - cd TN_Doc
    - echo "Current directory after cd:$(pwd)"
    - echo "Building the application..."
    - dotnet publish TN_Doc.csproj -c Release -r linux-x64 --self-contained false -o ../publish
  artifacts:
    name: "build-TN_Doc-${CI_COMMIT_SHORT_SHA}"
    paths:
      - ./publish/

extract-version-job:       
  stage: build
  image: mcr.microsoft.com/dotnet/sdk:${DOTNET_SDK_VERSION}
  rules:
    - if: $CI_COMMIT_TAG =~ /^\d+\.\d+(\.\d+)?$/
  tags:
    - orpovy
  script:
    # Установка curl для работы с GitLab API
    - apt-get update && apt-get install -y curl
    # Определение пути к .csproj файлу
    - CSPROJ_FILE="TN_Doc/TN_Doc.csproj"
    # Проверка существования файла
    - if [ ! -f "$CSPROJ_FILE" ]; then echo "Error:$CSPROJ_FILE not found"; exit 1; fi
    # Извлечение версии из .csproj
    - VERSION=$(xmllint --xpath "//Project/PropertyGroup/Version/text()" $CSPROJ_FILE 2>/dev/null || grep -oP '<Version>\K[^<]+' $CSPROJ_FILE)
    - echo "Extracted version:$VERSION"
    # Проверка версии
    - if [ -z "$VERSION" ]; then echo "Error:Version not found in $CSPROJ_FILE"; exit 1; fi
    # Формирование имени переменной для build number
    - BUILD_VAR_NAME="BUILD_NUMBER_$(echo $VERSION | tr '.' '_')"
    - echo "Build variable name:$BUILD_VAR_NAME"
    # Получение текущего build number из переменных проекта
    - |
      CURRENT_BUILD=$(curl -s --header "PRIVATE-TOKEN: $PROJECT_API_TOKEN" \
        "$CI_API_V4_URL/projects/$CI_PROJECT_ID/variables/$BUILD_VAR_NAME" | \
        grep -o '"value":"[^"]*"' | cut -d'"' -f4 || echo "0")
    - if [ -z "$CURRENT_BUILD" ] || [ "$CURRENT_BUILD" = "null" ]; then CURRENT_BUILD=0; fi
    - BUILD_NUMBER=$((CURRENT_BUILD + 1))
    - echo "Current build number:$CURRENT_BUILD, New build number:$BUILD_NUMBER"
    # Обновление build number в переменных проекта
    - |
      RESPONSE=$(curl -s --request PUT --header "PRIVATE-TOKEN: $PROJECT_API_TOKEN" \
        --header "Content-Type: application/json" \
        --data "{\"key\":\"$BUILD_VAR_NAME\",\"value\":\"$BUILD_NUMBER\"}" \
        "$CI_API_V4_URL/projects/$CI_PROJECT_ID/variables/$BUILD_VAR_NAME")
      if echo "$RESPONSE" | grep -q "404\|message"; then
        echo "Variable does not exist, creating new one..."
        curl -s --request POST --header "PRIVATE-TOKEN: $PROJECT_API_TOKEN" \
          --header "Content-Type: application/json" \
          --data "{\"key\":\"$BUILD_VAR_NAME\",\"value\":\"$BUILD_NUMBER\"}" \
          "$CI_API_V4_URL/projects/$CI_PROJECT_ID/variables"
      fi
      echo "Build number updated successfully"
    # Формирование ревизии из CI_COMMIT_SHORT_SHA
    - REVISION="b${BUILD_NUMBER}-${CI_COMMIT_SHORT_SHA}"
    # Формирование полной версии
    - FULL_VERSION="${VERSION}-${REVISION}"
    - echo "Full version:$FULL_VERSION"
    # Сохранение переменных для последующих этапов
    - echo "FULL_VERSION=$FULL_VERSION" > version.env
    - echo "VERSION=$VERSION" >> version.env
    - echo "REVISION=$REVISION" >> version.env
    - echo "BUILD_NUMBER=$BUILD_NUMBER" >> version.env
    - echo "PACKAGE_NAME=TN_Doc" >> version.env
  artifacts:
    reports:
      dotenv: version.env

package-job:      # This job runs in the deploy stage.
  stage: package
  image: ubuntu:latest
  rules:
    - if: $CI_COMMIT_TAG =~ /^\d+\.\d+(\.\d+)?$/
  needs:
    - build-job
    - extract-version-job
  tags:
    - orpovy
  before_script:
    - apt-get update && apt-get install -y dpkg-dev
  script:
    - echo "Packaging the application into a .deb file..."
    - DEB_NAME="$(echo "TN_Doc" | tr '[:upper:]' '[:lower:]' | tr '_' '.')-full-${FULL_VERSION}"
    - echo "DEB_NAME=$DEB_NAME"
    # Создание структуры пакета
    - mkdir -p deb/DEBIAN
    - mkdir -p deb/opt/TN_Doc
    - mkdir -p deb/var/log/TN_Doc
    - mkdir -p deb/etc/systemd/system
    - mkdir -p deb/usr/share/fonts
    - mkdir -p deb/usr/local/bin
    # Создание уникальной временной директории для зависимостей
    - mkdir -p deb/tmp/TN_Doc
    # Копирование файлов приложения
    - cp -r ./publish/* deb/opt/TN_Doc/
    # Копирование .NET Runtime если есть в distrib
    - if [ -f "distrib/aspnetcore-runtime-8.0.13-linux-x64.tar.gz" ]; then cp distrib/aspnetcore-runtime-8.0.13-linux-x64.tar.gz deb/tmp/TN_Doc/; fi
    # Копирование шрифтов в пакет (если присутствуют в репозитории)
    - if [ -d "fonts" ]; then cp -r fonts/* deb/usr/share/fonts/; fi
    # Генерация control
    - |
      cat << EOF > deb/DEBIAN/control
      Package: tn.doc-full
      Version: ${VERSION}
      Section: utils
      Priority: optional
      Architecture: amd64
      Depends: systemd
      Maintainer: DadonovAD <dadonovad@transneft.ru>
      Description: TN_Doc это приложение для работы с документами СОИ СИКН/ОСИКН (полная версия).
       Включает .NET Runtime 8.0.13 и системные шрифты для автономной работы.
      Homepage:

      EOF
    # Генерация preinst с хардкод значениями (оптимизированный вывод)
    - |
      cat << EOF > deb/DEBIAN/preinst
      #!/bin/bash
      set -e

      echo "============================================"
      echo "Starting pre-installation script for TN_Doc (full version)"
      echo "============================================"

      # Проверка .NET Runtime перед установкой
      check_dotnet_runtime() {
          # Проверка наличия .NET Runtime
          if [ ! -d "/usr/bin/dotnet/shared/Microsoft.NETCore.App" ]; then
              echo "Warning: .NET Runtime 8 is not installed. Will install from local archive."
              return 1
          fi

          # Проверка версии .NET Runtime
          REQUIRED_VERSION="8.0.13"
          INSTALLED_VERSION=\$(ls /usr/bin/dotnet/shared/Microsoft.NETCore.App 2>/dev/null | grep -E '^8\.0\.[0-9]+\$' | sort -V | tail -n 1)
          
          if [ -z "\$INSTALLED_VERSION" ]; then
              echo "Warning: No compatible .NET Runtime 8 version found. Will install from local archive."
              return 1
          fi

          if [ "\$(printf '%s\n' "\$INSTALLED_VERSION" "\$REQUIRED_VERSION" | sort -V | head -n1)" != "\$REQUIRED_VERSION" ]; then
              echo "Warning: .NET Runtime version \$INSTALLED_VERSION < \$REQUIRED_VERSION. Will install from local archive."
              return 1
          fi

          echo "✓ .NET Runtime version \$INSTALLED_VERSION is compatible (>= \$REQUIRED_VERSION)"
          return 0
      }

      # Проверка .NET Runtime (установка будет в postinst если нужно)
      check_dotnet_runtime || echo "Will install .NET Runtime in postinst"

      # Очистка временной директории TN_Doc
      echo "Cleaning /tmp/TN_Doc directory..."
      rm -rf /tmp/TN_Doc
      echo "✓ Temporary directory cleaned"

      # Остановка службы TN_Doc, если она запущена
      if systemctl is-active --quiet TN_Doc.service; then
          echo "Stopping TN_Doc.service..."
          systemctl stop TN_Doc.service
      fi

      # Удаление старых директорий
      echo "Removing old TN_Doc directories..."
      OPT_DIR="/opt/TN_Doc"
      LOG_DIR="/var/log/TN_Doc"
      for dir in "\$OPT_DIR" "\$LOG_DIR"; do
          if [ -d "\$dir" ]; then
              echo "Removing directory: \$dir"
              rm -rf "\$dir"
              if [ \$? -eq 0 ]; then
                  echo "✓ Successfully removed \$dir"
              else
                  echo "! WARNING: Failed to remove \$dir"
              fi
          fi
      done
      echo "=== Old directories cleanup completed ==="

      exit 0
      EOF
    - chmod +x deb/DEBIAN/preinst
    # Генерация prerm с хардкод значениями (убрана отладочная информация)
    - |
      cat << EOF > deb/DEBIAN/prerm
      #!/bin/bash
      set -e

      echo "============================================"
      echo "Starting pre-removal script for TN_Doc (full version)"
      echo "============================================"

      # Остановка службы TN_Doc, если она запущена
      if systemctl is-active --quiet TN_Doc.service; then
          echo "Stopping TN_Doc.service..."
          systemctl stop TN_Doc.service
          if [ \$? -eq 0 ]; then
              echo "✓ Service stopped successfully"
          else
              echo "! WARNING: Failed to stop service"
          fi
      fi

      exit 0
      EOF
    - chmod +x deb/DEBIAN/prerm
    # Генерация postinst с хардкод значениями (оптимизированный вывод)
    - |
      cat << EOF > deb/DEBIAN/postinst
      #!/bin/bash
      set -e

      echo "============================================"
      echo "Starting post-installation script for TN_Doc (full version)"
      echo "============================================"
      echo "Installing dependencies for TN_Doc..."

      # Установка .NET Runtime
      install_dotnet_runtime() {
          echo "=== Starting .NET Runtime installation check ==="
          
          # Проверяем, нужна ли установка
          REQUIRED_VERSION="8.0.13"

          if [ -d "/usr/bin/dotnet/shared/Microsoft.NETCore.App" ]; then
              INSTALLED_VERSION=\$(ls /usr/bin/dotnet/shared/Microsoft.NETCore.App 2>/dev/null | grep -E '^8\.0\.[0-9]+\$' | sort -V | tail -n 1)
              
              if [ -n "\$INSTALLED_VERSION" ] && [ "\$(printf '%s\n' "\$INSTALLED_VERSION" "\$REQUIRED_VERSION" | sort -V | head -n1)" = "\$REQUIRED_VERSION" ]; then
                  echo "✓ .NET Runtime version \$INSTALLED_VERSION is already installed and compatible"
                  echo "=== Skipping .NET Runtime installation ==="
                  return 0
              else
                  echo "! Installed version \$INSTALLED_VERSION is not compatible with required \$REQUIRED_VERSION"
              fi
          else
              echo "! .NET Runtime directory not found, installation required"
          fi
          
          echo "=== Starting .NET Runtime installation ==="
          
          # Проверяем наличие локального архива
          if [ -f "/tmp/TN_Doc/aspnetcore-runtime-8.0.13-linux-x64.tar.gz" ]; then
              echo "✓ Found .NET Runtime archive"

              # Создаем директорию для .NET
              echo "Creating .NET directory: /usr/bin/dotnet"
              mkdir -p /usr/bin/dotnet

              # Распаковываем архив напрямую в /usr/bin/dotnet
              echo "Extracting .NET Runtime archive..."
              tar -xzf /tmp/TN_Doc/aspnetcore-runtime-8.0.13-linux-x64.tar.gz -C /usr/bin/dotnet
              if [ \$? -eq 0 ]; then
                  echo "✓ Archive extracted successfully"
              else
                  echo "✗ ERROR: Failed to extract archive"
                  exit 1
              fi

              # Удаляем архив
              rm -f /tmp/TN_Doc/aspnetcore-runtime-8.0.13-linux-x64.tar.gz
              echo "✓ .NET Runtime 8.0.13 installed successfully"
          else
              echo "✗ ERROR: .NET Runtime archive not found at /tmp/TN_Doc/aspnetcore-runtime-8.0.13-linux-x64.tar.gz"
              echo "Please ensure the archive is available before installing this package."
              exit 1
          fi

          echo "=== .NET Runtime installation completed ==="
      }

      # Установка переменных окружения для пользователей
      setup_dotnet_environment() {
          echo "=== Setting up .NET environment variables ==="

          # Создание переменных окружения для пользователя administrator
          if [ -f "/home/administrator/.profile" ]; then
              if ! grep -q "DOTNET_ROOT=/usr/bin/dotnet" /home/administrator/.profile; then
                  echo 'DOTNET_ROOT=/usr/bin/dotnet' >> /home/administrator/.profile
                  echo "✓ Added DOTNET_ROOT to administrator's .profile"
              fi
              if ! grep -q "PATH.*:/usr/bin/dotnet" /home/administrator/.profile; then
                  echo 'PATH=\$PATH:/usr/bin/dotnet' >> /home/administrator/.profile
                  echo "✓ Added /usr/bin/dotnet to PATH in administrator's .profile"
              fi
          fi

          # Создание переменных окружения для пользователя operators
          if [ -f "/home/operators/.profile" ]; then
              if ! grep -q "DOTNET_ROOT=/usr/bin/dotnet" /home/operators/.profile; then
                  echo 'DOTNET_ROOT=/usr/bin/dotnet' >> /home/operators/.profile
                  echo "✓ Added DOTNET_ROOT to operators's .profile"
              fi
              if ! grep -q "PATH.*:/usr/bin/dotnet" /home/operators/.profile; then
                  echo 'PATH=\$PATH:/usr/bin/dotnet' >> /home/operators/.profile
                  echo "✓ Added /usr/bin/dotnet to PATH in operators's .profile"
              fi
          fi

          # Создание переменных окружения для пользователя engineer
          if [ -f "/home/engineer/.profile" ]; then
              if ! grep -q "DOTNET_ROOT=/usr/bin/dotnet" /home/engineer/.profile; then
                  echo 'DOTNET_ROOT=/usr/bin/dotnet' >> /home/engineer/.profile
                  echo "✓ Added DOTNET_ROOT to engineer's .profile"
              fi
              if ! grep -q "PATH.*:/usr/bin/dotnet" /home/engineer/.profile; then
                  echo 'PATH=\$PATH:/usr/bin/dotnet' >> /home/engineer/.profile
                  echo "✓ Added /usr/bin/dotnet to PATH in engineer's .profile"
              fi
          fi

          echo "=== Environment setup completed ==="
      }

      echo "=== Starting application dependencies installation ==="

      # Установка .NET Runtime
      echo "Step 1: Installing .NET Runtime..."
      install_dotnet_runtime
      echo "✓ .NET Runtime setup completed"

      # Установка переменных окружения для пользователей
      echo "Step 2: Setting up environment variables..."
      setup_dotnet_environment
      echo "✓ Environment variables setup completed"

      # Обновление кэша шрифтов (без verbose вывода)
      echo "Step 3: Updating font cache..."
      fc-cache -f || true
      echo "✓ Font cache updated"

      # Установка прав и владельцев
      echo "Step 4: Setting up application permissions..."
      chmod 755 /opt/TN_Doc/TN_Doc
      if [ \$? -eq 0 ]; then
          echo "✓ Executable permissions set"
      else
          echo "! WARNING: Failed to set executable permissions"
      fi
      
      chmod 644 /opt/TN_Doc/*.dll
      chown -R alphadaemon:alphadaemon /opt/TN_Doc
      if [ \$? -eq 0 ]; then
          echo "✓ Ownership set successfully"
      else
          echo "! WARNING: Failed to set ownership"
      fi
      
      chmod u=rwx,g=rx,o=rx /opt/TN_Doc
      chown alphadaemon:alphadaemon /var/log/TN_Doc
      chmod u=rwx,g=rx,o=rx /var/log/TN_Doc
      echo "✓ Application permissions setup completed"

      # Перезагрузка systemd
      echo "Step 5: Reloading systemd daemon..."
      systemctl daemon-reload
      echo "✓ Systemd daemon reloaded"

      # Включение и запуск сервиса
      echo "Step 6: Enabling and starting application service..."
      
      # Проверка наличия необходимых файлов
      if [ -f "/usr/bin/dotnet/dotnet" ] && [ -f "/opt/TN_Doc/TN_Doc" ]; then
          echo "✓ All required binaries found"
      else
          echo "! WARNING: Some binaries missing"
          [ ! -f "/usr/bin/dotnet/dotnet" ] && echo "  - dotnet binary not found"
          [ ! -f "/opt/TN_Doc/TN_Doc" ] && echo "  - application binary not found"
      fi

      systemctl enable TN_Doc.service
      systemctl start TN_Doc.service

      # Проверка статуса сервиса
      sleep 2
      if systemctl is-active --quiet TN_Doc.service; then
          echo "✓ Application service started successfully"
      else
          echo "! WARNING: Service failed to start. Checking logs..."
          journalctl -u TN_Doc.service -n 10 --no-pager || echo "Cannot read journal logs"
      fi

      # Финальная очистка временной директории
      echo "Final cleanup: Removing /tmp/TN_Doc directory..."
      rm -rf /tmp/TN_Doc
      echo "✓ Temporary directory cleaned"

      echo "=== TN_Doc installation completed successfully ==="
      echo "============================================"
      exit 0
      EOF
    - chmod +x deb/DEBIAN/postinst
    # Генерация postrm с хардкод значениями
    - |
      cat << EOF > deb/DEBIAN/postrm
      #!/bin/bash
      set -e

      echo "============================================"
      echo "Starting post-removal script for TN_Doc (full version)"
      echo "============================================"

      # Удаление директорий при полной очистке (purge)
      if [ "\$1" = "purge" ]; then
          echo "Purging TN_Doc directories..."
          OPT_DIR="/opt/TN_Doc"
          LOG_DIR="/var/log/TN_Doc"
          for dir in "\$OPT_DIR" "\$LOG_DIR"; do
              if [ -d "\$dir" ]; then
                  echo "Removing directory: \$dir"
                  rm -rf "\$dir"
                  if [ \$? -eq 0 ]; then
                      echo "✓ Successfully removed \$dir"
                  else
                      echo "! WARNING: Failed to remove \$dir"
                  fi
              fi
          done
          
          # Удаление systemd service
          echo "Removing systemd service..."
          systemctl disable TN_Doc.service 2>/dev/null || true
          rm -f /etc/systemd/system/TN_Doc.service
          systemctl daemon-reload
          echo "✓ Systemd service removed"
      fi

      exit 0
      EOF
    - chmod +x deb/DEBIAN/postrm
    # Генерация systemd unit с хардкод значениями
    - |
      cat << EOF > deb/etc/systemd/system/TN_Doc.service
      [Unit]
      Description=Service TN_Doc (full version)

      [Service]
      WorkingDirectory=/opt/TN_Doc/
      ExecStart=/usr/bin/dotnet/dotnet /opt/TN_Doc/TN_Doc.dll
      Restart=always
      RestartSec=10
      SyslogIdentifier=dotnet-TN_Doc
      User=alphadaemon
      Environment=ASPNETCORE_ENVIRONMENT=Production

      [Install]
      WantedBy=multi-user.target
      EOF
    # Установка прав
    - chmod 755 deb/DEBIAN/preinst deb/DEBIAN/postinst deb/DEBIAN/prerm deb/DEBIAN/postrm
    - chmod 644 deb/DEBIAN/control
    - chmod 755 deb/opt/TN_Doc/TN_Doc
    - chmod 644 deb/opt/TN_Doc/*.dll 2>/dev/null || true
    - echo "Creating control.tar.xz..."
    - tar -cJf control.tar.xz -C deb/DEBIAN .
    - echo "Creating data.tar.xz..."
    - tar -cJf data.tar.xz -C deb --exclude=DEBIAN .
    - echo "Creating debian-binary..."
    - echo "2.0" > debian-binary
    - echo "Building .deb package..."
    - mkdir -p packages
    - ar r ./packages/${DEB_NAME}_amd64.deb debian-binary control.tar.xz data.tar.xz
    - rm -f debian-binary control.tar.xz data.tar.xz
    - ls -l ./packages/${DEB_NAME}_amd64.deb
    - echo "Current directory:$(pwd)"
  artifacts:
    name: "package-full-TN_Doc-${CI_COMMIT_SHORT_SHA}"
    paths:
      - ./packages/

package-minimal-job:      # Minimal package without dependencies
  stage: package
  image: ubuntu:latest
  rules:
    - if: $CI_COMMIT_TAG =~ /^\d+\.\d+(\.\d+)?$/
  needs:
    - build-job
    - extract-version-job
  tags:
    - orpovy
  before_script:
    - apt-get update && apt-get install -y dpkg-dev
  script:
    - echo "Packaging the application into a minimal .deb file..."
    - DEB_NAME="$(echo "TN_Doc" | tr '[:upper:]' '[:lower:]' | tr '_' '.')-${FULL_VERSION}"
    - echo "DEB_NAME=$DEB_NAME"
    # Создание структуры минимального пакета
    - mkdir -p deb-minimal/DEBIAN
    - mkdir -p deb-minimal/opt/TN_Doc
    - mkdir -p deb-minimal/var/log/TN_Doc
    - mkdir -p deb-minimal/etc/systemd/system
    # Копирование только файлов приложения
    - cp -r ./publish/* deb-minimal/opt/TN_Doc/
    # Генерация minimal control
    - |
      cat << EOF > deb-minimal/DEBIAN/control
      Package: tn.doc
      Version: ${VERSION}
      Section: utils
      Priority: optional
      Architecture: amd64
      Depends: systemd, dotnet-runtime-8.0 (>= 8.0.13)
      Maintainer: DadonovAD <dadonovad@transneft.ru>
      Description: TN_Doc это приложение для работы с документами СОИ СИКН/ОСИКН.
       Требует предустановленный .NET Runtime 8.0.13+ и системные шрифты.
      Homepage:

      EOF
    # Генерация minimal preinst
    - |
      cat << EOF > deb-minimal/DEBIAN/preinst
      #!/bin/bash
      set -e

      echo "============================================"
      echo "Starting pre-installation script for TN_Doc"
      echo "============================================"

      # Проверка наличия .NET Runtime
      check_dotnet_runtime() {
          # Проверка наличия .NET Runtime
          if [ ! -d "/usr/bin/dotnet/shared/Microsoft.NETCore.App" ]; then
              echo "ERROR: .NET Runtime 8 is not installed."
              echo "Please install .NET Runtime 8.0.13 or later before installing this package"
              exit 1
          fi

          # Проверка версии .NET Runtime
          REQUIRED_VERSION="8.0.13"
          INSTALLED_VERSION=\$(ls /usr/bin/dotnet/shared/Microsoft.NETCore.App 2>/dev/null | grep -E '^8\.0\.[0-9]+\$' | sort -V | tail -n 1)
          
          if [ -z "\$INSTALLED_VERSION" ]; then
              echo "ERROR: No compatible .NET Runtime 8 version found in /usr/bin/dotnet/shared/Microsoft.NETCore.App"
              echo "Please install .NET Runtime 8.0.13 or later"
              exit 1
          fi

          if [ "\$(printf '%s\n' "\$INSTALLED_VERSION" "\$REQUIRED_VERSION" | sort -V | head -n1)" != "\$REQUIRED_VERSION" ]; then
              echo "ERROR: .NET Runtime version \$INSTALLED_VERSION < \$REQUIRED_VERSION"
              echo "Please install .NET Runtime 8.0.13 or later"
              exit 1
          fi

          echo "✓ .NET Runtime version \$INSTALLED_VERSION is compatible (>= \$REQUIRED_VERSION)"
      }

      # Проверка .NET Runtime
      echo "Checking .NET Runtime availability..."
      check_dotnet_runtime

      # Остановка службы TN_Doc, если она запущена
      if systemctl is-active --quiet TN_Doc.service; then
          echo "Stopping TN_Doc.service..."
          systemctl stop TN_Doc.service
      fi

      # Удаление старых директорий
      echo "Removing old TN_Doc directories..."
      OPT_DIR="/opt/TN_Doc"
      LOG_DIR="/var/log/TN_Doc"
      for dir in "\$OPT_DIR" "\$LOG_DIR"; do
          if [ -d "\$dir" ]; then
              echo "Removing directory: \$dir"
              rm -rf "\$dir"
              if [ \$? -eq 0 ]; then
                  echo "✓ Successfully removed \$dir"
              else
                  echo "! WARNING: Failed to remove \$dir"
              fi
          fi
      done

      exit 0
      EOF
    - chmod +x deb-minimal/DEBIAN/preinst
    # Генерация minimal prerm
    - |
      cat << EOF > deb-minimal/DEBIAN/prerm
      #!/bin/bash
      set -e

      echo "============================================"
      echo "Starting pre-removal script for TN_Doc"
      echo "============================================"

      # Остановка службы TN_Doc, если она запущена
      if systemctl is-active --quiet TN_Doc.service; then
          echo "Stopping TN_Doc.service..."
          systemctl stop TN_Doc.service
          if [ \$? -eq 0 ]; then
              echo "✓ Service stopped successfully"
          else
              echo "! WARNING: Failed to stop service"
          fi
      fi

      exit 0
      EOF
    - chmod +x deb-minimal/DEBIAN/prerm
    # Генерация minimal postinst
    - |
      cat << EOF > deb-minimal/DEBIAN/postinst
      #!/bin/bash
      set -e

      echo "============================================"
      echo "Starting post-installation script for TN_Doc"
      echo "============================================"

      # Установка прав и владельцев
      echo "Setting up application permissions..."
      chmod 755 /opt/TN_Doc/TN_Doc
      if [ \$? -eq 0 ]; then
          echo "✓ Executable permissions set"
      else
          echo "! WARNING: Failed to set executable permissions"
      fi
      
      chmod 644 /opt/TN_Doc/*.dll
      chown -R alphadaemon:alphadaemon /opt/TN_Doc
      if [ \$? -eq 0 ]; then
          echo "✓ Ownership set successfully"
      else
          echo "! WARNING: Failed to set ownership"
      fi
      
      chmod u=rwx,g=rx,o=rx /opt/TN_Doc
      chown alphadaemon:alphadaemon /var/log/TN_Doc
      chmod u=rwx,g=rx,o=rx /var/log/TN_Doc
      echo "✓ Application permissions setup completed"

      # Перезагрузка systemd
      echo "Reloading systemd daemon..."
      systemctl daemon-reload
      echo "✓ Systemd daemon reloaded"

      # Включение и запуск сервиса
      echo "Enabling and starting application service..."
      
      # Проверка наличия необходимых файлов
      if [ -f "/opt/TN_Doc/TN_Doc" ]; then
          echo "✓ Application binary found"
      else
          echo "! WARNING: Application binary not found"
      fi

      systemctl enable TN_Doc.service
      systemctl start TN_Doc.service

      # Проверка статуса сервиса
      sleep 2
      if systemctl is-active --quiet TN_Doc.service; then
          echo "✓ Application service started successfully"
      else
          echo "! WARNING: Service failed to start. Checking logs..."
          journalctl -u TN_Doc.service -n 10 --no-pager || echo "Cannot read journal logs"
      fi

      echo "=== TN_Doc installation completed successfully ==="
      echo "============================================"
      exit 0
      EOF
    - chmod +x deb-minimal/DEBIAN/postinst
    # Генерация minimal postrm
    - |
      cat << EOF > deb-minimal/DEBIAN/postrm
      #!/bin/bash
      set -e

      echo "============================================"
      echo "Starting post-removal script for TN_Doc"
      echo "============================================"

      # Удаление директорий при полной очистке (purge)
      if [ "\$1" = "purge" ]; then
          echo "Purging TN_Doc directories..."
          OPT_DIR="/opt/TN_Doc"
          LOG_DIR="/var/log/TN_Doc"
          for dir in "\$OPT_DIR" "\$LOG_DIR"; do
              if [ -d "\$dir" ]; then
                  echo "Removing directory: \$dir"
                  rm -rf "\$dir"
                  if [ \$? -eq 0 ]; then
                      echo "✓ Successfully removed \$dir"
                  else
                      echo "! WARNING: Failed to remove \$dir"
                  fi
              fi
          done
          
          # Удаление systemd service
          echo "Removing systemd service..."
          systemctl disable TN_Doc.service 2>/dev/null || true
          rm -f /etc/systemd/system/TN_Doc.service
          systemctl daemon-reload
          echo "✓ Systemd service removed"
      fi

      exit 0
      EOF
    - chmod +x deb-minimal/DEBIAN/postrm
    # Генерация systemd unit (использует системный dotnet)
    - |
      cat << EOF > deb-minimal/etc/systemd/system/TN_Doc.service
      [Unit]
      Description=Service TN_Doc

      [Service]
      WorkingDirectory=/opt/TN_Doc/
      ExecStart=dotnet /opt/TN_Doc/TN_Doc.dll
      Restart=always
      RestartSec=10
      SyslogIdentifier=dotnet-TN_Doc
      User=alphadaemon
      Environment=ASPNETCORE_ENVIRONMENT=Production

      [Install]
      WantedBy=multi-user.target
      EOF
    # Установка прав
    - chmod 755 deb-minimal/DEBIAN/preinst deb-minimal/DEBIAN/postinst deb-minimal/DEBIAN/prerm deb-minimal/DEBIAN/postrm
    - chmod 644 deb-minimal/DEBIAN/control
    - chmod 755 deb-minimal/opt/TN_Doc/TN_Doc
    - chmod 644 deb-minimal/opt/TN_Doc/*.dll 2>/dev/null || true
    - echo "Creating minimal control.tar.xz..."
    - tar -cJf control-minimal.tar.xz -C deb-minimal/DEBIAN .
    - echo "Creating minimal data.tar.xz..."
    - tar -cJf data-minimal.tar.xz -C deb-minimal --exclude=DEBIAN .
    - echo "Creating minimal debian-binary..."
    - echo "2.0" > debian-binary-minimal
    - echo "Building minimal .deb package..."
    - mkdir -p packages
    - ar r ./packages/${DEB_NAME}_amd64.deb debian-binary-minimal control-minimal.tar.xz data-minimal.tar.xz
    - rm -f debian-binary-minimal control-minimal.tar.xz data-minimal.tar.xz
    - ls -l ./packages/${DEB_NAME}_amd64.deb
    - echo "Current directory:$(pwd)"
  artifacts:
    name: "package-minimal-TN_Doc-${CI_COMMIT_SHORT_SHA}"
    paths:
      - ./packages/

package-net-runtime-job:      # .NET Runtime standalone package
  stage: package
  image: ubuntu:latest
  rules:
    - if: $CI_COMMIT_TAG =~ /^\d+\.\d+(\.\d+)?$/
  needs:
    - extract-version-job
  tags:
    - orpovy
  before_script:
    - apt-get update && apt-get install -y dpkg-dev
  script:
    - echo "Creating .NET Runtime standalone package..."
    - DEB_NAME="dotnet-runtime-tn-8.0.13-${FULL_VERSION}"
    - echo "DEB_NAME=$DEB_NAME"
    # Создание структуры пакета
    - mkdir -p deb-runtime/DEBIAN
    - mkdir -p deb-runtime/usr/bin/dotnet
    - mkdir -p deb-runtime/tmp/dotnet-runtime
    # Копирование .NET Runtime архива
    - if [ -f "distrib/aspnetcore-runtime-8.0.13-linux-x64.tar.gz" ]; then cp distrib/aspnetcore-runtime-8.0.13-linux-x64.tar.gz deb-runtime/tmp/dotnet-runtime/; else echo "ERROR .NET Runtime archive not found"; exit 1; fi
    # Генерация control
    - |
      cat << EOF > deb-runtime/DEBIAN/control
      Package: dotnet-runtime-tn
      Version: 8.0.13-${VERSION}
      Section: libs
      Priority: optional
      Architecture: amd64
      Depends: libc6, libgcc-s1, libstdc++6
      Provides: dotnet-runtime-8.0
      Conflicts: dotnet-runtime-8.0
      Maintainer: DadonovAD <dadonovad@transneft.ru>
      Description: Microsoft .NET Runtime 8.0.13 для TN приложений.
       Автономная установка .NET Runtime 8.0.13 в /usr/bin/dotnet.
       Предоставляет среду выполнения для TN_Doc и других .NET приложений.
      Homepage:

      EOF
    # Генерация preinst
    - |
      cat << EOF > deb-runtime/DEBIAN/preinst
      #!/bin/bash
      set -e

      echo "============================================"
      echo "Starting pre-installation script for .NET Runtime 8.0.13"
      echo "============================================"

      # Проверка конфликтующих установок
      check_existing_dotnet() {
          if [ -d "/usr/bin/dotnet" ]; then
              echo "Warning: Existing .NET installation found in /usr/bin/dotnet"
              echo "Backing up existing installation..."
              mv /usr/bin/dotnet "/usr/bin/dotnet.backup.\$(date +%Y%m%d_%H%M%S)"
          fi
      }

      check_existing_dotnet

      # Очистка временной директории
      rm -rf /tmp/dotnet-runtime
      echo "✓ Pre-installation checks completed"
      exit 0
      EOF
    - chmod +x deb-runtime/DEBIAN/preinst
    # Генерация postinst (с логикой из package-job)
    - |
      cat << EOF > deb-runtime/DEBIAN/postinst
      #!/bin/bash
      set -e

      echo "============================================"
      echo "Starting post-installation script for .NET Runtime 8.0.13"
      echo "============================================"

      # Установка .NET Runtime
      install_dotnet_runtime() {
          echo "=== Starting .NET Runtime installation ==="
          
          # Проверяем наличие локального архива
          if [ -f "/tmp/dotnet-runtime/aspnetcore-runtime-8.0.13-linux-x64.tar.gz" ]; then
              echo "✓ Found .NET Runtime archive"

              # Создаем директорию для .NET
              echo "Creating .NET directory: /usr/bin/dotnet"
              mkdir -p /usr/bin/dotnet

              # Распаковываем архив напрямую в /usr/bin/dotnet
              echo "Extracting .NET Runtime archive..."
              tar -xzf /tmp/dotnet-runtime/aspnetcore-runtime-8.0.13-linux-x64.tar.gz -C /usr/bin/dotnet
              if [ \$? -eq 0 ]; then
                  echo "✓ Archive extracted successfully"
              else
                  echo "✗ ERROR: Failed to extract archive"
                  exit 1
              fi

              # Удаляем архив
              rm -f /tmp/dotnet-runtime/aspnetcore-runtime-8.0.13-linux-x64.tar.gz
              echo "✓ .NET Runtime 8.0.13 installed successfully"
          else
              echo "✗ ERROR: .NET Runtime archive not found at /tmp/dotnet-runtime/aspnetcore-runtime-8.0.13-linux-x64.tar.gz"
              exit 1
          fi

          echo "=== .NET Runtime installation completed ==="
      }

      # Установка переменных окружения для пользователей
      setup_dotnet_environment() {
          echo "=== Setting up .NET environment variables ==="

          # Создание переменных окружения для пользователя administrator
          if [ -f "/home/administrator/.profile" ]; then
              if ! grep -q "DOTNET_ROOT=/usr/bin/dotnet" /home/administrator/.profile; then
                  echo 'DOTNET_ROOT=/usr/bin/dotnet' >> /home/administrator/.profile
                  echo "✓ Added DOTNET_ROOT to administrator's .profile"
              fi
              if ! grep -q "PATH.*:/usr/bin/dotnet" /home/administrator/.profile; then
                  echo 'PATH=\$PATH:/usr/bin/dotnet' >> /home/administrator/.profile
                  echo "✓ Added /usr/bin/dotnet to PATH in administrator's .profile"
              fi
          fi

          # Создание переменных окружения для пользователя operators
          if [ -f "/home/operators/.profile" ]; then
              if ! grep -q "DOTNET_ROOT=/usr/bin/dotnet" /home/operators/.profile; then
                  echo 'DOTNET_ROOT=/usr/bin/dotnet' >> /home/operators/.profile
                  echo "✓ Added DOTNET_ROOT to operators's .profile"
              fi
              if ! grep -q "PATH.*:/usr/bin/dotnet" /home/operators/.profile; then
                  echo 'PATH=\$PATH:/usr/bin/dotnet' >> /home/operators/.profile
                  echo "✓ Added /usr/bin/dotnet to PATH in operators's .profile"
              fi
          fi

          # Создание переменных окружения для пользователя engineer
          if [ -f "/home/engineer/.profile" ]; then
              if ! grep -q "DOTNET_ROOT=/usr/bin/dotnet" /home/engineer/.profile; then
                  echo 'DOTNET_ROOT=/usr/bin/dotnet' >> /home/engineer/.profile
                  echo "✓ Added DOTNET_ROOT to engineer's .profile"
              fi
              if ! grep -q "PATH.*:/usr/bin/dotnet" /home/engineer/.profile; then
                  echo 'PATH=\$PATH:/usr/bin/dotnet' >> /home/engineer/.profile
                  echo "✓ Added /usr/bin/dotnet to PATH in engineer's .profile"
              fi
          fi

          echo "=== Environment setup completed ==="
      }

      # Выполнение установки
      install_dotnet_runtime
      setup_dotnet_environment

      # Финальная очистка
      rm -rf /tmp/dotnet-runtime
      echo "✓ .NET Runtime 8.0.13 installation completed successfully"
      echo "============================================"
      exit 0
      EOF
    - chmod +x deb-runtime/DEBIAN/postinst
    # Генерация prerm
    - |
      cat << EOF > deb-runtime/DEBIAN/prerm
      #!/bin/bash
      set -e

      echo "============================================"
      echo "Starting pre-removal script for .NET Runtime 8.0.13"
      echo "============================================"

      # Проверка использования другими пакетами
      if dpkg -l | grep -q "tn\.doc"; then
          echo "WARNING: TN_Doc packages are installed and may depend on this runtime"
          echo "Consider removing dependent packages first"
      fi

      exit 0
      EOF
    - chmod +x deb-runtime/DEBIAN/prerm
    # Генерация postrm
    - |
      cat << EOF > deb-runtime/DEBIAN/postrm
      #!/bin/bash
      set -e

      echo "============================================"
      echo "Starting post-removal script for .NET Runtime 8.0.13"
      echo "============================================"

      if [ "\$1" = "purge" ]; then
          echo "Purging .NET Runtime installation..."
          
          # Удаление .NET Runtime
          if [ -d "/usr/bin/dotnet" ]; then
              rm -rf /usr/bin/dotnet
              echo "✓ .NET Runtime directory removed"
          fi
          
          # Очистка переменных окружения
          for user_home in /home/administrator /home/operators /home/engineer; do
              if [ -f "\${user_home}/.profile" ]; then
                  sed -i '/DOTNET_ROOT=\/usr\/bin\/dotnet/d' "\${user_home}/.profile"
                  sed -i '/PATH=.*:\/usr\/bin\/dotnet/d' "\${user_home}/.profile"
                  echo "✓ Cleaned environment variables from \${user_home}/.profile"
              fi
          done
      fi

      exit 0
      EOF
    - chmod +x deb-runtime/DEBIAN/postrm
    # Установка прав
    - chmod 644 deb-runtime/DEBIAN/control
    - echo "Creating runtime control.tar.xz..."
    - tar -cJf control-runtime.tar.xz -C deb-runtime/DEBIAN .
    - echo "Creating runtime data.tar.xz..."
    - tar -cJf data-runtime.tar.xz -C deb-runtime --exclude=DEBIAN .
    - echo "Creating runtime debian-binary..."
    - echo "2.0" > debian-binary-runtime
    - echo "Building .NET Runtime .deb package..."
    - mkdir -p packages
    - ar r ./packages/${DEB_NAME}_amd64.deb debian-binary-runtime control-runtime.tar.xz data-runtime.tar.xz
    - rm -f debian-binary-runtime control-runtime.tar.xz data-runtime.tar.xz
    - ls -l ./packages/${DEB_NAME}_amd64.deb
    - echo "Current directory:$(pwd)"
  artifacts:
    name: "package-net-runtime-TN_Doc-${CI_COMMIT_SHORT_SHA}"
    paths:
      - ./packages/

package-fonts-job:      # System fonts standalone package
  stage: package
  image: ubuntu:latest
  rules:
    - if: $CI_COMMIT_TAG =~ /^\d+\.\d+(\.\d+)?$/
  needs:
    - extract-version-job
  tags:
    - orpovy
  before_script:
    - apt-get update && apt-get install -y dpkg-dev
  script:
    - echo "Creating system fonts standalone package..."
    - DEB_NAME="fonts-tn-${FULL_VERSION}"
    - echo "DEB_NAME=$DEB_NAME"
    # Проверка наличия шрифтов
    - if [ ! -d "fonts" ]; then echo "ERROR fonts directory not found"; exit 1; fi
    # Создание структуры пакета
    - mkdir -p deb-fonts/DEBIAN
    - mkdir -p deb-fonts/usr/share/fonts
    # Копирование шрифтов
    - cp -r fonts/* deb-fonts/usr/share/fonts/
    # Генерация control
    - |
      cat << EOF > deb-fonts/DEBIAN/control
      Package: fonts-tn
      Version: ${VERSION}
      Section: fonts
      Priority: optional
      Architecture: all
      Depends: fontconfig
      Maintainer: DadonovAD <dadonovad@transneft.ru>
      Description: Системные шрифты для TN приложений.
       Набор шрифтов Arial, Segoe UI, Tahoma для корректного отображения
       документов в TN_Doc и других TN приложениях.
      Homepage:

      EOF
    # Генерация preinst
    - |
      cat << EOF > deb-fonts/DEBIAN/preinst
      #!/bin/bash
      set -e

      echo "============================================"
      echo "Starting pre-installation script for TN Fonts"
      echo "============================================"

      # Проверка доступности fontconfig
      if ! command -v fc-cache >/dev/null 2>&1; then
          echo "WARNING: fontconfig (fc-cache) not found. Font cache may not be updated."
      fi

      # Очистка старых шрифтов TN (если есть)
      if [ -d "/usr/share/fonts/tn-fonts" ]; then
          echo "Removing old TN fonts directory..."
          rm -rf /usr/share/fonts/tn-fonts
      fi

      echo "✓ Pre-installation checks completed"
      exit 0
      EOF
    - chmod +x deb-fonts/DEBIAN/preinst
    # Генерация postinst
    - |
      cat << EOF > deb-fonts/DEBIAN/postinst
      #!/bin/bash
      set -e

      echo "============================================"
      echo "Starting post-installation script for TN Fonts"
      echo "============================================"

      # Установка прав на шрифты
      echo "Setting fonts permissions..."
      find /usr/share/fonts -name "*.ttf" -exec chmod 644 {} \;
      find /usr/share/fonts -name "*.TTF" -exec chmod 644 {} \;
      echo "✓ Font permissions set"

      # Обновление кэша шрифтов
      echo "Updating font cache..."
      if command -v fc-cache >/dev/null 2>&1; then
          fc-cache -f -v
          if [ \$? -eq 0 ]; then
              echo "✓ Font cache updated successfully"
          else
              echo "! WARNING: Font cache update failed"
          fi
      else
          echo "! WARNING: fc-cache not available, font cache not updated"
      fi

      # Проверка установленных шрифтов
      echo "Verifying installed fonts..."
      FONT_COUNT=\$(find /usr/share/fonts -name "*.ttf" -o -name "*.TTF" | wc -l)
      echo "Found \$FONT_COUNT font files installed"

      if command -v fc-list >/dev/null 2>&1; then
          ARIAL_COUNT=\$(fc-list | grep -i arial | wc -l)
          SEGOE_COUNT=\$(fc-list | grep -i "segoe ui" | wc -l)
          TAHOMA_COUNT=\$(fc-list | grep -i tahoma | wc -l)
          echo "Available fonts: Arial (\$ARIAL_COUNT), Segoe UI (\$SEGOE_COUNT), Tahoma (\$TAHOMA_COUNT)"
      fi

      echo "=== TN Fonts installation completed successfully ==="
      echo "============================================"
      exit 0
      EOF
    - chmod +x deb-fonts/DEBIAN/postinst
    # Генерация prerm
    - |
      cat << EOF > deb-fonts/DEBIAN/prerm
      #!/bin/bash
      set -e

      echo "============================================"
      echo "Starting pre-removal script for TN Fonts"
      echo "============================================"

      # Проверка использования другими пакетами
      if dpkg -l | grep -q "tn\.doc"; then
          echo "WARNING: TN_Doc packages are installed and may use these fonts"
          echo "Documents may not render correctly after font removal"
      fi

      exit 0
      EOF
    - chmod +x deb-fonts/DEBIAN/prerm
    # Генерация postrm
    - |
      cat << EOF > deb-fonts/DEBIAN/postrm
      #!/bin/bash
      set -e

      echo "============================================"
      echo "Starting post-removal script for TN Fonts"
      echo "============================================"

      if [ "\$1" = "purge" ]; then
          echo "Purging TN fonts installation..."
          
          # Удаление остатков шрифтов (если остались)
          for font_dir in "/usr/share/fonts/arial" "/usr/share/fonts/segoe ui" "/usr/share/fonts/tahoma"; do
              if [ -d "\$font_dir" ]; then
                  echo "Removing font directory: \$font_dir"
                  rm -rf "\$font_dir"
                  if [ \$? -eq 0 ]; then
                      echo "✓ Successfully removed \$font_dir"
                  else
                      echo "! WARNING: Failed to remove \$font_dir"
                  fi
              fi
          done
          
          # Обновление кэша шрифтов после удаления
          echo "Updating font cache after removal..."
          if command -v fc-cache >/dev/null 2>&1; then
              fc-cache -f
              echo "✓ Font cache updated"
          fi
      fi

      exit 0
      EOF
    - chmod +x deb-fonts/DEBIAN/postrm
    # Установка прав
    - chmod 644 deb-fonts/DEBIAN/control
    - find deb-fonts/usr/share/fonts -name "*.ttf" -exec chmod 644 {} \;
    - find deb-fonts/usr/share/fonts -name "*.TTF" -exec chmod 644 {} \;
    - echo "Creating fonts control.tar.xz..."
    - tar -cJf control-fonts.tar.xz -C deb-fonts/DEBIAN .
    - echo "Creating fonts data.tar.xz..."
    - tar -cJf data-fonts.tar.xz -C deb-fonts --exclude=DEBIAN .
    - echo "Creating fonts debian-binary..."
    - echo "2.0" > debian-binary-fonts
    - echo "Building fonts .deb package..."
    - mkdir -p packages
    - ar r ./packages/${DEB_NAME}_all.deb debian-binary-fonts control-fonts.tar.xz data-fonts.tar.xz
    - rm -f debian-binary-fonts control-fonts.tar.xz data-fonts.tar.xz
    - ls -l ./packages/${DEB_NAME}_all.deb
    - echo "Current directory:$(pwd)"
  artifacts:
    name: "package-fonts-TN_Doc-${CI_COMMIT_SHORT_SHA}"
    paths:
      - ./packages/