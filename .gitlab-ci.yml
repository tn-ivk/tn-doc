
variables:
    VERSION: $CI_COMMIT_TAG
    GIT_SUBMODULE_STRATEGY: recursive
    GIT_SUBMODULE_FORCE_HTTPS: "true"
    GIT_STRATEGY: clone
    DOTNET_SDK_VERSION: "8.0"
    DOTNET_RT_VERSION: "8.0.13"   
    PROJECT_NAME: "TN_Doc"  

stages:          
  - build
  - package 

build-job:       # This job runs in the build stage, which runs first.
  stage: build
  image: mcr.microsoft.com/dotnet/sdk:${DOTNET_SDK_VERSION}
  rules:
    - if: $CI_COMMIT_TAG =~ /^\d+\.\d+(\.\d+)?$/
  tags:
    - orpovy
  before_script:
    # Создание директории для публикации
    - mkdir -p ./publish
    - mkdir -p $PROJECT_NAME/Dll
  script:
    - echo "Adding NuGet sources..."    
    - 'dotnet nuget add source "https://nuget.ortpr.ru/v3/index.json" --name ortpr'
    - 'dotnet nuget add source "https://nuget.fast-report.com/api/v3/index.json" --name fr_nuget --username "$FR_NUGET_USERNAME" --password "$FR_NUGET_PASSWORD" --store-password-in-clear-text'
    - echo "Rebuilding solution ..."
    - dotnet build
    - echo "Moving to $PROJECT_NAME..."
    - cd $PROJECT_NAME
    - echo "Current directory after cd:$(pwd)"
    - echo "Building the application..."
    - dotnet publish TN_Doc.csproj -c Release -r linux-x64 --self-contained false -o ../publish
  artifacts:
    name: "build-${PROJECT_NAME}-${CI_COMMIT_SHORT_SHA}"
    paths:
      - ./publish/

extract-version-job:       # This job runs in the build stage, which runs first.
  stage: build
  image: mcr.microsoft.com/dotnet/sdk:${DOTNET_SDK_VERSION}
  rules:
    - if: $CI_COMMIT_TAG =~ /^\d+\.\d+(\.\d+)?$/
  tags:
    - orpovy
  script:
    # Определение пути к .csproj файлу
    - CSPROJ_FILE="$PROJECT_NAME/$PROJECT_NAME.csproj"
    # Проверка существования файла
    - if [ ! -f "$CSPROJ_FILE" ]; then echo "Error:$CSPROJ_FILE not found"; exit 1; fi
    # Извлечение версии из .csproj
    - VERSION=$(xmllint --xpath "//Project/PropertyGroup/Version/text()" $CSPROJ_FILE 2>/dev/null || grep -oP '<Version>\K[^<]+' $CSPROJ_FILE)
    - echo "Extracted version:$VERSION"
    # Проверка версии
    - if [ -z "$VERSION" ]; then echo "Error:Version not found in $CSPROJ_FILE"; exit 1; fi
    # Формирование ревизии из CI_COMMIT_SHORT_SHA
    - REVISION="r${CI_COMMIT_SHORT_SHA}"
    # Формирование полной версии
    - FULL_VERSION="${VERSION}+${REVISION}"
    - echo "Full version:$FULL_VERSION"
    # Сохранение переменных для последующих этапов
    - echo "FULL_VERSION=$FULL_VERSION" > version.env
    - echo "VERSION=$VERSION" >> version.env
    - echo "REVISION=$REVISION" >> version.env
    - echo "PACKAGE_NAME=$PROJECT_NAME" >> version.env
  artifacts:
    reports:
      dotenv: version.env

package-job:      # This job runs in the deploy stage.
  stage: package
  image: ubuntu:latest
  rules:
    - if: $CI_COMMIT_TAG =~ /^\d+\.\d+(\.\d+)?$/
  needs:
    - build-job
    - extract-version-job
  tags:
    - orpovy
  cache:
    key: ${CI_JOB_STAGE}
    paths:
      - /var/cache/apt/archives/
  before_script:
    - apt-get update && apt-get install -y dpkg-dev
  script:
    - echo "Packaging the application into a .deb file..."
    # Формирование имени deb-пакета
    - DEB_NAME="${PACKAGE_NAME}-${FULL_VERSION}"
    # Создание структуры пакета
    - mkdir -p tn-doc-deb/DEBIAN
    - mkdir -p tn-doc-deb/opt/TN_Doc
    - mkdir -p tn-doc-deb/var/log/TN_Doc
    - mkdir -p tn-doc-deb/etc/systemd/system
    # Копирование файлов приложения
    - cp -r ./publish/* tn-doc-deb/opt/TN_Doc/
    # Генерация control
    - |
      cat << EOF > tn-doc-deb/DEBIAN/control
      Package: tn-doc
      Version: ${VERSION}
      Section: utils
      Priority: optional
      Architecture: amd64
      Depends: libgdiplus
      Maintainer: DadonovAD <dadonovad@transneft.ru>
      Description: TN_Doc это приложение для работы с документами СОИ СИКН/ОСИКН.
      Homepage:

      EOF
    # Генерация preinst
    - |
      cat << EOF > tn-doc-deb/DEBIAN/preinst
      #!/bin/bash
      set -e

      # Проверка наличия .NET Runtime
      if [ ! -d "/usr/bin/dotnet/shared/Microsoft.NETCore.App" ]; then
          echo "Error: .NET Runtime 8 is not installed. Please install dotnet-runtime-8.0."
          exit 1
      fi

      # Проверка версии .NET Runtime
      REQUIRED_VERSION="$DOTNET_RT_VERSION"
      INSTALLED_VERSION=\$(ls /usr/bin/dotnet/shared/Microsoft.NETCore.App | grep -E '8\.0\.[0-9]+' | sort -V | tail -n 1)

      if [ -z "\$INSTALLED_VERSION" ]; then
          echo "Error: No compatible .NET Runtime 8 version found."
          exit 1
      fi

      if [ "\$(printf '%s\n' "\$INSTALLED_VERSION" "\$REQUIRED_VERSION" | sort -V | head -n1)" != "\$REQUIRED_VERSION" ]; then
          echo "Error: .NET Runtime version \$INSTALLED_VERSION is installed, but version >= \$REQUIRED_VERSION is required."
          exit 1
      fi

      # Остановка службы TN_Doc, если она запущена
      if systemctl is-active --quiet TN_Doc.service; then
          echo "Stopping TN_Doc.service..."
          systemctl stop TN_Doc.service
      fi

      # Удаление старых директорий
      echo "Removing old TN_Doc directories..."
      for dir in /opt/TN_Doc /var/log/TN_Doc; do
          if [ -d "\$dir" ]; then
              rm -rf "\$dir"
              echo "Removed \$dir"
          fi
      done

      exit 0
      EOF
    - |
      cat << EOF > tn-doc-deb/DEBIAN/prerm
      #!/bin/bash
      set -e

      # Остановка службы TN_Doc, если она запущена
      if systemctl is-active --quiet TN_Doc.service; then
          echo "Stopping TN_Doc.service..."
          systemctl stop TN_Doc.service
      fi

      exit 0
      EOF
    # Генерация postinst
    - |
      cat << EOF > tn-doc-deb/DEBIAN/postinst
      #!/bin/bash
      set -e

      # Установка прав и владельцев
      chmod 755 /opt/TN_Doc/TN_Doc
      chmod 644 /opt/TN_Doc/*.dll
      chown -R alphadaemon:alphadaemon /opt/TN_Doc
      chmod u=rwx,g=rx,o=rx /opt/TN_Doc
      chown alphadaemon:alphadaemon /var/log/TN_Doc
      chmod u=rwx,g=rx,o=rx /var/log/TN_Doc

      # Перезагрузка systemd
      systemctl daemon-reload

      # Включение и запуск сервиса
      systemctl enable TN_Doc.service
      systemctl start TN_Doc.service

      exit 0
      EOF
    - |
      cat << EOF > tn-doc-deb/DEBIAN/postrm
      #!/bin/bash
      set -e

      # Удаление директорий при полной очистке (purge)
      if [ "\$1" = "purge" ]; then
          echo "Purging TN_Doc directories..."
          for dir in /opt/TN_Doc /var/log/TN_Doc; do
              if [ -d "\$dir" ]; then
                  rm -rf "\$dir"
                  echo "Removed \$dir"
              fi
          done
      fi

      exit 0
      EOF
    # Генерация TN_Doc.service
    - |
      cat << EOF > tn-doc-deb/etc/systemd/system/TN_Doc.service
      [Unit]
      Description=Service TN_Doc

      [Service]
      WorkingDirectory=/opt/TN_Doc/
      ExecStart=/usr/bin/dotnet/dotnet /opt/TN_Doc/TN_Doc.dll
      Restart=always
      RestartSec=10
      SyslogIdentifier=dotnet-TN_Doc
      User=alphadaemon
      Environment=ASPNETCORE_ENVIRONMENT=Production

      [Install]
      WantedBy=multi-user.target
      EOF
    # Установка прав
    - chmod 755 tn-doc-deb/DEBIAN/preinst tn-doc-deb/DEBIAN/postinst
    - chmod 644 tn-doc-deb/DEBIAN/control
    - chmod 755 tn-doc-deb/opt/TN_Doc/TN_Doc
    - chmod 644 tn-doc-deb/opt/TN_Doc/*.dll
    - echo "Creating control.tar.xz..."
    - tar -cJf control.tar.xz -C tn-doc-deb/DEBIAN .
    - echo "Creating data.tar.xz..."
    - tar -cJf data.tar.xz -C tn-doc-deb --exclude=DEBIAN .
    - echo "Creating debian-binary..."
    - echo "2.0" > debian-binary
    - echo "Building .deb package..."
    - ar r tn-doc_${DEB_NAME}_amd64.deb debian-binary control.tar.xz data.tar.xz
    - rm -f debian-binary control.tar.xz data.tar.xz
    - ls -l tn-doc_${DEB_NAME}_amd64.deb
  artifacts:
    name: "package-${CI_COMMIT_TAG}"
    paths:
      - tn-doc_${DEB_NAME}_amd64.deb
