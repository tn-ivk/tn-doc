variables:
    VERSION: $CI_COMMIT_TAG
    GIT_SUBMODULE_STRATEGY: recursive
    GIT_SUBMODULE_FORCE_HTTPS: "true"
    GIT_STRATEGY: clone
    DOTNET_SDK_VERSION: "8.0"
    DOTNET_RT_VERSION: "8.0.13"   
    PROJECT_NAME: "TN_Doc"  

stages:          
  - build
  - package 

build-job:
  stage: build
  image: mcr.microsoft.com/dotnet/sdk:${DOTNET_SDK_VERSION}
  rules:
    - if: $CI_COMMIT_TAG =~ /^\d+\.\d+(\.\d+)?$/
  tags:
    - orpovy
  before_script:
    # Создание директории для публикации
    - mkdir -p ./publish
    - mkdir -p $PROJECT_NAME/Dll
  script:
    - echo "Adding NuGet sources..."    
    - 'dotnet nuget add source "https://nuget.ortpr.ru/v3/index.json" --name ortpr'
    - 'dotnet nuget add source "https://nuget.xn--90aia9aifhdb2cxbdg.xn--p1ai/api/v3/index.json" --name fr_nuget --username "$FR_NUGET_USERNAME" --password "$FR_NUGET_PASSWORD" --store-password-in-clear-text'
    - echo "Rebuilding solution ..."
    - dotnet build
    - echo "Moving to $PROJECT_NAME..."
    - cd $PROJECT_NAME
    - echo "Current directory after cd:$(pwd)"
    - echo "Building the application..."
    - dotnet publish ${PROJECT_NAME}.csproj -c Release -r linux-x64 --self-contained false -o ../publish
  artifacts:
    name: "build-${PROJECT_NAME}-${CI_COMMIT_SHORT_SHA}"
    paths:
      - ./publish/

extract-version-job:       
  stage: build
  image: mcr.microsoft.com/dotnet/sdk:${DOTNET_SDK_VERSION}
  rules:
    - if: $CI_COMMIT_TAG =~ /^\d+\.\d+(\.\d+)?$/
  tags:
    - orpovy
  script:
    # Установка curl для работы с GitLab API
    - apt-get update && apt-get install -y curl
    # Определение пути к .csproj файлу
    - CSPROJ_FILE="$PROJECT_NAME/${PROJECT_NAME}.csproj"
    # Проверка существования файла
    - if [ ! -f "$CSPROJ_FILE" ]; then echo "Error:$CSPROJ_FILE not found"; exit 1; fi
    # Извлечение версии из .csproj
    - VERSION=$(xmllint --xpath "//Project/PropertyGroup/Version/text()" $CSPROJ_FILE 2>/dev/null || grep -oP '<Version>\K[^<]+' $CSPROJ_FILE)
    - echo "Extracted version:$VERSION"
    # Проверка версии
    - if [ -z "$VERSION" ]; then echo "Error:Version not found in $CSPROJ_FILE"; exit 1; fi
    # Формирование имени переменной для build number
    - BUILD_VAR_NAME="BUILD_NUMBER_$(echo $VERSION | tr '.' '_')"
    - echo "Build variable name:$BUILD_VAR_NAME"
    # Получение текущего build number из переменных проекта
    - |
      CURRENT_BUILD=$(curl -s --header "PRIVATE-TOKEN: $PROJECT_API_TOKEN" \
        "$CI_API_V4_URL/projects/$CI_PROJECT_ID/variables/$BUILD_VAR_NAME" | \
        grep -o '"value":"[^"]*"' | cut -d'"' -f4 || echo "0")
    - if [ -z "$CURRENT_BUILD" ] || [ "$CURRENT_BUILD" = "null" ]; then CURRENT_BUILD=0; fi
    - BUILD_NUMBER=$((CURRENT_BUILD + 1))
    - echo "Current build number:$CURRENT_BUILD, New build number:$BUILD_NUMBER"
    # Обновление build number в переменных проекта
    - |
      RESPONSE=$(curl -s --request PUT --header "PRIVATE-TOKEN: $PROJECT_API_TOKEN" \
        --header "Content-Type: application/json" \
        --data "{\"key\":\"$BUILD_VAR_NAME\",\"value\":\"$BUILD_NUMBER\"}" \
        "$CI_API_V4_URL/projects/$CI_PROJECT_ID/variables/$BUILD_VAR_NAME")
      if echo "$RESPONSE" | grep -q "404\|message"; then
        echo "Variable does not exist, creating new one..."
        curl -s --request POST --header "PRIVATE-TOKEN: $PROJECT_API_TOKEN" \
          --header "Content-Type: application/json" \
          --data "{\"key\":\"$BUILD_VAR_NAME\",\"value\":\"$BUILD_NUMBER\"}" \
          "$CI_API_V4_URL/projects/$CI_PROJECT_ID/variables"
      fi
      echo "Build number updated successfully"
    # Формирование ревизии из CI_COMMIT_SHORT_SHA
    - REVISION="b${BUILD_NUMBER}-${CI_COMMIT_SHORT_SHA}"
    # Формирование полной версии
    - FULL_VERSION="${VERSION}-${REVISION}"
    - echo "Full version:$FULL_VERSION"
    # Сохранение переменных для последующих этапов
    - echo "FULL_VERSION=$FULL_VERSION" > version.env
    - echo "VERSION=$VERSION" >> version.env
    - echo "REVISION=$REVISION" >> version.env
    - echo "BUILD_NUMBER=$BUILD_NUMBER" >> version.env
    - echo "PACKAGE_NAME=$PROJECT_NAME" >> version.env
  artifacts:
    reports:
      dotenv: version.env

package-job:      # This job runs in the deploy stage.
  stage: package
  image: ubuntu:latest
  rules:
    - if: $CI_COMMIT_TAG =~ /^\d+\.\d+(\.\d+)?$/
  needs:
    - build-job
    - extract-version-job
  tags:
    - orpovy
  before_script:
    - apt-get update && apt-get install -y dpkg-dev
  script:
    - echo "Packaging the application into a .deb file..."
    - echo "DEBUG - Available variables in package-job:"
    - echo "  DOTNET_RT_VERSION='${DOTNET_RT_VERSION}'"
    - echo "  PROJECT_NAME='${PROJECT_NAME}'"
    - echo "  PACKAGE_NAME='${PACKAGE_NAME}'"
    - echo "  FULL_VERSION='${FULL_VERSION}'"
    - DEB_NAME="$(echo "${PACKAGE_NAME}" | tr '[:upper:]' '[:lower:]' | tr '_' '.')-${FULL_VERSION}"
    - echo "DEB_NAME=$DEB_NAME"
    # Создание структуры пакета
    - mkdir -p deb/DEBIAN
    - mkdir -p deb/opt/$PROJECT_NAME
    - mkdir -p deb/var/log/$PROJECT_NAME
    - mkdir -p deb/etc/systemd/system
    - mkdir -p deb/usr/share/fonts
    - mkdir -p deb/usr/local/bin
    # Создание временной директории для зависимостей
    - mkdir -p deb/tempdir
    # Копирование файлов приложения
    - cp -r ./publish/* deb/opt/$PROJECT_NAME/
    # Копирование .NET Runtime если есть в distrib
    - if [ -f "distrib/aspnetcore-runtime-8.0.13-linux-x64.tar.gz" ]; then cp distrib/aspnetcore-runtime-8.0.13-linux-x64.tar.gz deb/tempdir/; fi
    # Копирование шрифтов в пакет (если присутствуют в репозитории)
    - if [ -d "fonts" ]; then cp -r fonts/* deb/usr/share/fonts/; fi
    # Генерация control
    - |
      cat << EOF > deb/DEBIAN/control
      Package: $(echo "${PROJECT_NAME}" | tr '[:upper:]' '[:lower:]' | tr '_' '.')
      Version: ${VERSION}
      Section: utils
      Priority: optional
      Architecture: amd64
      Depends: systemd
      Maintainer: DadonovAD <dadonovad@transneft.ru>
      Description: ${PROJECT_NAME} это приложение для работы с документами СОИ СИКН/ОСИКН.
      Homepage:

      EOF
    # Генерация preinst
    - |
      cat << EOF > deb/DEBIAN/preinst.tmp
      #!/bin/bash
      set -e

      echo "============================================"
      echo "Starting pre-installation script for $PROJECT_NAME"
      echo "============================================"

      # Проверка .NET Runtime перед установкой
      check_dotnet_runtime() {
          echo "[DEBUG] Entering check_dotnet_runtime function"
          
          # Проверка наличия .NET Runtime
          echo "[DEBUG] Checking if .NET Runtime directory exists: /usr/bin/dotnet/shared/Microsoft.NETCore.App"
          if [ ! -d "/usr/bin/dotnet/shared/Microsoft.NETCore.App" ]; then
              echo "[DEBUG] .NET Runtime directory does not exist"
              echo "Warning: .NET Runtime 8 is not installed. Will install from local archive."
              echo "[DEBUG] Exiting check_dotnet_runtime with return code 1"
              return 1
          fi
          echo "[DEBUG] .NET Runtime directory exists"

          # Проверка версии .NET Runtime
          REQUIRED_VERSION="__DOTNET_RT_VERSION__"
          echo "[DEBUG] Variable assignment completed:"
          echo "[DEBUG]   REQUIRED_VERSION='$REQUIRED_VERSION'"
          echo "[DEBUG]   Length of REQUIRED_VERSION: ${#REQUIRED_VERSION}"
          
          echo "Pre-install check - Debug info:"
          echo "  DOTNET_RT_VERSION env var: '__DOTNET_RT_VERSION__'"
          echo "  REQUIRED_VERSION after assignment: '$REQUIRED_VERSION'"
          echo "  Testing variable assignment..."
          
          echo "[DEBUG] Listing directory contents with detailed info:"
          echo "  Directory /usr/bin/dotnet/shared/Microsoft.NETCore.App contents:"
          ls -la /usr/bin/dotnet/shared/Microsoft.NETCore.App || echo "  Directory not found or empty"
          
          echo "[DEBUG] Getting raw directory listing:"
          echo "  Raw ls output:"
          ls /usr/bin/dotnet/shared/Microsoft.NETCore.App 2>/dev/null || echo "  No files found"
          
          echo "[DEBUG] Applying version filter (8.0.x pattern):"
          echo "  Filtered output:"
          ls /usr/bin/dotnet/shared/Microsoft.NETCore.App 2>/dev/null | grep -E '^8\.0\.[0-9]+$' || echo "  No version directories found"

          echo "[DEBUG] Extracting installed version:"
          INSTALLED_VERSION=$(ls /usr/bin/dotnet/shared/Microsoft.NETCore.App 2>/dev/null | grep -E '^8\.0\.[0-9]+$' | sort -V | tail -n 1)
          echo "[DEBUG]   Raw command result: '$INSTALLED_VERSION'"
          echo "[DEBUG]   Length of INSTALLED_VERSION: ${#INSTALLED_VERSION}"
          echo "Pre-install check - Detected .NET Runtime version: '$INSTALLED_VERSION' (required: $REQUIRED_VERSION)"

          echo "[DEBUG] Checking if installed version is empty:"
          if [ -z "$INSTALLED_VERSION" ]; then
              echo "[DEBUG] INSTALLED_VERSION is empty - no compatible version found"
              echo "Warning: No compatible .NET Runtime 8 version found. Will install from local archive."
              echo "[DEBUG] Exiting check_dotnet_runtime with return code 1"
              return 1
          fi
          echo "[DEBUG] INSTALLED_VERSION is not empty: '$INSTALLED_VERSION'"

          echo "[DEBUG] Comparing versions using printf and sort:"
          VERSION_COMPARISON=$(printf '%s\n' "$INSTALLED_VERSION" "$REQUIRED_VERSION" | sort -V | head -n1)
          echo "[DEBUG]   Version comparison result: '$VERSION_COMPARISON'"
          echo "[DEBUG]   Required version: '$REQUIRED_VERSION'"
          echo "[DEBUG]   Comparison test: '$VERSION_COMPARISON' != '$REQUIRED_VERSION'"
          
          if [ "$VERSION_COMPARISON" != "$REQUIRED_VERSION" ]; then
              echo "[DEBUG] Version comparison failed - installed version is older"
              echo "Warning: .NET Runtime version $INSTALLED_VERSION is installed, but version >= $REQUIRED_VERSION is required. Will install from local archive."
              echo "[DEBUG] Exiting check_dotnet_runtime with return code 1"
              return 1
          fi

          echo "[DEBUG] Version comparison passed - installed version is compatible"
          echo ".NET Runtime version $INSTALLED_VERSION is compatible (>= $REQUIRED_VERSION)"
          echo "[DEBUG] Exiting check_dotnet_runtime with return code 0"
          return 0
      }

      # Проверка .NET Runtime (установка будет в postinst если нужно)
      echo "[DEBUG] Calling check_dotnet_runtime function"
      CHECK_RESULT=0
      check_dotnet_runtime || CHECK_RESULT=$?
      echo "[DEBUG] check_dotnet_runtime returned: ${CHECK_RESULT:-empty}"
      if [ "${CHECK_RESULT:-0}" -ne 0 ]; then
          echo "Will install .NET Runtime in postinst"
      fi

      # Остановка службы TN_Doc, если она запущена
      echo "[DEBUG] Checking if service $PROJECT_NAME.service is active"
      if systemctl is-active --quiet $PROJECT_NAME.service; then
          echo "[DEBUG] Service is active, stopping it"
          echo "Stopping $PROJECT_NAME.service..."
          systemctl stop $PROJECT_NAME.service
          echo "[DEBUG] Service stop command completed"
      else
          echo "[DEBUG] Service $PROJECT_NAME.service is not active"
      fi

      # Удаление старых директорий
      echo "[DEBUG] Starting directory cleanup process"
      echo "Removing old $PROJECT_NAME directories..."
      echo "Note: These directories may not exist yet during preinst phase - this is normal"
      echo "PROJECT_NAME variable in preinst: '$PROJECT_NAME'"
      
      echo "[DEBUG] Setting up directory variables:"
      OPT_DIR="/opt/__PROJECT_NAME__"
      LOG_DIR="/var/log/__PROJECT_NAME__"
      echo "[DEBUG]   OPT_DIR='$OPT_DIR'"
      echo "[DEBUG]   LOG_DIR='$LOG_DIR'"
      
      echo "[DEBUG] Processing directories for removal:"
      for dir in "$OPT_DIR" "$LOG_DIR"; do
          echo "[DEBUG] Checking directory: $dir"
          if [ -d "$dir" ]; then
              echo "[DEBUG] Directory exists, removing: $dir"
              echo "Removing directory: $dir"
              rm -rf "$dir"
              if [ $? -eq 0 ]; then
                  echo "✓ Successfully removed $dir"
                  echo "[DEBUG] Directory removal successful"
              else
                  echo "✗ Failed to remove $dir"
                  echo "[DEBUG] Directory removal failed"
              fi
          else
              echo "[DEBUG] Directory does not exist: $dir"
              echo "! Directory $dir does not exist, skipping"
          fi
      done
      echo "[DEBUG] Directory cleanup process completed"
      echo "=== Old directories cleanup completed ==="

      exit 0
      EOF
    # Обрабатываем preinst скрипт
    - echo "DEBUG - Processing preinst script with variables:"
    - echo "  DOTNET_RT_VERSION='${DOTNET_RT_VERSION}'"
    - echo "  PROJECT_NAME='${PROJECT_NAME}'"
    - echo "  Length of DOTNET_RT_VERSION: ${#DOTNET_RT_VERSION}"
    - echo "  Length of PROJECT_NAME: ${#PROJECT_NAME}"
    # Проверяем, что переменные не пусты
    - if [ -z "${DOTNET_RT_VERSION}" ]; then echo "ERROR: DOTNET_RT_VERSION is empty!"; exit 1; fi
    - if [ -z "${PROJECT_NAME}" ]; then echo "ERROR: PROJECT_NAME is empty!"; exit 1; fi
    # Используем разделитель | в sed для избежания конфликтов с точками
    - echo "  Using sed with | delimiter to avoid conflicts"
    - echo "  Testing sed command first:"
    - echo "__DOTNET_RT_VERSION__" | sed "s|__DOTNET_RT_VERSION__|${DOTNET_RT_VERSION}|g"
    - sed "s|__DOTNET_RT_VERSION__|${DOTNET_RT_VERSION}|g; s|__PROJECT_NAME__|${PROJECT_NAME}|g; s|\\\$PROJECT_NAME|${PROJECT_NAME}|g" deb/DEBIAN/preinst.tmp > deb/DEBIAN/preinst
    - echo "DEBUG - Checking variable replacement in preinst:"
    - echo "  Searching for __DOTNET_RT_VERSION__ patterns (should be 0):"
    - grep -c "__DOTNET_RT_VERSION__" deb/DEBIAN/preinst || echo "  No unreplaced patterns found (good)"
    - echo "  Searching for REQUIRED_VERSION assignments:"
    - grep -n "REQUIRED_VERSION=" deb/DEBIAN/preinst || echo "  No REQUIRED_VERSION found"
    - echo "  Sample of replaced content:"
    - grep -A2 -B2 "REQUIRED_VERSION=" deb/DEBIAN/preinst || echo "  No context found"
    - chmod +x deb/DEBIAN/preinst
    - rm deb/DEBIAN/preinst.tmp
    - |
      cat << EOF > deb/DEBIAN/prerm
      #!/bin/bash
      set -e

      echo "============================================"
      echo "Starting pre-removal script for $PROJECT_NAME"
      echo "============================================"

      echo "[DEBUG] Starting prerm script execution"
      echo "[DEBUG] PROJECT_NAME variable: '$PROJECT_NAME'"

      # Остановка службы TN_Doc, если она запущена
      echo "[DEBUG] Checking if service $PROJECT_NAME.service is active"
      SERVICE_NAME="$PROJECT_NAME.service"
      echo "[DEBUG] Service name: $SERVICE_NAME"
      
      if systemctl is-active --quiet "$SERVICE_NAME"; then
          echo "[DEBUG] Service is active, stopping it"
          echo "Stopping $SERVICE_NAME..."
          systemctl stop "$SERVICE_NAME"
          STOP_RESULT=$?
          echo "[DEBUG] Service stop result: $STOP_RESULT"
          
          if [ $STOP_RESULT -eq 0 ]; then
              echo "[DEBUG] Service stopped successfully"
          else
              echo "[DEBUG] Service stop failed with code: $STOP_RESULT"
          fi
      else
          echo "[DEBUG] Service $SERVICE_NAME is not active or does not exist"
      fi

      echo "[DEBUG] prerm script execution completed"

      exit 0
      EOF
    # Обрабатываем prerm скрипт
    - echo "DEBUG - Processing prerm script with variables:"
    - echo "  PROJECT_NAME='${PROJECT_NAME}'"
    - sed "s|__PROJECT_NAME__|${PROJECT_NAME}|g; s|\\\$PROJECT_NAME|${PROJECT_NAME}|g" deb/DEBIAN/prerm > deb/DEBIAN/prerm.tmp && mv deb/DEBIAN/prerm.tmp deb/DEBIAN/prerm
    - chmod +x deb/DEBIAN/prerm
    # Генерация postinst с автоустановкой зависимостей
    - |
      cat << EOF > deb/DEBIAN/postinst.tmp
      #!/bin/bash
      set -e

      echo "============================================"
      echo "Starting post-installation script for $PROJECT_NAME"
      echo "============================================"
      echo "Installing dependencies for $PROJECT_NAME..."
      echo "Note: 'Распаковывается tn.doc (1.4.1) на замену (1.4.1)' означает замену существующего пакета"


      # Установка .NET Runtime
      install_dotnet_runtime() {
          echo "[DEBUG] Entering install_dotnet_runtime function"
          echo "=== Starting .NET Runtime installation check ==="
          echo "Required version from CI variable: __DOTNET_RT_VERSION__"

          # Проверяем, нужна ли установка
          echo "[DEBUG] Setting REQUIRED_VERSION variable"
          REQUIRED_VERSION="__DOTNET_RT_VERSION__"
          echo "[DEBUG] Variable assignment completed:"
          echo "[DEBUG]   REQUIRED_VERSION='$REQUIRED_VERSION'"
          echo "[DEBUG]   Length of REQUIRED_VERSION: ${#REQUIRED_VERSION}"
          
          echo "Post-install check - Debug info:"
          echo "  DOTNET_RT_VERSION env var: '__DOTNET_RT_VERSION__'"
          echo "  REQUIRED_VERSION after assignment: '$REQUIRED_VERSION'"
          echo "Checking for existing .NET Runtime installation..."

          echo "[DEBUG] Checking if .NET Runtime directory exists"
          if [ -d "/usr/bin/dotnet/shared/Microsoft.NETCore.App" ]; then
              echo "[DEBUG] .NET Runtime directory exists"
              echo "Found .NET Runtime directory: /usr/bin/dotnet/shared/Microsoft.NETCore.App"
              echo "Post-install check - Debug info:"
              echo "  Directory contents:"
              ls -la /usr/bin/dotnet/shared/Microsoft.NETCore.App || echo "  Directory not found or empty"
              echo "  Raw ls output:"
              ls /usr/bin/dotnet/shared/Microsoft.NETCore.App 2>/dev/null || echo "  No files found"
              echo "  Filtered output:"
              ls /usr/bin/dotnet/shared/Microsoft.NETCore.App 2>/dev/null | grep -E '^8\.0\.[0-9]+$' || echo "  No version directories found"

              echo "[DEBUG] Extracting installed version"
              INSTALLED_VERSION=$(ls /usr/bin/dotnet/shared/Microsoft.NETCore.App 2>/dev/null | grep -E '^8\.0\.[0-9]+$' | sort -V | tail -n 1)
              echo "[DEBUG]   Raw command result: '$INSTALLED_VERSION'"
              echo "[DEBUG]   Length of INSTALLED_VERSION: ${#INSTALLED_VERSION}"
              echo "Detected installed version: '$INSTALLED_VERSION'"
              
              echo "[DEBUG] Checking version compatibility"
              if [ -n "$INSTALLED_VERSION" ]; then
                  echo "[DEBUG] INSTALLED_VERSION is not empty, performing version comparison"
                  VERSION_COMPARISON=$(printf '%s\n' "$INSTALLED_VERSION" "$REQUIRED_VERSION" | sort -V | head -n1)
                  echo "[DEBUG]   Version comparison result: '$VERSION_COMPARISON'"
                  echo "[DEBUG]   Required version: '$REQUIRED_VERSION'"
                  echo "[DEBUG]   Comparison test: '$VERSION_COMPARISON' = '$REQUIRED_VERSION'"
                  
                  if [ "$VERSION_COMPARISON" = "$REQUIRED_VERSION" ]; then
                      echo "[DEBUG] Version compatibility check passed"
                      echo "✓ .NET Runtime version $INSTALLED_VERSION is already installed and compatible (>= $REQUIRED_VERSION)"
                      echo "=== Skipping .NET Runtime installation ==="
                      echo "[DEBUG] Exiting install_dotnet_runtime with return code 0"
                      return 0
                  else
                      echo "[DEBUG] Version compatibility check failed"
                      echo "! Installed version $INSTALLED_VERSION is not compatible with required $REQUIRED_VERSION"
                  fi
              else
                  echo "[DEBUG] INSTALLED_VERSION is empty"
                  echo "! No compatible .NET Runtime version found"
              fi
          else
              echo "[DEBUG] .NET Runtime directory does not exist"
              echo "! .NET Runtime directory not found, installation required"
          fi
          
          echo "[DEBUG] Starting .NET Runtime installation process"
          echo "=== Starting .NET Runtime installation ==="
          
          # Проверяем наличие локального архива
          echo "[DEBUG] Checking for .NET Runtime archive"
          ARCHIVE_PATH="/tempdir/aspnetcore-runtime-8.0.13-linux-x64.tar.gz"
          echo "[DEBUG] Archive path: $ARCHIVE_PATH"
          
          if [ -f "$ARCHIVE_PATH" ]; then
              echo "[DEBUG] Archive file exists"
              echo "✓ Found .NET Runtime archive: $ARCHIVE_PATH"
              
              # Получаем размер архива для диагностики
              ARCHIVE_SIZE=$(ls -lh "$ARCHIVE_PATH" | awk '{print $5}')
              echo "[DEBUG] Archive size: $ARCHIVE_SIZE"

              # Создаем директорию для .NET (как в Ansible)
              echo "[DEBUG] Creating .NET directory"
              echo "Creating .NET directory: /usr/bin/dotnet"
              mkdir -p /usr/bin/dotnet
              if [ $? -eq 0 ]; then
                  echo "[DEBUG] Directory creation successful"
              else
                  echo "[DEBUG] Directory creation failed"
                  exit 1
              fi

              # Распаковываем архив напрямую в /usr/bin/dotnet (как в Ansible)
              echo "[DEBUG] Extracting archive"
              echo "Extracting .NET Runtime archive to /usr/bin/dotnet..."
              tar -xzf "$ARCHIVE_PATH" -C /usr/bin/dotnet
              TAR_RESULT=$?
              echo "[DEBUG] tar command result: $TAR_RESULT"
              
              if [ $TAR_RESULT -ne 0 ]; then
                  echo "[DEBUG] Archive extraction failed"
                  echo "✗ ERROR: Failed to extract .NET Runtime archive"
                  exit 1
              fi
              echo "[DEBUG] Archive extraction successful"

              # Проверяем что файлы извлечены
              echo "[DEBUG] Verifying extracted files"
              if [ -f "/usr/bin/dotnet/dotnet" ]; then
                  echo "[DEBUG] dotnet binary found"
                  DOTNET_VERSION=$(/usr/bin/dotnet/dotnet --version 2>/dev/null || echo "unknown")
                  echo "[DEBUG] dotnet version: $DOTNET_VERSION"
              else
                  echo "[DEBUG] WARNING: dotnet binary not found after extraction"
              fi

              # Удаляем архив (как в Ansible)
              echo "[DEBUG] Removing temporary archive"
              echo "Removing temporary archive file..."
              rm -f "$ARCHIVE_PATH"
              if [ $? -eq 0 ]; then
                  echo "[DEBUG] Archive removal successful"
              else
                  echo "[DEBUG] Archive removal failed (non-critical)"
              fi

              echo "✓ .NET Runtime __DOTNET_RT_VERSION__ installed successfully"
              echo "[DEBUG] .NET Runtime installation completed successfully"
          else
              echo "[DEBUG] Archive file not found"
              echo "✗ ERROR: .NET Runtime archive not found at $ARCHIVE_PATH"
              echo "Please ensure the archive is available before installing this package."
              echo "[DEBUG] Exiting with error code 1"
              exit 1
          fi

          echo "=== .NET Runtime installation completed ==="
          echo "[DEBUG] Exiting install_dotnet_runtime with return code 0"
      }

      # Установка переменных окружения для пользователей (как в Ansible)
      setup_dotnet_environment() {
          echo "=== Setting up .NET environment variables ==="

          # Создание переменных окружения (DOTNET_ROOT) для пользователя administrator
          echo "Setting up environment for user: administrator"
          if [ -f "/home/administrator/.profile" ]; then
              echo "✓ Found .profile file for administrator"

              if ! grep -q "DOTNET_ROOT=/usr/bin/dotnet" /home/administrator/.profile; then
                  echo "Adding DOTNET_ROOT=/usr/bin/dotnet to administrator's .profile"
                  echo 'DOTNET_ROOT=/usr/bin/dotnet' >> /home/administrator/.profile
              else
                  echo "! DOTNET_ROOT already exists in administrator's .profile"
              fi

              if ! grep -q "PATH.*:/usr/bin/dotnet" /home/administrator/.profile; then
                  echo "Adding /usr/bin/dotnet to PATH in administrator's .profile"
                  echo 'PATH=$PATH:/usr/bin/dotnet' >> /home/administrator/.profile
              else
                  echo "! /usr/bin/dotnet already in PATH in administrator's .profile"
              fi
          else
              echo "! .profile file not found for administrator, skipping"
          fi

          # Создание переменных окружения для пользователя operators
          echo "Setting up environment for user: operators"
          if [ -f "/home/operators/.profile" ]; then
              echo "✓ Found .profile file for operators"

              if ! grep -q "DOTNET_ROOT=/usr/bin/dotnet" /home/operators/.profile; then
                  echo "Adding DOTNET_ROOT=/usr/bin/dotnet to operators's .profile"
                  echo 'DOTNET_ROOT=/usr/bin/dotnet' >> /home/operators/.profile
              else
                  echo "! DOTNET_ROOT already exists in operators's .profile"
              fi

              if ! grep -q "PATH.*:/usr/bin/dotnet" /home/operators/.profile; then
                  echo "Adding /usr/bin/dotnet to PATH in operators's .profile"
                  echo 'PATH=$PATH:/usr/bin/dotnet' >> /home/operators/.profile
              else
                  echo "! /usr/bin/dotnet already in PATH in operators's .profile"
              fi
          else
              echo "! .profile file not found for operators, skipping"
          fi

          # Создание переменных окружения для пользователя engineer
          echo "Setting up environment for user: engineer"
          if [ -f "/home/engineer/.profile" ]; then
              echo "✓ Found .profile file for engineer"

              if ! grep -q "DOTNET_ROOT=/usr/bin/dotnet" /home/engineer/.profile; then
                  echo "Adding DOTNET_ROOT=/usr/bin/dotnet to engineer's .profile"
                  echo 'DOTNET_ROOT=/usr/bin/dotnet' >> /home/engineer/.profile
              else
                  echo "! DOTNET_ROOT already exists in engineer's .profile"
              fi

              if ! grep -q "PATH.*:/usr/bin/dotnet" /home/engineer/.profile; then
                  echo "Adding /usr/bin/dotnet to PATH in engineer's .profile"
                  echo 'PATH=$PATH:/usr/bin/dotnet' >> /home/engineer/.profile
              else
                  echo "! /usr/bin/dotnet already in PATH in engineer's .profile"
              fi
          else
              echo "! .profile file not found for engineer, skipping"
          fi

          echo "=== Environment setup completed ==="
      }

      echo "[DEBUG] Starting postinst main execution"
      echo "=== Starting application dependencies installation ==="

      # Установка .NET Runtime
      echo "[DEBUG] Step 1: Calling install_dotnet_runtime"
      echo "Step 1: Installing .NET Runtime..."
      INSTALL_RESULT=0
      install_dotnet_runtime || INSTALL_RESULT=$?
      echo "[DEBUG] install_dotnet_runtime returned: ${INSTALL_RESULT:-empty}"
      
      if [ "${INSTALL_RESULT:-0}" -eq 0 ]; then
          echo "✓ .NET Runtime setup completed"
          echo "[DEBUG] .NET Runtime installation successful"
      else
          echo "✗ .NET Runtime setup failed"
          echo "[DEBUG] .NET Runtime installation failed with code: ${INSTALL_RESULT:-empty}"
          exit 1
      fi

      # Установка переменных окружения для пользователей
      echo "[DEBUG] Step 2: Calling setup_dotnet_environment"
      echo "Step 2: Setting up environment variables..."
      ENV_RESULT=0
      setup_dotnet_environment || ENV_RESULT=$?
      echo "[DEBUG] setup_dotnet_environment returned: ${ENV_RESULT:-empty}"
      
      if [ "${ENV_RESULT:-0}" -eq 0 ]; then
          echo "✓ Environment variables setup completed"
          echo "[DEBUG] Environment setup successful"
      else
          echo "✗ Environment variables setup failed"
          echo "[DEBUG] Environment setup failed with code: ${ENV_RESULT:-empty}"
          # Не критичная ошибка, продолжаем
      fi

      # Обновление кэша шрифтов (как в Ansible, без установки fontconfig)
      # Это вызовет триггеры fontconfig после установки пакета
      echo "Step 3: Updating font cache..."
      fc-cache -fv || true
      echo "✓ Font cache updated"

      # Установка прав и владельцев
      echo "Step 4: Setting up application permissions..."
      echo "Setting executable permissions for application binary..."
      chmod 755 /opt/$PROJECT_NAME/$PROJECT_NAME
      echo "Setting permissions for application DLLs..."
      chmod 644 /opt/$PROJECT_NAME/*.dll
      echo "Setting ownership for application directory..."
      chown -R alphadaemon:alphadaemon /opt/$PROJECT_NAME
      echo "Setting directory permissions..."
      chmod u=rwx,g=rx,o=rx /opt/$PROJECT_NAME
      echo "Setting ownership for log directory..."
      chown alphadaemon:alphadaemon /var/log/$PROJECT_NAME
      echo "Setting log directory permissions..."
      chmod u=rwx,g=rx,o=rx /var/log/$PROJECT_NAME
      echo "✓ Application permissions setup completed"

      # Перезагрузка systemd
      echo "Step 5: Reloading systemd daemon..."
      systemctl daemon-reload
      echo "✓ Systemd daemon reloaded"

      # Включение и запуск сервиса
      echo "Step 6: Enabling and starting application service..."
      echo "Checking if dotnet binary exists..."
      if [ -f "/usr/bin/dotnet/dotnet" ]; then
          echo "✓ dotnet binary found at /usr/bin/dotnet/dotnet"
      else
          echo "! WARNING: dotnet binary not found at /usr/bin/dotnet/dotnet"
          ls -la /usr/bin/dotnet/ || echo "Directory /usr/bin/dotnet/ not found"
      fi

      echo "Checking application binary..."
      if [ -f "/opt/$PROJECT_NAME/$PROJECT_NAME" ]; then
          echo "✓ Application binary found at /opt/$PROJECT_NAME/$PROJECT_NAME"
      else
          echo "! WARNING: Application binary not found at /opt/$PROJECT_NAME/$PROJECT_NAME"
          ls -la /opt/$PROJECT_NAME/ || echo "Directory /opt/$PROJECT_NAME/ not found"
      fi

      echo "Enabling $PROJECT_NAME.service..."
      systemctl enable $PROJECT_NAME.service || echo "! Failed to enable service"
      echo "Starting $PROJECT_NAME.service..."
      systemctl start $PROJECT_NAME.service || echo "! Failed to start service"

      echo "Checking service status..."
      systemctl is-active $PROJECT_NAME.service >/dev/null 2>&1
      if [ $? -eq 0 ]; then
          echo "✓ Application service started successfully"
      else
          echo "! WARNING: Service failed to start. Checking logs..."
          journalctl -u $PROJECT_NAME.service -n 20 --no-pager || echo "Cannot read journal logs"
      fi

      echo "=== $PROJECT_NAME installation completed successfully ==="
      echo "============================================"
      exit 0
      EOF
    # Обрабатываем postinst скрипт
    - echo "DEBUG - Processing postinst script with variables:"
    - echo "  DOTNET_RT_VERSION='${DOTNET_RT_VERSION}'"
    - echo "  PROJECT_NAME='${PROJECT_NAME}'"
    - echo "  Length of DOTNET_RT_VERSION: ${#DOTNET_RT_VERSION}"
    - echo "  Length of PROJECT_NAME: ${#PROJECT_NAME}"
    # Проверяем, что переменные не пусты
    - if [ -z "${DOTNET_RT_VERSION}" ]; then echo "ERROR: DOTNET_RT_VERSION is empty!"; exit 1; fi
    - if [ -z "${PROJECT_NAME}" ]; then echo "ERROR: PROJECT_NAME is empty!"; exit 1; fi
    # Используем разделитель | в sed для избежания конфликтов с точками
    - echo "  Using sed with | delimiter to avoid conflicts"
    - echo "  Testing sed command first:"
    - echo "__DOTNET_RT_VERSION__" | sed "s|__DOTNET_RT_VERSION__|${DOTNET_RT_VERSION}|g"
    - sed "s|__DOTNET_RT_VERSION__|${DOTNET_RT_VERSION}|g; s|__PROJECT_NAME__|${PROJECT_NAME}|g; s|\\\$PROJECT_NAME|${PROJECT_NAME}|g" deb/DEBIAN/postinst.tmp > deb/DEBIAN/postinst
    - echo "DEBUG - Checking variable replacement in postinst:"
    - echo "  Searching for __DOTNET_RT_VERSION__ patterns (should be 0):"
    - grep -c "__DOTNET_RT_VERSION__" deb/DEBIAN/postinst || echo "  No unreplaced patterns found (good)"
    - echo "  Searching for REQUIRED_VERSION assignments:"
    - grep -n "REQUIRED_VERSION=" deb/DEBIAN/postinst || echo "  No REQUIRED_VERSION found"
    - echo "  Sample of replaced content:"
    - grep -A2 -B2 "REQUIRED_VERSION=" deb/DEBIAN/postinst || echo "  No context found"
    - chmod +x deb/DEBIAN/postinst
    - rm deb/DEBIAN/postinst.tmp
    - |
      cat << EOF > deb/DEBIAN/postrm
      #!/bin/bash
      set -e

      echo "============================================"
      echo "Starting post-removal script for $PROJECT_NAME"
      echo "============================================"

      echo "[DEBUG] Starting postrm script execution"
      echo "[DEBUG] Script argument \$1: '$1'"
      echo "[DEBUG] PROJECT_NAME variable: '$PROJECT_NAME'"

      # Удаление директорий при полной очистке (purge)
      echo "[DEBUG] Checking if this is a purge operation"
      if [ "$1" = "purge" ]; then
          echo "[DEBUG] This is a purge operation, proceeding with cleanup"
          echo "Purging $PROJECT_NAME directories..."
          echo "PROJECT_NAME variable in postrm: '$PROJECT_NAME'"
          
          echo "[DEBUG] Setting up directory variables:"
          OPT_DIR="/opt/__PROJECT_NAME__"
          LOG_DIR="/var/log/__PROJECT_NAME__"
          echo "[DEBUG]   OPT_DIR='$OPT_DIR'"
          echo "[DEBUG]   LOG_DIR='$LOG_DIR'"
          
          echo "[DEBUG] Processing directories for removal:"
          for dir in "$OPT_DIR" "$LOG_DIR"; do
              echo "[DEBUG] Checking directory: $dir"
              if [ -d "$dir" ]; then
                  echo "[DEBUG] Directory exists, removing: $dir"
                  echo "Removing directory: $dir"
                  rm -rf "$dir"
                  REMOVE_RESULT=$?
                  echo "[DEBUG] Directory removal result: $REMOVE_RESULT"
                  
                  if [ $REMOVE_RESULT -eq 0 ]; then
                      echo "✓ Successfully removed $dir"
                      echo "[DEBUG] Directory removal successful"
                  else
                      echo "✗ Failed to remove $dir"
                      echo "[DEBUG] Directory removal failed"
                  fi
              else
                  echo "[DEBUG] Directory does not exist: $dir"
                  echo "! Directory $dir does not exist, skipping"
              fi
          done
          
          # Удаление systemd service
          echo "[DEBUG] Starting systemd service cleanup"
          echo "Removing systemd service..."
          SERVICE_NAME="$PROJECT_NAME.service"
          echo "[DEBUG] Service name: $SERVICE_NAME"
          
          echo "[DEBUG] Disabling service"
          systemctl disable "$SERVICE_NAME" 2>/dev/null || echo "! Failed to disable service"
          DISABLE_RESULT=$?
          echo "[DEBUG] Service disable result: $DISABLE_RESULT"
          
          echo "[DEBUG] Removing service file"
          SERVICE_FILE="/etc/systemd/system/$SERVICE_NAME"
          echo "[DEBUG] Service file path: $SERVICE_FILE"
          rm -f "$SERVICE_FILE"
          REMOVE_FILE_RESULT=$?
          echo "[DEBUG] Service file removal result: $REMOVE_FILE_RESULT"
          
          echo "[DEBUG] Reloading systemd daemon"
          systemctl daemon-reload
          RELOAD_RESULT=$?
          echo "[DEBUG] Systemd daemon reload result: $RELOAD_RESULT"
          
          echo "✓ Systemd service removed"
          echo "[DEBUG] Systemd service cleanup completed"
      else
          echo "[DEBUG] Not a purge operation (argument: '$1'), skipping cleanup"
      fi

      echo "[DEBUG] postrm script execution completed"

      exit 0
      EOF
    # Обрабатываем postrm скрипт
    - echo "DEBUG - Processing postrm script with variables:"
    - echo "  PROJECT_NAME='${PROJECT_NAME}'"
    - sed "s|__PROJECT_NAME__|${PROJECT_NAME}|g; s|\\\$PROJECT_NAME|${PROJECT_NAME}|g" deb/DEBIAN/postrm > deb/DEBIAN/postrm.tmp && mv deb/DEBIAN/postrm.tmp deb/DEBIAN/postrm
    - chmod +x deb/DEBIAN/postrm
    # Генерация systemd unit для $PROJECT_NAME
    - |
      cat << EOF > deb/etc/systemd/system/${PROJECT_NAME}.service
      [Unit]
      Description=Service ${PROJECT_NAME}

      [Service]
      WorkingDirectory=/opt/${PROJECT_NAME}/
      ExecStart=/usr/bin/dotnet/dotnet /opt/${PROJECT_NAME}/${PROJECT_NAME}.dll
      Restart=always
      RestartSec=10
      SyslogIdentifier=dotnet-${PROJECT_NAME}
      User=alphadaemon
      Environment=ASPNETCORE_ENVIRONMENT=Production

      [Install]
      WantedBy=multi-user.target
      EOF
    # Установка прав
    - chmod 755 deb/DEBIAN/preinst deb/DEBIAN/postinst deb/DEBIAN/prerm deb/DEBIAN/postrm
    - chmod 644 deb/DEBIAN/control
    - chmod 755 deb/opt/$PROJECT_NAME/$PROJECT_NAME
    - chmod 644 deb/opt/$PROJECT_NAME/*.dll 2>/dev/null || true
    - echo "Creating control.tar.xz..."
    - tar -cJf control.tar.xz -C deb/DEBIAN .
    - echo "Creating data.tar.xz..."
    - tar -cJf data.tar.xz -C deb --exclude=DEBIAN .
    - echo "Creating debian-binary..."
    - echo "2.0" > debian-binary
    - echo "Building .deb package..."
    - mkdir -p packages
    - ar r ./packages/${DEB_NAME}_amd64.deb debian-binary control.tar.xz data.tar.xz
    - rm -f debian-binary control.tar.xz data.tar.xz
    - ls -l ./packages/${DEB_NAME}_amd64.deb
    - echo "Current directory:$(pwd)"
  artifacts:
    name: "package-${PROJECT_NAME}-${CI_COMMIT_SHORT_SHA}"
    paths:
      - ./packages/