variables:
    VERSION: $CI_COMMIT_TAG
    GIT_SUBMODULE_STRATEGY: recursive
    GIT_SUBMODULE_FORCE_HTTPS: "true"
    GIT_STRATEGY: clone
    DOTNET_RT_VERSION: "8.0.13"   
    PROJECT_NAME: "TN_Doc"  

stages:          
  - build
  - package 

# Минимальная сборка для создания базовой структуры
minimal-build-job:
  stage: build
  image: ubuntu:latest
  rules:
    - if: $CI_COMMIT_TAG =~ /^\d+\.\d+(\.\d+)?$/
  # tags:
    # - orpovy
  script:
    - echo "Creating minimal application structure for testing..."
    - mkdir -p ./publish
    # Создаем фиктивные файлы для тестирования пакета
    - echo '#!/bin/bash' > ./publish/${PROJECT_NAME}
    - echo 'echo "Test application ${PROJECT_NAME}"' >> ./publish/${PROJECT_NAME}
    - chmod +x ./publish/${PROJECT_NAME}
    - echo "Fake DLL content" > ./publish/${PROJECT_NAME}.dll
    - echo "Test files created:"
    - ls -la ./publish/
  artifacts:
    name: "minimal-build-${PROJECT_NAME}-${CI_COMMIT_SHORT_SHA}"
    paths:
      - ./publish/

extract-version-job:       
  stage: build
  image: ubuntu:latest
  rules:
    - if: $CI_COMMIT_TAG =~ /^\d+\.\d+(\.\d+)?$/
  tags:
    - orpovy
  script:
    - apt-get update && apt-get install -y curl
    # Используем фиксированную версию для тестирования
    - VERSION="1.4.1"
    - echo "Using test version: $VERSION"
    # Формирование имени переменной для build number
    - BUILD_VAR_NAME="BUILD_NUMBER_$(echo $VERSION | tr '.' '_')"
    - echo "Build variable name: $BUILD_VAR_NAME"
    # Получение текущего build number из переменных проекта
    - |
      CURRENT_BUILD=$(curl -s --header "PRIVATE-TOKEN: $PROJECT_API_TOKEN" \
        "$CI_API_V4_URL/projects/$CI_PROJECT_ID/variables/$BUILD_VAR_NAME" | \
        grep -o '"value":"[^"]*"' | cut -d'"' -f4 || echo "0")
    - if [ -z "$CURRENT_BUILD" ] || [ "$CURRENT_BUILD" = "null" ]; then CURRENT_BUILD=0; fi
    - BUILD_NUMBER=$((CURRENT_BUILD + 1))
    - echo "Current build number: $CURRENT_BUILD, New build number: $BUILD_NUMBER"
    # Обновление build number в переменных проекта
    - |
      RESPONSE=$(curl -s --request PUT --header "PRIVATE-TOKEN: $PROJECT_API_TOKEN" \
        --header "Content-Type: application/json" \
        --data "{\"key\":\"$BUILD_VAR_NAME\",\"value\":\"$BUILD_NUMBER\"}" \
        "$CI_API_V4_URL/projects/$CI_PROJECT_ID/variables/$BUILD_VAR_NAME")
      if echo "$RESPONSE" | grep -q "404\|message"; then
        echo "Variable does not exist, creating new one..."
        curl -s --request POST --header "PRIVATE-TOKEN: $PROJECT_API_TOKEN" \
          --header "Content-Type: application/json" \
          --data "{\"key\":\"$BUILD_VAR_NAME\",\"value\":\"$BUILD_NUMBER\"}" \
          "$CI_API_V4_URL/projects/$CI_PROJECT_ID/variables"
      fi
      echo "Build number updated successfully"
    # Формирование ревизии из CI_COMMIT_SHORT_SHA
    - REVISION="b${BUILD_NUMBER}-${CI_COMMIT_SHORT_SHA}"
    # Формирование полной версии
    - FULL_VERSION="${VERSION}-${REVISION}"
    - echo "Full version: $FULL_VERSION"
    # Сохранение переменных для последующих этапов
    - echo "FULL_VERSION=$FULL_VERSION" > version.env
    - echo "VERSION=$VERSION" >> version.env
    - echo "REVISION=$REVISION" >> version.env
    - echo "BUILD_NUMBER=$BUILD_NUMBER" >> version.env
    - echo "PACKAGE_NAME=$PROJECT_NAME" >> version.env
  artifacts:
    reports:
      dotenv: version.env

debug-package-job:
  stage: package
  image: ubuntu:latest
  rules:
    - if: $CI_COMMIT_TAG =~ /^\d+\.\d+(\.\d+)?$/
  needs:
    - minimal-build-job
    - extract-version-job
  tags:
    - orpovy
  before_script:
    - apt-get update && apt-get install -y dpkg-dev
  script:
    - echo "Creating debug package for .NET version checking and directory management..."
    - DEB_NAME="$(echo "${PACKAGE_NAME}" | tr '[:upper:]' '[:lower:]' | tr '_' '.')-debug-${FULL_VERSION}"
    - echo "DEB_NAME=$DEB_NAME"
    
    # Создание структуры пакета
    - mkdir -p deb/DEBIAN
    - mkdir -p deb/opt/$PROJECT_NAME
    - mkdir -p deb/var/log/$PROJECT_NAME
    - mkdir -p deb/etc/systemd/system
    - mkdir -p deb/usr/local/bin
    
    # Копирование тестовых файлов приложения
    - cp -r ./publish/* deb/opt/$PROJECT_NAME/
    
    # Создание тестового .NET Runtime архива (если нужно тестировать установку)
    - mkdir -p deb/tempdir
    - echo "Fake .NET Runtime archive for testing" > deb/tempdir/aspnetcore-runtime-8.0.13-linux-x64.tar.gz
    
    # Генерация control
    - |
      cat << EOF > deb/DEBIAN/control
      Package: $(echo "${PROJECT_NAME}" | tr '[:upper:]' '[:lower:]' | tr '_' '.')-debug
      Version: ${VERSION}
      Section: utils
      Priority: optional
      Architecture: amd64
      Depends: systemd
      Maintainer: DadonovAD <dadonovad@transneft.ru>
      Description: Debug package for ${PROJECT_NAME} - .NET version checking and directory management
      Homepage:

      EOF
    
    # Генерация упрощенного preinst для отладки
    - |
      cat << 'PREINST_EOF' > deb/DEBIAN/preinst
      #!/bin/bash
      set -e

      echo "============================================"
      echo "DEBUG: Starting pre-installation script for __PROJECT_NAME__"
      echo "============================================"

      # Функция проверки .NET Runtime
      check_dotnet_runtime() {
          echo "[DEBUG] === check_dotnet_runtime function start ==="
          echo "[DEBUG] Function entry point reached"
          
          # Проверка наличия .NET Runtime
          DOTNET_DIR="/usr/bin/dotnet/shared/Microsoft.NETCore.App"
          echo "[DEBUG] Checking if .NET Runtime directory exists: $DOTNET_DIR"
          
          if [ ! -d "$DOTNET_DIR" ]; then
              echo "[DEBUG] .NET Runtime directory does not exist"
              echo "WARNING: .NET Runtime 8 is not installed."
              echo "[DEBUG] Function exit with return code 1"
              return 1
          fi
          
          echo "[DEBUG] .NET Runtime directory exists"
          echo "[DEBUG] Directory listing:"
          ls -la "$DOTNET_DIR" 2>/dev/null || echo "[DEBUG] Failed to list directory"

          # Проверка версии .NET Runtime
          REQUIRED_VERSION="__DOTNET_RT_VERSION__"
          echo "[DEBUG] Required version: '$REQUIRED_VERSION'"
          echo "[DEBUG] Required version length: ${#REQUIRED_VERSION}"
          
          echo "[DEBUG] Searching for installed versions matching pattern '^8\.0\.[0-9]+$'"
          echo "[DEBUG] Raw directory listing:"
          ls "$DOTNET_DIR" 2>/dev/null || echo "[DEBUG] No files in directory"
          
          echo "[DEBUG] Filtered versions:"
          ls "$DOTNET_DIR" 2>/dev/null | grep -E '^8\.0\.[0-9]+$' || echo "[DEBUG] No matching versions found"
          
          INSTALLED_VERSION=$(ls "$DOTNET_DIR" 2>/dev/null | grep -E '^8\.0\.[0-9]+$' | sort -V | tail -n 1)
          echo "[DEBUG] Extracted installed version: '$INSTALLED_VERSION'"
          echo "[DEBUG] Installed version length: ${#INSTALLED_VERSION}"

          if [ -z "$INSTALLED_VERSION" ]; then
              echo "[DEBUG] No compatible .NET Runtime 8 version found"
              echo "WARNING: No compatible .NET Runtime 8 version found."
              echo "[DEBUG] Function exit with return code 1"
              return 1
          fi

          echo "[DEBUG] Version comparison process:"
          echo "[DEBUG] Comparing '$INSTALLED_VERSION' >= '$REQUIRED_VERSION'"
          
          # Используем printf и sort для сравнения версий
          VERSION_COMPARISON=$(printf '%s\n' "$INSTALLED_VERSION" "$REQUIRED_VERSION" | sort -V | head -n1)
          echo "[DEBUG] Version comparison result: '$VERSION_COMPARISON'"
          echo "[DEBUG] Expected (should equal required): '$REQUIRED_VERSION'"
          
          if [ "$VERSION_COMPARISON" != "$REQUIRED_VERSION" ]; then
              echo "[DEBUG] Version check failed - installed version is older"
              echo "WARNING: .NET Runtime version $INSTALLED_VERSION < $REQUIRED_VERSION"
              echo "[DEBUG] Function exit with return code 1"
              return 1
          fi

          echo "[DEBUG] Version check passed"
          echo "SUCCESS: .NET Runtime version $INSTALLED_VERSION >= $REQUIRED_VERSION"
          echo "[DEBUG] === check_dotnet_runtime function end ==="
          return 0
      }

      # Основная проверка
      echo "[DEBUG] Starting .NET Runtime check"
      CHECK_RESULT=0
      check_dotnet_runtime || CHECK_RESULT=$?
      echo "[DEBUG] check_dotnet_runtime returned: $CHECK_RESULT"
      
      if [ "$CHECK_RESULT" -ne 0 ]; then
          echo "RESULT: .NET Runtime installation will be required"
      else
          echo "RESULT: .NET Runtime is already compatible"
      fi

      # Проверка и остановка службы
      echo "[DEBUG] === Service management section ==="
      SERVICE_NAME="__PROJECT_NAME__.service"
      echo "[DEBUG] Checking service: $SERVICE_NAME"
      
      if systemctl is-active --quiet "$SERVICE_NAME"; then
          echo "[DEBUG] Service is active, stopping it"
          echo "Stopping $SERVICE_NAME..."
          systemctl stop "$SERVICE_NAME"
          echo "[DEBUG] Service stop command completed"
      else
          echo "[DEBUG] Service $SERVICE_NAME is not active or does not exist"
      fi

      # Проверка и удаление старых директорий
      echo "[DEBUG] === Directory cleanup section ==="
      PROJECT_DIR="/opt/__PROJECT_NAME__"
      LOG_DIR="/var/log/__PROJECT_NAME__"
      
      echo "[DEBUG] Checking directories for cleanup:"
      echo "[DEBUG] Project directory: $PROJECT_DIR"
      echo "[DEBUG] Log directory: $LOG_DIR"
      
      for dir in "$PROJECT_DIR" "$LOG_DIR"; do
          echo "[DEBUG] Processing directory: $dir"
          if [ -d "$dir" ]; then
              echo "[DEBUG] Directory exists, removing: $dir"
              echo "Removing directory: $dir"
              rm -rf "$dir"
              if [ $? -eq 0 ]; then
                  echo "[DEBUG] Successfully removed $dir"
              else
                  echo "[DEBUG] Failed to remove $dir"
              fi
          else
              echo "[DEBUG] Directory does not exist: $dir"
          fi
      done

      echo "[DEBUG] preinst script completed successfully"
      exit 0
      PREINST_EOF
    
    # Обработка переменных в preinst
    - sed "s/__DOTNET_RT_VERSION__/${DOTNET_RT_VERSION}/g; s/__PROJECT_NAME__/${PROJECT_NAME}/g" deb/DEBIAN/preinst > deb/DEBIAN/preinst.tmp
    - mv deb/DEBIAN/preinst.tmp deb/DEBIAN/preinst
    - chmod +x deb/DEBIAN/preinst
    
    # Генерация упрощенного postinst для отладки
    - |
      cat << 'POSTINST_EOF' > deb/DEBIAN/postinst
      #!/bin/bash
      set -e

      echo "============================================"
      echo "DEBUG: Starting post-installation script for __PROJECT_NAME__"
      echo "============================================"

      # Функция установки .NET Runtime
      install_dotnet_runtime() {
          echo "[DEBUG] === install_dotnet_runtime function start ==="
          
          REQUIRED_VERSION="__DOTNET_RT_VERSION__"
          echo "[DEBUG] Required version: '$REQUIRED_VERSION'"
          
          DOTNET_DIR="/usr/bin/dotnet/shared/Microsoft.NETCore.App"
          echo "[DEBUG] Checking existing installation in: $DOTNET_DIR"
          
          # Проверяем существующую установку
          if [ -d "$DOTNET_DIR" ]; then
              echo "[DEBUG] .NET directory exists, checking version"
              INSTALLED_VERSION=$(ls "$DOTNET_DIR" 2>/dev/null | grep -E '^8\.0\.[0-9]+$' | sort -V | tail -n 1)
              echo "[DEBUG] Found installed version: '$INSTALLED_VERSION'"
              
              if [ -n "$INSTALLED_VERSION" ]; then
                  VERSION_COMPARISON=$(printf '%s\n' "$INSTALLED_VERSION" "$REQUIRED_VERSION" | sort -V | head -n1)
                  if [ "$VERSION_COMPARISON" = "$REQUIRED_VERSION" ]; then
                      echo "[DEBUG] Compatible version already installed"
                      echo "SUCCESS: .NET Runtime $INSTALLED_VERSION is compatible"
                      return 0
                  fi
              fi
          fi
          
          echo "[DEBUG] .NET Runtime installation required"
          
          # Проверка архива
          ARCHIVE_PATH="/tempdir/aspnetcore-runtime-8.0.13-linux-x64.tar.gz"
          echo "[DEBUG] Looking for archive: $ARCHIVE_PATH"
          
          if [ -f "$ARCHIVE_PATH" ]; then
              echo "[DEBUG] Found archive file"
              
              # Создание директории .NET
              echo "[DEBUG] Creating .NET directory: /usr/bin/dotnet"
              mkdir -p /usr/bin/dotnet
              
              # Имитация распаковки архива (для тестирования)
              echo "[DEBUG] Simulating archive extraction..."
              mkdir -p /usr/bin/dotnet/shared/Microsoft.NETCore.App/__DOTNET_RT_VERSION__
              echo "#!/bin/bash" > /usr/bin/dotnet/dotnet
              echo "echo 'Fake dotnet version __DOTNET_RT_VERSION__'" >> /usr/bin/dotnet/dotnet
              chmod +x /usr/bin/dotnet/dotnet
              
              # Удаление архива
              echo "[DEBUG] Removing temporary archive"
              rm -f "$ARCHIVE_PATH"
              
              echo "SUCCESS: .NET Runtime __DOTNET_RT_VERSION__ installed"
          else
              echo "[DEBUG] Archive not found: $ARCHIVE_PATH"
              echo "ERROR: .NET Runtime archive not found"
              return 1
          fi
          
          echo "[DEBUG] === install_dotnet_runtime function end ==="
      }

      # Установка .NET Runtime
      echo "[DEBUG] Step 1: Installing .NET Runtime"
      install_dotnet_runtime || {
          echo "ERROR: .NET Runtime installation failed"
          exit 1
      }

      # Создание директорий
      echo "[DEBUG] Step 2: Creating application directories"
      
      PROJECT_DIR="/opt/__PROJECT_NAME__"
      LOG_DIR="/var/log/__PROJECT_NAME__"
      
      echo "[DEBUG] Creating project directory: $PROJECT_DIR"
      mkdir -p "$PROJECT_DIR"
      echo "[DEBUG] Creating log directory: $LOG_DIR"
      mkdir -p "$LOG_DIR"

      # Установка прав доступа
      echo "[DEBUG] Step 3: Setting up permissions"
      echo "[DEBUG] Setting executable permissions for application binary"
      chmod 755 "$PROJECT_DIR/__PROJECT_NAME__" 2>/dev/null || echo "[DEBUG] Binary not found, skipping"
      
      echo "[DEBUG] Setting permissions for DLLs"
      chmod 644 "$PROJECT_DIR"/*.dll 2>/dev/null || echo "[DEBUG] No DLL files found"
      
      # Проверка пользователя alphadaemon
      if id "alphadaemon" &>/dev/null; then
          echo "[DEBUG] User alphadaemon exists, setting ownership"
          chown -R alphadaemon:alphadaemon "$PROJECT_DIR" 2>/dev/null || echo "[DEBUG] Failed to set ownership"
          chown alphadaemon:alphadaemon "$LOG_DIR" 2>/dev/null || echo "[DEBUG] Failed to set log ownership"
      else
          echo "[DEBUG] User alphadaemon does not exist, skipping ownership"
      fi

      # Создание systemd service
      echo "[DEBUG] Step 4: Creating systemd service"
      
      cat << EOF > /etc/systemd/system/__PROJECT_NAME__.service
      [Unit]
      Description=Debug Service __PROJECT_NAME__

      [Service]
      WorkingDirectory=$PROJECT_DIR
      ExecStart=/usr/bin/dotnet/dotnet $PROJECT_DIR/__PROJECT_NAME__.dll
      Restart=always
      RestartSec=10
      SyslogIdentifier=dotnet-__PROJECT_NAME__
      User=alphadaemon
      Environment=ASPNETCORE_ENVIRONMENT=Production

      [Install]
      WantedBy=multi-user.target
      EOF

      # Перезагрузка systemd
      echo "[DEBUG] Step 5: Reloading systemd"
      systemctl daemon-reload

      # Проверка результата установки
      echo "[DEBUG] === Installation verification ==="
      
      echo "[DEBUG] Checking .NET installation:"
      if [ -f "/usr/bin/dotnet/dotnet" ]; then
          echo "SUCCESS: dotnet binary exists"
          /usr/bin/dotnet/dotnet --version 2>/dev/null || echo "Version check failed"
      else
          echo "WARNING: dotnet binary not found"
      fi
      
      echo "[DEBUG] Checking directories:"
      echo "Project directory: $(ls -ld $PROJECT_DIR 2>/dev/null || echo 'NOT FOUND')"
      echo "Log directory: $(ls -ld $LOG_DIR 2>/dev/null || echo 'NOT FOUND')"
      
      echo "[DEBUG] Checking service file:"
      echo "Service file: $(ls -l /etc/systemd/system/__PROJECT_NAME__.service 2>/dev/null || echo 'NOT FOUND')"

      echo "DEBUG: Installation completed successfully"
      echo "============================================"
      exit 0
      POSTINST_EOF
    
    # Обработка переменных в postinst
    - sed "s/__DOTNET_RT_VERSION__/${DOTNET_RT_VERSION}/g; s/__PROJECT_NAME__/${PROJECT_NAME}/g" deb/DEBIAN/postinst > deb/DEBIAN/postinst.tmp
    - mv deb/DEBIAN/postinst.tmp deb/DEBIAN/postinst
    - chmod +x deb/DEBIAN/postinst
    
    # Генерация упрощенного prerm
    - |
      cat << 'PRERM_EOF' > deb/DEBIAN/prerm
      #!/bin/bash
      set -e

      echo "============================================"
      echo "DEBUG: Starting pre-removal script for __PROJECT_NAME__"
      echo "============================================"

      SERVICE_NAME="__PROJECT_NAME__.service"
      echo "[DEBUG] Checking service: $SERVICE_NAME"
      
      if systemctl is-active --quiet "$SERVICE_NAME"; then
          echo "[DEBUG] Service is active, stopping it"
          systemctl stop "$SERVICE_NAME"
          echo "SUCCESS: Service stopped"
      else
          echo "[DEBUG] Service is not active"
      fi

      echo "DEBUG: Pre-removal completed"
      exit 0
      PRERM_EOF
    
    - sed "s/__PROJECT_NAME__/${PROJECT_NAME}/g" deb/DEBIAN/prerm > deb/DEBIAN/prerm.tmp
    - mv deb/DEBIAN/prerm.tmp deb/DEBIAN/prerm
    - chmod +x deb/DEBIAN/prerm
    
    # Генерация упрощенного postrm
    - |
      cat << 'POSTRM_EOF' > deb/DEBIAN/postrm
      #!/bin/bash
      set -e

      echo "============================================"
      echo "DEBUG: Starting post-removal script for __PROJECT_NAME__"
      echo "============================================"

      echo "[DEBUG] Script argument: '$1'"

      if [ "$1" = "purge" ]; then
          echo "[DEBUG] Purge operation - removing directories"
          
          PROJECT_DIR="/opt/__PROJECT_NAME__"
          LOG_DIR="/var/log/__PROJECT_NAME__"
          
          for dir in "$PROJECT_DIR" "$LOG_DIR"; do
              echo "[DEBUG] Checking directory: $dir"
              if [ -d "$dir" ]; then
                  echo "[DEBUG] Removing directory: $dir"
                  rm -rf "$dir"
                  echo "SUCCESS: Removed $dir"
              else
                  echo "[DEBUG] Directory does not exist: $dir"
              fi
          done
          
          # Удаление systemd service
          SERVICE_FILE="/etc/systemd/system/__PROJECT_NAME__.service"
          echo "[DEBUG] Removing service file: $SERVICE_FILE"
          
          systemctl disable "__PROJECT_NAME__.service" 2>/dev/null || echo "[DEBUG] Failed to disable service"
          rm -f "$SERVICE_FILE"
          systemctl daemon-reload
          
          echo "SUCCESS: Service removed"
      else
          echo "[DEBUG] Not a purge operation, skipping cleanup"
      fi

      echo "DEBUG: Post-removal completed"
      exit 0
      POSTRM_EOF
    
    - sed "s/__PROJECT_NAME__/${PROJECT_NAME}/g" deb/DEBIAN/postrm > deb/DEBIAN/postrm.tmp
    - mv deb/DEBIAN/postrm.tmp deb/DEBIAN/postrm
    - chmod +x deb/DEBIAN/postrm
    
    # Установка прав
    - chmod 755 deb/DEBIAN/*
    - chmod 644 deb/DEBIAN/control
    
    # Сборка пакета
    - echo "Creating control.tar.xz..."
    - tar -cJf control.tar.xz -C deb/DEBIAN .
    - echo "Creating data.tar.xz..."
    - tar -cJf data.tar.xz -C deb --exclude=DEBIAN .
    - echo "Creating debian-binary..."
    - echo "2.0" > debian-binary
    - echo "Building debug .deb package..."
    - mkdir -p packages
    - ar r ./packages/${DEB_NAME}_amd64.deb debian-binary control.tar.xz data.tar.xz
    - rm -f debian-binary control.tar.xz data.tar.xz
    
    # Информация о созданном пакете
    - echo "=== DEBUG PACKAGE CREATED ==="
    - ls -l ./packages/${DEB_NAME}_amd64.deb
    - echo "Package name: ${DEB_NAME}_amd64.deb"
    - echo "Package contents can be inspected with: dpkg -c package.deb"
    - echo "Package info can be viewed with: dpkg -I package.deb"
    
  artifacts:
    name: "debug-package-${PROJECT_NAME}-${CI_COMMIT_SHORT_SHA}"
    paths:
      - ./packages/