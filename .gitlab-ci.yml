  script:
    - echo "Creating system fonts standalone package..."
    - DEB_NAME="tn.fonts-${VERSION}"
    - echo "DEB_NAME=$DEB_NAME"
    # Проверка наличия шрифтов
    - if [ ! -d "fonts" ]; then echo "ERROR fonts directory not found"; exit 1; fi
    # Создание структуры пакета
    - mkdir -p deb-fonts/DEBIAN
    - mkdir -p deb-fonts/usr/share/fonts
    # Копирование шрифтов
    - cp -r fonts/* deb-fonts/usr/share/fonts/
    # Генерация control
    - |
      cat << EOF > deb-fonts/DEBIAN/control
      Package: tn.fonts
      Version: ${VERSION}
      Section: fonts
      Priority: optional
      Architecture: all
      Depends: fontconfig
      Maintainer: DadonovAD <dadonovad@transneft.ru>
      Description: Системные шрифты для TN приложений.
       Набор шрифтов Arial, Segoe UI, Tahoma для корректного отображения
       документов в TN_Doc и других TN приложениях.
      Homepage:

      EOF
    # Генерация preinst
    - |
      cat << EOF > deb-fonts/DEBIAN/preinst
      #!/bin/bash
      set -e

      echo "============================================"
      echo "Starting pre-installation script for TN Fonts"
      echo "============================================"

      # Проверка доступности fontconfig
      if ! command -v fc-cache >/dev/null 2>&1; then
          echo "WARNING: fontconfig (fc-cache) not found. Font cache may not be updated."
      fi

      # Очистка старых шрифтов TN (если есть)
      if [ -d "/usr/share/fonts/tn-fonts" ]; then
          echo "Removing old TN fonts directory..."
          rm -rf /usr/share/fonts/tn-fonts
      fi

      echo "✓ Pre-installation checks completed"
      exit 0
      EOF
    - chmod +x deb-fonts/DEBIAN/preinst
    # Генерация postinst
    - |
      cat << EOF > deb-fonts/DEBIAN/postinst
      #!/bin/bash
      set -e

      echo "============================================"
      echo "Starting post-installation script for TN Fonts"
      echo "============================================"

      # Установка прав на шрифты
      echo "Setting fonts permissions..."
      find /usr/share/fonts -name "*.ttf" -exec chmod 644 {} \;
      find /usr/share/fonts -name "*.TTF" -exec chmod 644 {} \;
      echo "✓ Font permissions set"

      # Обновление кэша шрифтов
      echo "Updating font cache..."
      if command -v fc-cache >/dev/null 2>&1; then
          fc-cache -f -v
          if [ \$? -eq 0 ]; then
              echo "✓ Font cache updated successfully"
          else
              echo "! WARNING: Font cache update failed"
          fi
      else
          echo "! WARNING: fc-cache not available, font cache not updated"
      fi

      # Проверка установленных шрифтов
      echo "Verifying installed fonts..."
      FONT_COUNT=\$(find /usr/share/fonts -name "*.ttf" -o -name "*.TTF" | wc -l)
      echo "Found \$FONT_COUNT font files installed"

      if command -v fc-list >/dev/null 2>&1; then
          ARIAL_COUNT=\$(fc-list | grep -i arial | wc -l)
          SEGOE_COUNT=\$(fc-list | grep -i "segoe ui" | wc -l)
          TAHOMA_COUNT=\$(fc-list | grep -i tahoma | wc -l)
          echo "Available fonts: Arial (\$ARIAL_COUNT), Segoe UI (\$SEGOE_COUNT), Tahoma (\$TAHOMA_COUNT)"
      fi

      echo "=== TN Fonts installation completed successfully ==="
      echo "============================================"
      exit 0
      EOF
    - chmod +x deb-fonts/DEBIAN/postinst
    # Генерация prerm
    - |
      cat << EOF > deb-fonts/DEBIAN/prerm
      #!/bin/bash
      set -e

      echo "============================================"
      echo "Starting pre-removal script for TN Fonts"
      echo "============================================"

      # Проверка использования другими пакетами
      if dpkg -l | grep -q "tn\.doc"; then
          echo "WARNING: TN_Doc packages are installed and may use these fonts"
          echo "Documents may not render correctly after font removal"
      fi

      exit 0
      EOF
    - chmod +x deb-fonts/DEBIAN/prerm
    # Генерация postrm
    - |
      cat << EOF > deb-fonts/DEBIAN/postrm
      #!/bin/bash
      set -e

      echo "============================================"
      echo "Starting post-removal script for TN Fonts"
      echo "============================================"

      if [ "\$1" = "purge" ]; then
          echo "Purging TN fonts installation..."

          # Удаление остатков шрифтов (если остались)
          for font_dir in "/usr/share/fonts/arial" "/usr/share/fonts/segoe ui" "/usr/share/fonts/tahoma"; do
              if [ -d "\$font_dir" ]; then
                  echo "Removing font directory: \$font_dir"
                  rm -rf "\$font_dir"
                  if [ \$? -eq 0 ]; then
                      echo "✓ Successfully removed \$font_dir"
                  else
                      echo "! WARNING: Failed to remove \$font_dir"
                  fi
              fi
          done

          # Обновление кэша шрифтов после удаления
          echo "Updating font cache after removal..."
          if command -v fc-cache >/dev/null 2>&1; then
              fc-cache -f
              echo "✓ Font cache updated"
          fi
      fi

      exit 0
      EOF
    - chmod +x deb-fonts/DEBIAN/postrm
    # Установка прав
    - chmod 644 deb-fonts/DEBIAN/control
    - find deb-fonts/usr/share/fonts -name "*.ttf" -exec chmod 644 {} \;
    - find deb-fonts/usr/share/fonts -name "*.TTF" -exec chmod 644 {} \;
    - echo "Creating fonts control.tar.xz..."
    - tar -cJf control.tar.xz -C deb-fonts/DEBIAN .
    - echo "Creating fonts data.tar.xz..."
    - tar -cJf data.tar.xz -C deb-fonts --exclude=DEBIAN .
    - echo "Creating fonts debian-binary..."
    - echo "2.0" > debian-binary
    - echo "Building fonts .deb package..."
    - mkdir -p packages
    - ar r ./packages/${DEB_NAME}.deb debian-binary control.tar.xz data.tar.xz
    - rm -f debian-binary control.tar.xz data.tar.xz
    - ls -l ./packages/${DEB_NAME}.deb
    - echo "Current directory:$(pwd)"
  artifacts:
    name: "package-fonts-TN_Doc-${CI_COMMIT_SHORT_SHA}"
    paths:
      - ./packages/

# ВАЖНО: WiX Toolset использует Windows API и НЕ работает на Linux runner.
# Для MSI нужен Windows shell runner с предустановленными .NET SDK и WiX Toolset.
# Если Windows runner недоступен — job'ы будут пропущены (allow_failure: true).

package-msi-full-job:      # MSI full package (self-contained)
  stage: package
  needs:
    - build-windows-job
    - extract-version-job
  tags:
    - windows
  rules:
    - if: '$CI_COMMIT_TAG'
    - when: on_success
  allow_failure: true
  script:
    - New-Item -ItemType Directory -Force -Path packages | Out-Null
    - dotnet build installer/windows/TN_Doc.Installer.wixproj -c Release "-p:ProductVersion=${VERSION}" "-p:HarvestPath=../../publish/win-x64-full" "-p:OutputName=tn.doc-full-${FULL_VERSION}_win-x64" "-p:OutputPath=../../packages/"
  artifacts:
    name: "msi-full-${CI_COMMIT_SHORT_SHA}"
    paths:
      - ./packages/*.msi

package-msi-minimal-job:      # MSI minimal package (framework-dependent)
  stage: package
  needs:
    - build-windows-job
    - extract-version-job
  tags:
    - windows
  rules:
    - if: '$CI_COMMIT_TAG'
    - when: on_success
  allow_failure: true
  script:
    - New-Item -ItemType Directory -Force -Path packages | Out-Null
    - dotnet build installer/windows/TN_Doc.Installer.wixproj -c Release "-p:ProductVersion=${VERSION}" "-p:HarvestPath=../../publish/win-x64-minimal" "-p:OutputName=tn.doc-${FULL_VERSION}_win-x64" "-p:OutputPath=../../packages/"
  artifacts:
    name: "msi-minimal-${CI_COMMIT_SHORT_SHA}"
    paths:
      - ./packages/*.msi

notify-telegram-job:      # Telegram notifications with file uploads
  stage: notify
  image: ubuntu:latest
  needs:
    - package-job
    - package-minimal-job
    - package-net-runtime-job
    - package-fonts-job
    - job: package-msi-full-job
      optional: true
    - job: package-msi-minimal-job
      optional: true
  tags:
    - orpovy
  rules:
    - if: '$CI_COMMIT_TAG'
    - when: on_success
  before_script:
    - apt-get update && apt-get install -y curl
  script:
    - echo "Sending Telegram notifications with packages for all built packages..."

    # Получение информации о пакетах приложения
    - FULL_PACKAGE=$(ls ./packages/tn.doc-full-*.deb | head -n1)
    - FULL_SIZE=$(du -h "$FULL_PACKAGE" | cut -f1)
    - FULL_SIZE_BYTES=$(stat -c%s "$FULL_PACKAGE")
    - FULL_NAME=$(basename "$FULL_PACKAGE")

    - MINIMAL_PACKAGE=$(ls ./packages/tn.doc-[0-9]*.deb | head -n1)
    - MINIMAL_SIZE=$(du -h "$MINIMAL_PACKAGE" | cut -f1)
    - MINIMAL_SIZE_BYTES=$(stat -c%s "$MINIMAL_PACKAGE")
    - MINIMAL_NAME=$(basename "$MINIMAL_PACKAGE")

    # Получение информации о пакетах зависимостей
    - RUNTIME_PACKAGE=$(ls ./packages/tn.dotnet-runtime-*.deb | head -n1)
    - RUNTIME_SIZE=$(du -h "$RUNTIME_PACKAGE" | cut -f1)
    - RUNTIME_SIZE_BYTES=$(stat -c%s "$RUNTIME_PACKAGE")
    - RUNTIME_NAME=$(basename "$RUNTIME_PACKAGE")

    - FONTS_PACKAGE=$(ls ./packages/tn.fonts-*.deb | head -n1)
    - FONTS_SIZE=$(du -h "$FONTS_PACKAGE" | cut -f1)
    - FONTS_SIZE_BYTES=$(stat -c%s "$FONTS_PACKAGE")
    - FONTS_NAME=$(basename "$FONTS_PACKAGE")

    # Получение информации о MSI пакетах (graceful fallback)
    - MSI_FULL_PACKAGE=$(ls ./packages/tn.doc-full-*.msi 2>/dev/null | head -n1 || echo "")
    - MSI_MINIMAL_PACKAGE=$(ls ./packages/tn.doc-[0-9]*.msi 2>/dev/null | head -n1 || echo "")
    - |
      if [ -n "$MSI_FULL_PACKAGE" ]; then
          MSI_FULL_SIZE=$(du -h "$MSI_FULL_PACKAGE" | cut -f1)
          MSI_FULL_SIZE_BYTES=$(stat -c%s "$MSI_FULL_PACKAGE")
          MSI_FULL_NAME=$(basename "$MSI_FULL_PACKAGE")
      fi
    - |
      if [ -n "$MSI_MINIMAL_PACKAGE" ]; then
          MSI_MINIMAL_SIZE=$(du -h "$MSI_MINIMAL_PACKAGE" | cut -f1)
          MSI_MINIMAL_SIZE_BYTES=$(stat -c%s "$MSI_MINIMAL_PACKAGE")
          MSI_MINIMAL_NAME=$(basename "$MSI_MINIMAL_PACKAGE")
      fi

    # Функция отправки сообщения
    - |
      send_message() {
          local message="$1"
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -d chat_id="${TELEGRAM_CHAT_ID}" \
              -d text="${message}"
      }

    # Функция отправки файла с проверкой размера (75MB лимит)
    - |
      send_file() {
          local file_path="$1"
          local caption="$2"
          local file_size="$3"

          # Максимальный размер файла: 75MB = 78643200 байт
          if [ "$file_size" -lt 78643200 ]; then
              echo "✅ Отправляем файл: $(basename "$file_path") ($(du -h "$file_path" | cut -f1))"
              curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendDocument" \
                  -F chat_id="${TELEGRAM_CHAT_ID}" \
                  -F document="@${file_path}" \
                  -F caption="${caption}"
              if [ $? -eq 0 ]; then
                  echo "✅ Файл отправлен успешно"
              else
                  echo "❌ Ошибка отправки файла"
              fi
          else
              echo "⚠️ Файл $(basename "$file_path") слишком большой: $(du -h "$file_path" | cut -f1) > 75MB"
              send_message "⚠️ Файл $(basename "$file_path") слишком большой для отправки ($(du -h "$file_path" | cut -f1)). Максимум: 75MB"
          fi
      }

    # Отправка первого сообщения - пакеты приложения (Linux)
    - |
      APP_MESSAGE="🚀 Собраны пакеты приложения TN_Doc (Linux):

      📦 Полный пакет: $FULL_NAME
      📏 Размер: $FULL_SIZE

      📦 Минимальный пакет: $MINIMAL_NAME
      📏 Размер: $MINIMAL_SIZE

      🏷️ Версия: ${VERSION}
      🔗 Коммит: ${CI_COMMIT_SHORT_SHA}
      📋 Pipeline: ${CI_PIPELINE_URL}"

      send_message "$APP_MESSAGE"

    # Отправка пакетов приложения (Linux)
    - echo "Отправляем пакеты приложения (Linux)..."
    - send_file "$FULL_PACKAGE" "📦 Полный (+ .NET Runtime) пакет TN_Doc v${VERSION}" "$FULL_SIZE_BYTES"
    - send_file "$MINIMAL_PACKAGE" "📦 TN_Doc" "$MINIMAL_SIZE_BYTES"

    # Пауза между группами сообщений
    - sleep 2

    # Отправка второго сообщения - пакеты зависимостей
    - |
      DEPS_MESSAGE="⚙️ Собраны пакеты зависимостей TN_Doc:

      📦 .NET Runtime: $RUNTIME_NAME
      📏 Размер: $RUNTIME_SIZE

      📦 Системные шрифты: $FONTS_NAME
      📏 Размер: $FONTS_SIZE

      🏷️ Версия: ${VERSION}
      🔗 Коммит: ${CI_COMMIT_SHORT_SHA}
      📋 Pipeline: ${CI_PIPELINE_URL}"

      send_message "$DEPS_MESSAGE"

    # Отправка пакетов зависимостей
    - echo "Отправляем пакеты зависимостей..."
    - send_file "$RUNTIME_PACKAGE" "⚙️ .NET Runtime 8.0.13 для TN приложений" "$RUNTIME_SIZE_BYTES"
    - send_file "$FONTS_PACKAGE" "⚙️ Системные шрифты для TN приложений" "$FONTS_SIZE_BYTES"

    # Отправка третьего сообщения - пакеты Windows (MSI)
    - |
      if [ -n "$MSI_FULL_PACKAGE" ] || [ -n "$MSI_MINIMAL_PACKAGE" ]; then
          sleep 2

          WIN_MESSAGE="🪟 Собраны пакеты приложения TN_Doc (Windows):"

          if [ -n "$MSI_FULL_PACKAGE" ]; then
              WIN_MESSAGE="$WIN_MESSAGE

      📦 Полный MSI (self-contained): $MSI_FULL_NAME
      📏 Размер: $MSI_FULL_SIZE"
          fi

          if [ -n "$MSI_MINIMAL_PACKAGE" ]; then
              WIN_MESSAGE="$WIN_MESSAGE

      📦 Минимальный MSI: $MSI_MINIMAL_NAME
      📏 Размер: $MSI_MINIMAL_SIZE"
          fi

          WIN_MESSAGE="$WIN_MESSAGE

      🏷️ Версия: ${VERSION}
      🔗 Коммит: ${CI_COMMIT_SHORT_SHA}
      📋 Pipeline: ${CI_PIPELINE_URL}"

          send_message "$WIN_MESSAGE"

          echo "Отправляем пакеты Windows (MSI)..."
          if [ -n "$MSI_FULL_PACKAGE" ]; then
              send_file "$MSI_FULL_PACKAGE" "🪟 MSI Full (self-contained) TN_Doc v${VERSION}" "$MSI_FULL_SIZE_BYTES"
          fi
          if [ -n "$MSI_MINIMAL_PACKAGE" ]; then
              sleep 1
              send_file "$MSI_MINIMAL_PACKAGE" "🪟 MSI Minimal TN_Doc v${VERSION}" "$MSI_MINIMAL_SIZE_BYTES"
          fi
      else
          echo "⚠️ MSI пакеты не найдены (Windows runner мог быть недоступен)"
      fi

    - echo "Telegram notifications and files sent successfully"
  artifacts:
    name: "notifications-sent-${CI_COMMIT_SHORT_SHA}"
    when: always
    expire_in: 1 day
    paths:
      - ./packages/
