<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title></title>

    <link rel="stylesheet" href="/css/commonEditForm.css">

    <style>
        :root {
            --disabled-bg-color: #F5F5F5;
        }

        /*chrome*/
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        /*mozilla*/
        input[type=number] {
            -moz-appearance: textfield;
        }

        input {
            font-size: 14px;
            font-family: Arial,sans-serif;
            outline: none;
            border: 1px solid transparent;
        }
        select {
            font-size: 14px;
            font-family: Arial,sans-serif;
            outline: none;
            border: 1px solid transparent;
            width: 100%;
        }

        /* Базовые стили для всех таблиц */
        table {
            border-collapse: collapse;
            width: 100%;
            font-family: 'Segoe UI', 'PT Astra Sans', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
        }

        /* Стили для ячеек */
        td, th {
            font-size: 15px;
            padding: 6px 10px;
            border: 1px solid #CFD8DC; /* --md-outline */
            color: #212121; /* --md-text */
        }

        /* Заголовки таблиц */
        th {
            background-color: #F1F3F4; /* --md-surface-variant */
            font-weight: 600;
            text-align: left;
        }

        /* Таблица AdditionalInfo */
        #AdditionalInfo {
            width: 100%;
            margin-bottom: 15px;
            table-layout: fixed;
        }

        /* Первая колонка - ширина по содержимому, но не более 70% */
        #AdditionalInfo td:first-child {
            width: auto;
            max-width: 70%;
            white-space: nowrap;
        }

        /* Вторая колонка - заполняет оставшееся место */
        #AdditionalInfo td:nth-child(2) {
            width: auto;
        }

        /* Элементы ввода во второй колонке растягиваются на всю ширину */
        #AdditionalInfo td:nth-child(2) input,
        #AdditionalInfo td:nth-child(2) select,
        #AdditionalInfo td:nth-child(2) textarea {
            width: 100%;
            box-sizing: border-box;
            height: 30px;
            padding: 6px 10px;
            border-radius: 8px;
            border: 1px solid #CFD8DC; /* --md-outline */
            background-color: white;
            color: #212121; /* --md-text */
            font-size: 15px;
            font-family: 'Segoe UI', 'PT Astra Sans', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
            transition: border-color 0.15s ease-in-out, box-shadow 0.15s ease-in-out;
            line-height: normal;
            vertical-align: middle;
        }

        /* Textarea - автоматическая высота */
        #AdditionalInfo td:nth-child(2) textarea {
            height: auto;
            min-height: 30px;
            resize: vertical;
        }

        /* Hover состояние для элементов ввода */
        #AdditionalInfo td:nth-child(2) input:hover,
        #AdditionalInfo td:nth-child(2) select:hover,
        #AdditionalInfo td:nth-child(2) textarea:hover {
            border-color: #B0BEC5;
        }

        /* Focus состояние для элементов ввода */
        #AdditionalInfo td:nth-child(2) input:focus,
        #AdditionalInfo td:nth-child(2) select:focus,
        #AdditionalInfo td:nth-child(2) textarea:focus {
            outline: none;
            border-color: #1E88E5; /* --md-primary */
            box-shadow: 0 0 0 3px rgba(30, 136, 229, 0.35);
        }

        /* Disabled состояние для элементов ввода */
        #AdditionalInfo td:nth-child(2) input:disabled,
        #AdditionalInfo td:nth-child(2) select:disabled,
        #AdditionalInfo td:nth-child(2) textarea:disabled {
            background-color: #F1F3F4; /* --md-surface-variant */
            color: #5F6368; /* --md-text-secondary */
            cursor: not-allowed;
        }

        /* Обычные строки */
        tbody td {
            background-color: white;
        }

        /* Строки с выделением */
        tr.selected td,
        tr.active td {
            background-color: #1E88E5; /* --md-primary */
            color: white;
        }

        Edit {
            border-collapse: collapse;
        }
        
        .correct-value {
            border: 1px solid transparent;
        }

        .incorrect-value {
            border: 2px solid rgb(255, 105, 105);
        }
        
        .manual-input--disabled{
            text-align: center;
            background: var(--disabled-bg-color);
            color:black;
            cursor: not-allowed;
            opacity: 0.8;
            pointer-events: none;
        }

        /* Стили для ячеек с неактивными элементами */
        td:has(input.manual-input--disabled),
        td:has(select.manual-input--disabled) {
            background-color: var(--disabled-bg-color);
            position: relative;
        }
    </style>

    <script src="/lib/jquery/dist/jquery.min.js"></script>
    <script src="/lib/jquery-ui-1.13.1.custom/jquery-ui.min.js"></script>
    <link rel="stylesheet" href="/lib/jquery-ui-1.13.1.custom/jquery-ui.min.css">
    <script src="/js/Logger.js"></script>
    <script src="/js/EditDoc.js"></script>
    <script src="/js/loading-spinner.js"></script>
    <script id="ElementChangeEventHandling" type="text/javascript">

    let dictionaries;
    let invalidChars;
    
    function UserChangeEvent(selectObject) {
        try {
            logTrace(`UserChangeEvent: начало обработки изменения для ${selectObject.name}, значение: ${selectObject.value}`);
            
            if (selectObject.name === "Delive_IOF") {
                let user = dictionaries.Users.filter(users => users["Id"] === Number($(selectObject).val()))[0];
                
                if (user) {
                    logTrace(`UserChangeEvent: найден пользователь сдающей стороны - ${user.FIO || 'неизвестно'}, предприятие: ${user.Factory || 'не указано'}`);
                    
                    document.getElementById("Delive_Factory").value = user.Factory || '';
                    document.getElementById("Delive_FIO").value = user.FIO || '';

                    // Применяем валидацию к автоматически заполненным полям
                    InputStringCheck(document.getElementById("Delive_Factory"));
                    InputStringCheck(document.getElementById("Delive_FIO"));

                    let license = dictionaries.Licenses.filter(licenses => licenses["Id"] === user['LicId'])[0];
                    if (license) {
                        logTrace(`UserChangeEvent: найдена доверенность для сдающей стороны - номер: ${license.LicensesNumber || 'не указан'}, дата: ${license.LicensesDate || 'не указана'}`);

                        document.getElementById("Delive_Lic_Date").value = license.LicensesDate || '';
                        document.getElementById("Delive_Lic_Number").value = license.LicensesNumber || '';

                        // Применяем валидацию к полям доверенности
                        InputStringCheck(document.getElementById("Delive_Lic_Date"));
                        InputStringCheck(document.getElementById("Delive_Lic_Number"));
                    } else {
                        logWarn(`UserChangeEvent: доверенность для пользователя сдающей стороны не найдена, LicId: ${user['LicId'] || 'не указан'}`);
                        document.getElementById("Delive_Lic_Date").value = '';
                        document.getElementById("Delive_Lic_Number").value = '';
                    }
                    
                    logTrace(`UserChangeEvent: обновлены поля для сдающей стороны`);
                } else {
                    logWarn(`UserChangeEvent: пользователь сдающей стороны с ID ${selectObject.value} не найден`);
                    document.getElementById("Delive_Factory").value = '';
                    document.getElementById("Delive_FIO").value = '';
                    document.getElementById("Delive_Lic_Date").value = '';
                    document.getElementById("Delive_Lic_Number").value = '';
                }
            } else if (selectObject.name === "Receive_IOF") {
                let user = dictionaries.Users.filter(users => users["Id"] === Number($(selectObject).val()))[0];
                
                if (user) {
                    logTrace(`UserChangeEvent: найден пользователь принимающей стороны - ${user.FIO || 'неизвестно'}, предприятие: ${user.Factory || 'не указано'}`);
                    
                    document.getElementById("Receive_Factory").value = user.Factory || '';
                    document.getElementById("Receive_FIO").value = user.FIO || '';

                    // Применяем валидацию к автоматически заполненным полям
                    InputStringCheck(document.getElementById("Receive_Factory"));
                    InputStringCheck(document.getElementById("Receive_FIO"));

                    let license = dictionaries.Licenses.filter(licenses => licenses["Id"] === user['LicId'])[0];
                    if (license) {
                        logTrace(`UserChangeEvent: найдена доверенность для принимающей стороны - номер: ${license.LicensesNumber || 'не указан'}, дата: ${license.LicensesDate || 'не указана'}`);

                        document.getElementById("Receive_Lic_Date").value = license.LicensesDate || '';
                        document.getElementById("Receive_Lic_Number").value = license.LicensesNumber || '';

                        // Применяем валидацию к полям доверенности
                        InputStringCheck(document.getElementById("Receive_Lic_Date"));
                        InputStringCheck(document.getElementById("Receive_Lic_Number"));
                    } else {
                        logWarn(`UserChangeEvent: доверенность для пользователя принимающей стороны не найдена, LicId: ${user['LicId'] || 'не указан'}`);
                        document.getElementById("Receive_Lic_Date").value = '';
                        document.getElementById("Receive_Lic_Number").value = '';
                    }
                    
                    logTrace(`UserChangeEvent: обновлены поля для принимающей стороны`);
                } else {
                    logWarn(`UserChangeEvent: пользователь принимающей стороны с ID ${selectObject.value} не найден`);
                    document.getElementById("Receive_Factory").value = '';
                    document.getElementById("Receive_FIO").value = '';
                    document.getElementById("Receive_Lic_Date").value = '';
                    document.getElementById("Receive_Lic_Number").value = '';
                }
            }
            
            logTrace(`UserChangeEvent: обработка изменения для ${selectObject.name} завершена успешно`);
        } catch (error) {
            logError(`UserChangeEvent: ошибка при обработке изменения ${selectObject.name}: ${error.message}`);
            console.error('UserChangeEvent error:', error);
        }
    }

    function InputStringCheck(Object) {
        if(CheckEmpty(Object))
            CheckInvalidChars(Object);
        updateTooltip(Object);
        updateTooltip(Object);
        SendingMessageStateButtonSave();
    }

    function CheckEmpty(Object) {
        if(!Object.hasAttribute("fill-required"))
            return true;

        if (!Object.value) {
            Object.classList.replace("correct-value", "incorrect-value");
            if(Object.hasAttribute("title")) {
                Object.setAttribute("title", "Поле должно быть заполнено!")
            }
            return false;
        }
        else {
            Object.classList.replace("incorrect-value", "correct-value");
            if(Object.hasAttribute("title")) {
                Object.setAttribute("title", "")
            }
        }
        return true;
    }
        
    function CheckInvalidChars(element) {
        if(invalidChars == null || invalidChars.length === 0)
            return true;

        let value = null;
        if (element instanceof HTMLInputElement) {
            value = element.value;
        } else if (element instanceof HTMLSelectElement) {
            const selectedOption = element.options[element.selectedIndex];
            value = selectedOption ? selectedOption.text : null;
        }
        if(value === null) {
            return true;
        }
        for (let char of invalidChars) {
            if (value.includes(char)) {
                element.classList.replace("correct-value", "incorrect-value");
                if(element.hasAttribute("title")) {
                    element.setAttribute("title", `Некорректный символ: ${char}`)
                }
                return false;
            }
        }
        element.classList.replace("incorrect-value", "correct-value");
        return true;
    }
    
    function SendingMessageStateButtonSave() {
        window.top.postMessage(document.querySelectorAll('.incorrect-value').length === 0
                ? 'ButtonSaveOn'
                : 'ButtonSaveOff',
            '*')
    }

    function updateTooltip(element) {
        // Проверяем наличие id у элемента перед использованием jQuery селектора
        if (!element.id) {
            return;
        }

        const $element = $('#' + element.id);

        // Проверяем, инициализирован ли tooltip для элемента
        if (!$element.hasClass('ui-tooltip-trigger') && !$element.data('ui-tooltip')) {
            // Инициализируем tooltip для элемента
            $element.tooltip();
        }

        if(element.classList.contains("incorrect-value"))
        {
            $element.tooltip("enable")
                .tooltip("option", "content", element.getAttribute("title"));
        }

        if(element.classList.contains("correct-value"))
        {
            $element.tooltip("disable");
        }
    }
</script>

</head>
<body>

    <table id="AdditionalInfo">
        <tbody>

        </tbody>
    </table>

    <script type="text/javascript">

        $(document).ready(function() {
            // Инициализация подсказки для всех элементов с атрибутом title
            $('[title]').tooltip();

            SendingMessageStateButtonSave();
            dictionaries = GetUsers();
            invalidChars = GetInvalideChars();

            // Отключаем прокрутку колесиком мыши на input[type="number"]
            document.querySelectorAll('input[type="number"]').forEach(function(input) {
                input.addEventListener('wheel', function(event) {
                    event.preventDefault();  // Отключаем изменение значения колесиком мыши
                });
            });
            const elementsWithOnInput = document.querySelectorAll('[oninput]');
            elementsWithOnInput.forEach(element => {
                if (element.nodeName === 'INPUT' || element.nodeName === 'SELECT') {
                    element.oninput();
                }
            });
        });
    </script>
</body>
</html>
