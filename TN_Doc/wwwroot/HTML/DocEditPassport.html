<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title></title>

    <style>
        :root {
            --disabled-bg-color: #EEEEEE;
            --elis-active-color: #8fd19e;
            --elis-disabled-color: #8fd19e;
        }

        /*chrome*/
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        /*mozilla*/
        input[type=number] {
            -moz-appearance: textfield;
        }

        input {
            font-size: 14px;
            font-family: Arial,sans-serif;
            outline: none;
            border: 1px solid transparent;
        }
        select {
            font-size: 14px;
            font-family: Arial,sans-serif;
            outline: none;
            border: 1px solid transparent;
            width: 100%;
        }

        td,
        th {
            font-size: 14px;
            font-family: Arial,sans-serif;
            /* Размер шрифта в процентах */
            padding: 2px;
            /* Поля вокруг содержимого таблицы */
            border: 0.5px solid black;
            /* Параметры рамки */
        }

        Edit {
            border-collapse: collapse;
            /* Убираем двойные линии между ячейками */
        }
        
        .correct-value {
            border: 1px solid transparent;
        }

        .incorrect-value {
            border: 2px solid rgb(255, 105, 105);
        }
        
        .manual-input--disabled{
            text-align: center;
            background: var(--disabled-bg-color);
            color:black;
            cursor: not-allowed;
            opacity: 0.8;
            pointer-events: none;
        }

        /* Стили для ячеек с неактивными элементами */
        td:has(input.manual-input--disabled),
        td:has(select.manual-input--disabled) {
            background-color: var(--disabled-bg-color);
            position: relative;
        }

        /* Стили для ячеек с данными из ЕЛИС */
        td:has(input[data-elis-filled="true"]),
        td:has(select[data-elis-filled="true"]) {
            background-color: var(--elis-active-color);
        }

        td:has(input[data-elis-filled="true"].manual-input--disabled),
        td:has(select[data-elis-filled="true"].manual-input--disabled) {
            background-color: var(--elis-disabled-color);
        }

        /* Стили для элементов внутри ячеек */
        input[data-elis-filled="true"],
        select[data-elis-filled="true"] {
            background-color: var(--elis-active-color);
        }

        input[data-elis-filled="true"].manual-input--disabled,
        select[data-elis-filled="true"].manual-input--disabled {
            background-color: var(--elis-disabled-color);
        }

        input.manual-input--disabled,
        select.manual-input--disabled {
            background-color: var(--disabled-bg-color);
        }

        /* Создаем эффект "затемнения" для всей ячейки */
        td:has(input.manual-input--disabled)::after,
        td:has(select.manual-input--disabled)::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.05);
            pointer-events: none;
        }

        /* Стиль для подсказки */
        .ui-tooltip {
            background-color: red!important;
            color: white!important;
            font-size: 14px!important;
            font-family: Arial,sans-serif!important;
        }
        
        /* Стили для элементов ввода при фокусе */
        input:focus,
        select:focus {
            border: 1px solid transparent;
        }
    </style>

    <script src="/lib/jquery/dist/jquery.min.js"></script>
    <script src="/lib/jquery-ui-1.13.1.custom/jquery-ui.min.js"></script>
    <link rel="stylesheet" href="/lib/jquery-ui-1.13.1.custom/jquery-ui.min.css">
    <script src="/js/EditDoc.js"></script>
    <script src="/js/loading-spinner.js"></script>
    <script id="ElementChangeEventHandling" type="text/javascript">

        let dictionaries;
        let invalidChars;

        function UserChangeEvent(selectObject) {
            if (selectObject.name == "Laboratory_IOF") {
                var user = dictionaries.Users.filter(users => users["Id"] == $(selectObject).val());
                document.getElementById("Laboratory_Post").value = user[0].Post;
                document.getElementById("Laboratory_Factory").value = user[0].Factory;

            }
            else if (selectObject.name == "Delive_IOF") {
                var user = dictionaries.Users.filter(users => users["Id"] == $(selectObject).val());
                document.getElementById("Delive_Post").value = user[0].Post;
                document.getElementById("Delive_Factory").value = user[0].Factory;
            }
            else if (selectObject.name == "Receive_IOF") {
                var user = dictionaries.Users.filter(users => users["Id"] == $(selectObject).val());
                document.getElementById("Receive_Post").value = user[0].Post;
                document.getElementById("Receive_Factory").value = user[0].Factory;
            }
        }

        function InputStringCheck(object) {
            if(CheckEmpty(object))
                CheckInvalidChars(object);
            updateTooltip(object);
            SendingMessageStateButtonSave();
        }
        
        function CheckInvalidChars(object) {
            if(invalidChars == null || invalidChars.length === 0)
                return true;
            
            let value = null;
            if (object instanceof HTMLInputElement) {
                value = object.value; 
            } else if (object instanceof HTMLSelectElement) {
                const selectedOption = object.options[object.selectedIndex]; 
                value = selectedOption ? selectedOption.text : null;
            }
            if(value === null) {
                return true;
            }
            for (let char of invalidChars) {
                if (value.includes(char)) {
                    object.classList.replace("correct-value", "incorrect-value");
                    object.setAttribute("title", `Некорректный символ: ${char}`);
                    return false;
                }
            }
            object.classList.replace("incorrect-value", "correct-value");
            if(object.hasAttribute("title")) {
                object.setAttribute("title", "")
            }
            return true;
        } 
            
        function InputValueCheck(object) {
            if(CheckEmpty(object))
                CheckRounding(object);
            updateTooltip(object);
            SendingMessageStateButtonSave();
        }

        function CheckRounding(object) {
            if(!object.hasAttribute('data-roundvalue')) {
                return true;
            }
                
            const round = Number(object.getAttribute('data-roundvalue'));
            if(isNaN(round) || round < 1)
                return true;
                
            const strRegExPattern = "^-?[0-9]+(?:\\.[0-9]{1," + round + "})?$";
            if (object.value.match(new RegExp(strRegExPattern,'g'))) {
                object.classList.replace("incorrect-value", "correct-value");
                if(object.hasAttribute("title")) {
                    object.setAttribute("title", "")
                }
            }
            else {
                object.classList.replace("correct-value", "incorrect-value");
                object.setAttribute("title", "Кол-во знаков после запятой не соответствует заданным правилам!")
                return false;
            }
            return true;
        }

        function CheckEmpty(object) {
            if(!object.hasAttribute("fill-required"))
                return true;
            
            if (!object.value) {
                object.classList.replace("correct-value", "incorrect-value");
                object.setAttribute("title", "Поле должно быть заполнено!");
                return false;
            }
            else {
                object.classList.replace("incorrect-value", "correct-value");
                if(object.hasAttribute("title")) {
                    object.setAttribute("title", "")
                }
            }
            return true;
        }
        
        function SendingMessageStateButtonSave() {
            window.top.postMessage(document.querySelectorAll('.incorrect-value').length === 0
                    ? 'ButtonSaveOn'
                    : 'ButtonSaveOff',
                '*')
        }

        function updateTooltip(element) {
            if(element.classList.contains("incorrect-value"))
            {
                $('#' + element.id)
                    .tooltip("enable")
                    .tooltip("option", "content", element.getAttribute("title"));  
            }
            
            if(element.classList.contains("correct-value"))
            {
                $('#' + element.id).tooltip("disable");
            }
        }
    </script>
</head>

        document.querySelectorAll('input[type="number"]').forEach(function(input) {
            input.addEventListener('wheel', function(event) {
                event.preventDefault();  // Отключаем изменение значения колесиком мыши
            });
        });
        const elementsWithOnInput = document.querySelectorAll('[oninput]');
        elementsWithOnInput.forEach(element => {

            }
        });
    });
