<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title></title>

    <style>
        /*chrome*/
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        /*mozilla*/
        input[type=number] {
            -moz-appearance: textfield;
        }

        /* Базовые стили для всех таблиц */
        table {
            border-collapse: collapse;
            width: 100%;
            font-family: 'Segoe UI', 'PT Astra Sans', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
        }

        /* Стили для ячеек */
        td, th {
            font-size: 15px;
            padding: 6px 10px;
            border: 1px solid #CFD8DC; /* --md-outline */
            color: #212121; /* --md-text */
        }

        /* Заголовки таблиц */
        th {
            background-color: #F1F3F4; /* --md-surface-variant */
            font-weight: 600;
            text-align: left;
        }

        /* Таблица AdditionalInfo */
        #AdditionalInfo {
            width: 100%;
            margin-bottom: 15px;
        }

        /* Обычные строки */
        tbody td {
            background-color: white;
        }

        /* Строки с выделением */
        tr.selected td,
        tr.active td {
            background-color: #1E88E5; /* --md-primary */
            color: white;
        }
    </style>

    <link rel="stylesheet" href="/css/commonEditForm.css">
    
    <script src="/lib/jquery/dist/jquery.min.js"></script>
    <script src="/lib/jquery-ui-1.13.1.custom/jquery-ui.min.js"></script>
    <link rel="stylesheet" href="/lib/jquery-ui-1.13.1.custom/jquery-ui.min.css">
    <script src="/js/Logger.js"></script>
    <script src="/js/EditDoc.js"></script>
    <script src="/js/loading-spinner.js"></script>

    <script id="ElementChangeEventHandling" type="text/javascript">

        var dictionaries;

        function funcOnLoad() {
            dictionaries = GetUsers();
        }

        function UserChangeEvent(selectObject)
        {
            try {
                logTrace(`UserChangeEvent: начало обработки изменения для ${selectObject.name}, значение: ${selectObject.value}`);
                
                if (selectObject.name == "Delive_IOF")
                {
                    var user = dictionaries.Users.filter(users => users["Id"] == $(selectObject).val());
                    
                    if (user && user.length > 0 && user[0]) {
                        logTrace(`UserChangeEvent: найден пользователь сдающей стороны - ${user[0].IOF || 'неизвестно'}, должность: ${user[0].Post || 'не указана'}, предприятие: ${user[0].Factory || 'не указано'}`);
                        
                        document.getElementById("Delive_Post").value = user[0].Post || '';
                        document.getElementById("Delive_Factory").value = user[0].Factory || '';
                        
                        logTrace(`UserChangeEvent: обновлены поля должности и предприятия для сдающей стороны`);
                    } else {
                        logWarn(`UserChangeEvent: пользователь сдающей стороны с ID ${selectObject.value} не найден`);
                        document.getElementById("Delive_Post").value = '';
                        document.getElementById("Delive_Factory").value = '';
                    }
                }
                else if (selectObject.name == "Receive_IOF")
                {
                    var user = dictionaries.Users.filter(users => users["Id"] == $(selectObject).val());
                    
                    if (user && user.length > 0 && user[0]) {
                        logTrace(`UserChangeEvent: найден пользователь принимающей стороны - ${user[0].IOF || 'неизвестно'}, должность: ${user[0].Post || 'не указана'}, предприятие: ${user[0].Factory || 'не указано'}`);
                        
                        document.getElementById("Receive_Post").value = user[0].Post || '';
                        document.getElementById("Receive_Factory").value = user[0].Factory || '';
                        
                        logTrace(`UserChangeEvent: обновлены поля должности и предприятия для принимающей стороны`);
                    } else {
                        logWarn(`UserChangeEvent: пользователь принимающей стороны с ID ${selectObject.value} не найден`);
                        document.getElementById("Receive_Post").value = '';
                        document.getElementById("Receive_Factory").value = '';
                    }
                }
                
                logTrace(`UserChangeEvent: обработка изменения для ${selectObject.name} завершена успешно`);
            } catch (error) {
                logError(`UserChangeEvent: ошибка при обработке изменения ${selectObject.name}: ${error.message}`);
                console.error('UserChangeEvent error:', error);
            }
        }
    </script>

</head>
<body onload="funcOnLoad()">

    <table id="AdditionalInfo">
        <tbody>

        </tbody>
    </table>

</body>
</html>
