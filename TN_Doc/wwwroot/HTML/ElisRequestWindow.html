<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Окно запроса данных из ЕЛИС</title>
</head>
<body>
    <!-- Модальное окно для запроса данных из ЕЛИС -->
    <div class="modal fade" id="elis" tabindex="-1" role="dialog" aria-labelledby="modalTitle" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered" role="document">
            <div class="modal-content">
                <!-- Заголовок модального окна -->
                <div class="modal-header">
                    <span class="modal-title" id="modalTitle">Получение данных из ЕЛИС</span>
                </div>
                <!-- Содержимое модального окна -->
                <div class="modal-body">
                    <span class="modal-info" id="info"></span>

                    <button id="buttonDataRequest" type="button" class="btn btn-primary" onclick="GetElisData()">
                        <span id="spinnerDataRequest" class="spinner-border spinner-border-sm" role="status" aria-hidden="true" hidden></span>
                        <span id="textDataRequest">Запросить данные</span>
                    </button>
                    <div id="listPassports" class="list-group"></div>
                </div>
                <!-- Футер модального окна -->
                <div class="modal-footer">
                    <button id="elisApplyButton" type="button" class="btn btn-primary" data-dismiss="modal" onclick="FillPassportDataElis()">Применить</button>
                    <button type="button" class="btn btn-secondary" data-dismiss="modal" onclick="ResetPassportDataElis()">Закрыть</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Модальное окно для просмотра данных протокола ЕЛИС -->
    <div class="modal fade" id="elisProtocolView" tabindex="-1" role="dialog" aria-labelledby="protocolViewTitle" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-lg" role="document">
            <div class="modal-content">
                <!-- Заголовок модального окна -->
                <div class="modal-header">
                    <span class="modal-title" id="protocolViewTitle">Данные протокола ЕЛИС</span>
                </div>
                <!-- Содержимое модального окна -->
                <div class="modal-body">
                    <!-- Табличное представление -->
                    <div id="protocolTableView" class="protocol-table-view">
                        <!-- Таблица исходных данных -->
                        <div class="protocol-section">
                            <div class="protocol-section-title">Исходные данные</div>
                            <table class="protocol-data-table" id="protocolBaseDataTable">
                                <tbody></tbody>
                            </table>
                        </div>
                        <!-- Таблица показателей качества -->
                        <div class="protocol-section">
                            <div class="protocol-section-title">Показатели качества</div>
                            <table class="protocol-params-table" id="protocolParamsTable">
                                <thead>
                                    <tr>
                                        <th>Наименование</th>
                                        <th>Метод испытаний</th>
                                        <th>Документы</th>
                                        <th>Числовое значение</th>
                                        <th>Текстовое представление</th>
                                    </tr>
                                </thead>
                                <tbody></tbody>
                            </table>
                        </div>
                    </div>
                    <!-- JSON представление -->
                    <pre id="protocolViewContent" class="protocol-json-content" style="display: none;"></pre>
                </div>
                <!-- Футер модального окна -->
                <div class="modal-footer">
                    <button type="button" class="toggle-btn active" id="btnViewTable" onclick="switchProtocolView('table')">
                        <i class="fa fa-table"></i> Таблица
                    </button>
                    <button type="button" class="toggle-btn" id="btnViewJson" onclick="switchProtocolView('json')">
                        <i class="fa fa-code"></i> JSON
                    </button>
                    <button type="button" class="btn btn-secondary" onclick="closeProtocolView()">Закрыть</button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
