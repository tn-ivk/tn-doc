<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Окно ошибки</title>
</head>
<body>
    <!-- Модальное окно ошибки -->
    <dialog id="errorDialog" class="custom-dialog">
        <div class="dialog-header">
            <span class="dialog-title">Ошибка</span>
        </div>
        <div class="dialog-content">
            <svg class="dialog-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 2C6.48 2 2 6.48 2 12C2 17.52 6.48 22 12 22C17.52 22 22 17.52 22 12C22 6.48 17.52 2 12 2ZM13 17H11V15H13V17ZM13 13H11V7H13V13Z" fill="#ff4444"/>
            </svg>
            <p id="errorMessage" class="dialog-message"></p>
        </div>
        <div class="dialog-footer">
            <button class="dialog-button" onclick="document.getElementById('errorDialog').close()">Закрыть</button>
        </div>
    </dialog>

</body>
</html>
