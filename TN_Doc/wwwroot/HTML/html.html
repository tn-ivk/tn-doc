<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title></title>

    <style>
        /*chrome*/
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        /*mozilla*/
        input[type=number] {
            -moz-appearance: textfield;
        }
        
        td, th 
        {
            font-size: 70%;             /* Размер шрифта в процентах */
            padding: 2px;               /* Поля вокруг содержимого таблицы */
            border: 0.5px solid black;  /* Параметры рамки */
        }

        Edit 
        {
            border-collapse: collapse;  /* Убираем двойные линии между ячейками */
        }
    </style>

    <script src="http://localhost:5000/lib/jquery/dist/jquery.min.js"></script>
    <script src="/js/EditDoc.js"></script>


    <script id="ElementChangeEventHandling" type="text/javascript">

        var dictionaries;

        function funcOnLoad() {
            dictionaries = GetUsers();
        }

        function UserChangeEvent(selectObject)
        {
            if (selectObject.name == "Delive_IOF")
            {
                var user = dictionaries.Users.filter(users => users["Id"] == $(selectObject).val());
                document.getElementById("Delive_Post").value = user[0].Post;
                document.getElementById("Delive_Factory").value = user[0].Factory;

                //alert(selectObject.name + ' ' + $(selectObject).val() + ' ' + $(selectObject).text());
            }
            else if (selectObject.name == "Receive_IOF")
            {
                var user = dictionaries.Users.filter(users => users["Id"] == $(selectObject).val());
                document.getElementById("Receive_Post").value = user[0].Post;
                document.getElementById("Receive_Factory").value = user[0].Factory;

                //alert(selectObject.name + ' ' + $(selectObject).val() + ' ' + $(selectObject).text());
            }
        }
    </script>

</head>
<body onload="funcOnLoad()">

    <table id="AdditionalInfo">

        <tr><td>ПП1: Номер протокола</td><td><input id="PP1_AdditionalInfo.Protokol_Number" data-edit="1" data-key="PP1_AdditionalInfo.Protokol_Number" data-tag="AdditionalInfo" type="text" value=""></td></tr><tr><td>ПП1: Заводской №</td><td><input id="PP1_AdditionalInfo.Factory_number" data-edit="1" data-key="PP1_AdditionalInfo.Factory_number" data-tag="AdditionalInfo" type="text" value="496" disabled="disabled"></td></tr><tr><td>ПП1: Владелец</td><td><input id="PP1_AdditionalInfo.SIKN_Factory" data-edit="1" data-key="PP1_AdditionalInfo.SIKN_Factory" data-tag="AdditionalInfo" type="text" value="АО «Транснефть - Урал»" disabled="disabled"></td></tr><tr><td>ПП1: Место поверки</td><td><input id="PP1_AdditionalInfo.SIKN_PSP" data-edit="1" data-key="PP1_AdditionalInfo.SIKN_PSP" data-tag="AdditionalInfo" type="text" value="Юргамыш" disabled="disabled"></td></tr><tr><td>ПП1: Должность, подпись, И.О. Фамилия лица, проводившего поверку</td><td><input id="PP1_AdditionalInfo.StaffData" data-edit="1" data-key="PP1_AdditionalInfo.StaffData" data-tag="AdditionalInfo" type="text" value=""></td></tr><tr><td>ПП2: Номер протокола</td><td><input id="PP2_AdditionalInfo.Protokol_Number" data-edit="1" data-key="PP2_AdditionalInfo.Protokol_Number" data-tag="AdditionalInfo" type="text" value=""></td></tr><tr><td>ПП2: Заводской №</td><td><input id="PP2_AdditionalInfo.Factory_number" data-edit="1" data-key="PP2_AdditionalInfo.Factory_number" data-tag="AdditionalInfo" type="text" value="924" disabled="disabled"></td></tr><tr><td>ПП2: Владелец</td><td><input id="PP2_AdditionalInfo.SIKN_Factory" data-edit="1" data-key="PP2_AdditionalInfo.SIKN_Factory" data-tag="AdditionalInfo" type="text" value="АО «Транснефть - Урал»" disabled="disabled"></td></tr><tr><td>ПП2: Место поверки</td><td><input id="PP2_AdditionalInfo.SIKN_PSP" data-edit="1" data-key="PP2_AdditionalInfo.SIKN_PSP" data-tag="AdditionalInfo" type="text" value="Юргамыш" disabled="disabled"></td></tr><tr><td>ПП2: Должность, подпись, И.О. Фамилия лица, проводившего поверку</td><td><input id="PP2_AdditionalInfo.StaffData" data-edit="1" data-key="PP2_AdditionalInfo.StaffData" data-tag="AdditionalInfo" type="text" value=""></td></tr></tbody>
